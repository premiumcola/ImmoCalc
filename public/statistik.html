<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auswertung · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .filter{display:flex;gap:8px;margin-bottom:12px}
  .filter select{flex:1;min-width:0}
  .kategorien{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .kategorien button{border:none;background:var(--sheet);color:var(--soft);
    border-radius:999px;padding:9px 14px;font:600 12px var(--disp);cursor:pointer;
    min-height:38px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kategorien button[aria-pressed=true]{background:var(--teal-l);color:var(--teal-d)}
  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:14px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);letter-spacing:-.01em;margin:0 0 14px;color:var(--ink)}
  /* max-width: die SVGs haben eine viewBox und wuerden auf breiten Schirmen
     samt Schrift und Balken ins Riesenhafte skalieren. */
  .chart{width:100%;max-width:560px;height:auto;display:block;overflow:visible}
  @media(min-width:1000px){
    .kpi{max-width:560px}
    .tabelle{max-width:720px}
  }
  .chartleer{font:400 13px var(--body);color:var(--soft);text-align:center;padding:22px 8px}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi .k{background:var(--sheet);border-radius:14px;padding:13px 12px;
          box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kpi .kl{display:block;font:600 9.5px var(--mono);letter-spacing:.08em;
           text-transform:uppercase;color:var(--soft)}
  .kpi .kv{display:block;font:700 16px var(--disp);letter-spacing:-.02em;margin-top:6px}
  .kpi .kv.pos{color:var(--pos)} .kpi .kv.neg{color:var(--neg)}
  .legende{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
  .legende .le{display:flex;align-items:center;gap:6px;font:500 11.5px var(--body);
               color:var(--soft)}
  .legende .le i{width:10px;height:10px;border-radius:3px;flex:none}
  .tabelle{width:100%;border-collapse:collapse;margin-top:2px}
  .tabelle th{font:600 9.5px var(--mono);letter-spacing:.07em;text-transform:uppercase;
              color:var(--soft);text-align:right;padding:0 0 8px}
  .tabelle th:first-child{text-align:left}
  .tabelle td{font:500 13px var(--body);padding:9px 0;border-top:1px solid var(--line);
              text-align:right}
  .tabelle td:first-child{text-align:left;font-weight:600}
  .tabelle td.pos{color:var(--pos)} .tabelle td.neg{color:var(--neg)}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="barwrap">
      <h1>Auswertung</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div class="filter">
      <select class="inp" id="jahr" aria-label="Jahr"></select>
      <select class="inp" id="objekt" aria-label="Objekt"></select>
    </div>
    <div class="kategorien" id="kategorien" role="group" aria-label="Kostenarten"></div>
    <div id="inhalt"></div>
  </div>

  <nav class="nav">
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="statistik.html" aria-current="page"><span class="ni">◔</span>Auswertung</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
import { api, eur, eurKurz, esc } from './assets/immo.js';
import { balken, saeulen, linie, sankey, legende, farbe } from './assets/charts.js';

const inhalt = document.getElementById('inhalt');
const sub = document.getElementById('sub');
const jahrWahl = document.getElementById('jahr');
const objektWahl = document.getElementById('objekt');

const jetzt = new Date().getFullYear();
jahrWahl.innerHTML = Array.from({ length: 6 }, (_, i) => jetzt - i)
  .map(j => `<option value="${j}">${j}</option>`).join('');

let objekte = [];
try {
  objekte = await api('/objekte');
  objektWahl.innerHTML = '<option value="">Alle Objekte</option>' +
    objekte.map(o => `<option value="${esc(o.slug)}">${esc(o.name)}</option>`).join('');
} catch {
  sub.textContent = 'API nicht erreichbar';
}

function kpiFeld(label, wert, klasse = '') {
  return `<div class="k"><span class="kl">${label}</span>
          <span class="kv ${klasse}">${wert}</span></div>`;
}

/* Kostenarten-Filter — wirkt auf alle Diagramme gleichermaßen */
const kategorienFeld = document.getElementById('kategorien');
let alleKategorien = [];
let gewaehlt = new Set();

function kategorienZeichnen() {
  kategorienFeld.innerHTML = alleKategorien.map(k =>
    `<button data-kat="${esc(k)}" aria-pressed="${gewaehlt.has(k)}">${esc(k)}</button>`).join('');
}

kategorienFeld.addEventListener('click', e => {
  const knopf = e.target.closest('[data-kat]');
  if (!knopf) return;
  const kat = knopf.dataset.kat;
  gewaehlt.has(kat) ? gewaehlt.delete(kat) : gewaehlt.add(kat);
  kategorienZeichnen();
  zeichnen();
});

async function zeichnen() {
  const jahr = jahrWahl.value;
  const objekt = objektWahl.value;
  const frage = new URLSearchParams({ jahr });
  if (objekt) frage.set('objekt', objekt);
  // leere Auswahl = alles, sonst wäre die Ansicht nach dem ersten Klick leer
  if (gewaehlt.size) frage.set('kategorien', [...gewaehlt].join(','));

  let daten, verlauf, fluss;
  try {
    [daten, verlauf, fluss] = await Promise.all([
      api('/auswertung?' + frage),
      api('/auswertung/mietverlauf' + (objekt ? '?objekt=' + encodeURIComponent(objekt) : '')),
      api('/auswertung/sankey?' + frage),
    ]);
  } catch {
    inhalt.innerHTML = `<div class="empty"><div class="big">Keine Verbindung</div>
      <p>Die Auswertung konnte nicht geladen werden.</p></div>`;
    return;
  }

  const g = daten.gesamt;
  sub.textContent = `${daten.objekte.length} ${daten.objekte.length === 1 ? 'Objekt' : 'Objekte'} · ${jahr}`;

  if (!alleKategorien.length && daten.kategorien) {
    alleKategorien = daten.kategorien;
    kategorienZeichnen();
  }

  const bloecke = Object.entries(daten.kostenbloecke)
    .map(([name, wert]) => ({ name, wert, text: eurKurz(wert) }))
    .sort((a, b) => b.wert - a.wert);

  const zeilen = daten.objekte.map(o => `<tr>
      <td>${esc(o.name)}</td>
      <td>${eurKurz(o.einnahmen)}</td>
      <td>${eurKurz(o.ausgaben)}</td>
      <td class="${o.saldo >= 0 ? 'pos' : 'neg'}">${eurKurz(o.saldo)}</td>
    </tr>`).join('');

  inhalt.innerHTML = `
    <div class="kpi">
      ${kpiFeld('Einnahmen', eurKurz(g.einnahmen), 'pos')}
      ${kpiFeld('Ausgaben', eurKurz(g.ausgaben), 'neg')}
      ${kpiFeld('Saldo', eurKurz(g.saldo), g.saldo >= 0 ? 'pos' : 'neg')}
    </div>

    <div class="karte">
      <h3>Kostenfluss ${jahr}${objekt ? ' · je Einheit' : ' · je Objekt'}</h3>
      ${sankey(fluss.knoten, fluss.fluss,
               { format: eurKurz, breite: window.innerWidth < 520 ? 270 : 560 })}
    </div>

    <div class="karte">
      <h3>Kostenblöcke ${jahr}</h3>
      ${balken(bloecke)}
    </div>

    <div class="karte">
      <h3>Einnahmen und Ausgaben je Objekt</h3>
      ${saeulen(daten.objekte.map(o => ({ name: o.name, a: o.einnahmen, b: o.ausgaben })))}
      ${legende([{ name: 'Einnahmen', farbe: '#2E7D4F' }, { name: 'Ausgaben', farbe: '#B24229' }])}
    </div>

    <div class="karte">
      <h3>Mietverlauf</h3>
      ${linie(verlauf.jahre, verlauf.reihen)}
      ${verlauf.reihen.length ? legende(verlauf.reihen.map((r, i) => ({ name: r.name, farbe: farbe(i) }))) : ''}
    </div>

    ${daten.objekte.length ? `<div class="karte">
      <h3>Je Objekt</h3>
      <table class="tabelle">
        <thead><tr><th>Objekt</th><th>Ein</th><th>Aus</th><th>Saldo</th></tr></thead>
        <tbody>${zeilen}</tbody>
      </table>
    </div>` : ''}`;
}

jahrWahl.addEventListener('change', zeichnen);
objektWahl.addEventListener('change', zeichnen);
await zeichnen();
</script>
</body>
</html>
