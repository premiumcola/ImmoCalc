<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Objekt · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .barlogo{width:34px;height:34px;border-radius:9px;overflow:hidden;flex:none;
           border:none;background:none;padding:0;cursor:pointer;display:block}
  .barlogo:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;
          font:600 12px var(--mono);margin-bottom:18px;line-height:1.4}
  .banner .d{width:8px;height:8px;border-radius:50%;flex:none}
  .banner .days{margin-left:auto;font-weight:700;white-space:nowrap}
  .banner.pos{background:var(--pos-bg);color:var(--pos)} .banner.pos .d{background:var(--pos)}
  .banner.amber{background:var(--amber-bg);color:var(--amber)} .banner.amber .d{background:var(--amber)}
  .banner.neg{background:var(--neg-bg);color:var(--neg)} .banner.neg .d{background:var(--neg)}

  .sekopf{display:flex;align-items:baseline;gap:10px;margin:26px 0 12px}
  .sekopf h2.sec{font:700 17px var(--disp);letter-spacing:-.015em;margin:0;flex:1}
  .sekopf button{border:none;background:none;color:var(--teal-d);cursor:pointer;
    font:600 12.5px var(--disp);padding:8px 4px;margin:-8px -4px;min-height:44px}
  .sekopf button:hover{color:var(--teal)}
  .sekopf:first-child{margin-top:0}

  .liste{background:var(--sheet);border-radius:14px;overflow:hidden;margin-bottom:10px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .eintrag{display:flex;gap:12px;align-items:center;padding:13px 15px;width:100%;
           border:none;background:none;text-align:left;font-family:var(--body);
           color:inherit}
  .eintrag + .eintrag{border-top:1px solid var(--line)}
  .eintrag .sym{width:34px;height:34px;border-radius:10px;flex:none;display:flex;
                align-items:center;justify-content:center;background:#EDF1F0;
                color:var(--soft)}
  .eintrag .sym svg{width:20px;height:20px;display:block}
  .eintrag .et{flex:1;min-width:0}
  .eintrag .en{display:block;font:600 14px var(--disp);letter-spacing:-.01em;
               overflow-wrap:anywhere}
  /* Der Zustandshinweis läuft mit dem Namen mit, statt ihm Platz wegzunehmen —
     als eigene Spalte quetscht er den Namen auf schmalen Geräten Buchstabe
     für Buchstabe um. */
  .eintrag .en .chip{margin-left:6px;vertical-align:1px;font-size:10px}
  .eintrag .ed{display:block;font:400 12px var(--body);color:var(--soft);margin-top:3px;
               line-height:1.4;overflow-wrap:anywhere}
  .eintrag .ew{font:600 13px var(--mono);white-space:nowrap;flex:none}
  .eintrag.klick{cursor:pointer}
  .eintrag.klick:hover{background:#F6F8F8}
  .eintrag .del{border:none;background:none;color:var(--soft);font:400 18px var(--body);
                cursor:pointer;padding:6px 2px;min-width:36px;min-height:36px;flex:none}
  .eintrag .del:hover{color:var(--neg)}
  .leerzeile{font:400 13px var(--body);color:var(--soft);padding:16px 15px;text-align:center}
  .add{width:100%;border:1.5px dashed #B4C4C1;background:transparent;color:var(--teal-d);
       border-radius:12px;padding:12px;font:600 13.5px var(--disp);cursor:pointer;
       min-height:44px;margin-bottom:4px}
  .add:hover{background:var(--teal-l)}

  /* Stammdaten als Paarliste — Beschriftung links, Wert rechts */
  .paare{background:var(--sheet);border-radius:14px;padding:4px 15px;margin-bottom:10px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .paar{display:flex;justify-content:space-between;gap:14px;padding:11px 0;
        font:500 13.5px var(--body)}
  .paar + .paar{border-top:1px solid var(--line)}
  .paar .pl{color:var(--soft);flex:none}
  .paar .pv{font-family:var(--mono);font-weight:600;text-align:right;min-width:0;
            overflow-wrap:anywhere}
  .paar .pv.leer{color:var(--soft);font-weight:400;font-family:var(--body)}

  dialog{border:none;border-radius:18px;padding:0;max-width:420px;width:calc(100% - 32px);
         background:var(--paper);box-shadow:0 30px 70px -20px rgba(22,38,44,.5);
         max-height:86dvh}
  dialog::backdrop{background:rgba(22,38,44,.45)}
  dialog .dh{font:700 17px var(--disp);letter-spacing:-.02em;padding:20px 20px 4px}
  dialog form{padding:12px 20px 20px;overflow-y:auto;max-height:calc(86dvh - 60px)}
  .zeile2{display:flex;gap:10px} .zeile2 > *{flex:1}

  .cloudbox{background:var(--sheet);border-radius:14px;padding:15px;margin-bottom:10px;
            box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .cloudbox .zeile{display:flex;gap:12px;align-items:center}
  .cloudbox .sym{width:42px;height:42px;border-radius:11px;flex:none;display:flex;
                 align-items:center;justify-content:center;font:600 16px var(--mono)}
  .cloudbox .sym.offen{background:var(--amber-bg);color:var(--amber)}
  .cloudbox .sym.fertig{background:var(--pos-bg);color:var(--pos)}
  .cloudbox .txt{flex:1;min-width:0}
  .cloudbox .t{display:block;font:600 14px var(--disp);letter-spacing:-.01em}
  .cloudbox .d{display:block;font:400 12px var(--body);color:var(--soft);margin-top:3px;
               line-height:1.45;word-break:break-word}
  .cloudbox .tat{margin-top:12px}
  .cloudbox .tat button,.cloudbox .tat a{display:block;width:100%;text-align:center;
    border:none;border-radius:11px;padding:12px;cursor:pointer;font:600 13.5px var(--disp);
    min-height:44px;background:var(--teal);color:#fff;text-decoration:none}
  .cloudbox .tat button:hover,.cloudbox .tat a:hover{background:var(--teal-d)}
  .cloudbox .tat button[disabled]{opacity:.6;cursor:default}
  /* Ist die Struktur da, ist das Nachlegen nur noch eine Nebensache:
     kleiner, rechts, ohne Farbfläche. */
  .cloudbox .tat.nebensache{margin-top:10px;text-align:right}
  .cloudbox .tat.nebensache button{display:inline-block;width:auto;background:none;
    color:var(--teal-d);padding:9px 12px;min-height:40px;font-size:12.5px;
    box-shadow:inset 0 0 0 1.5px var(--line)}
  .cloudbox .tat.nebensache button:hover{background:var(--teal-l)}
  .strukturliste{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
                 gap:6px;margin-top:12px}
  .strukturliste span{font:500 11px var(--mono);color:var(--soft);background:#F1F4F4;
    border-radius:8px;padding:7px 9px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap}
  .strukturliste span.eigen{background:var(--teal-l);color:var(--teal-d)}

  .gefahr-block{margin-top:30px;border-radius:16px;background:var(--sheet);padding:16px;
                box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .gefahr-block .gt{font:600 14px var(--disp);letter-spacing:-.01em;margin-bottom:6px}
  .gefahr-block p{font:400 12.5px var(--body);color:var(--soft);margin:0 0 14px;
                  line-height:1.5}
  .gefahr-block .btn + .btn{margin-top:8px}

  /* Untergruppen im Dialog: Bewohner, Jahresstände — eigener Block mit Luft,
     damit sie nicht wie ein weiteres Formularfeld wirken. */
  .block{margin:22px 0 16px}
  .block .bt{display:block;font:700 13px var(--disp);letter-spacing:-.01em;
             margin-bottom:5px}
  .block .bd{display:block;font:400 12px var(--body);color:var(--soft);
             line-height:1.5;margin-bottom:12px}
  .bwzeile{background:var(--sheet);border-radius:12px;padding:11px 12px;
           margin-bottom:8px;position:relative}
  .bwzeile input{width:100%;border:1.5px solid var(--line);border-radius:9px;
    padding:10px 11px;font:400 14px var(--body);color:var(--ink);background:#fff;
    margin-bottom:7px;min-height:44px}
  .bwzeile input:last-of-type{margin-bottom:0}
  .bwzeile input:focus{outline:none;border-color:var(--teal)}
  .bwzeile .weg{position:absolute;top:5px;right:5px;border:none;background:none;
    color:var(--soft);font:400 20px var(--body);cursor:pointer;
    width:40px;height:40px;border-radius:9px}
  .bwzeile .weg:hover{color:var(--neg);background:var(--paper)}
  .bwzeile .nm{padding-right:44px}
  .zusatz{width:100%;border:1.5px dashed #B4C4C1;background:transparent;
    color:var(--teal-d);border-radius:11px;padding:11px;font:600 13px var(--disp);
    cursor:pointer;min-height:44px}
  .zusatz:hover{background:var(--teal-l)}

  .jahre{background:var(--sheet);border-radius:12px;overflow:hidden;margin-bottom:12px}
  .jahr{display:flex;align-items:center;gap:8px;padding:9px 10px;
        font:500 13px var(--body)}
  .jahr + .jahr{border-top:1px solid var(--line)}
  .jahr .jj{font:600 12px var(--mono);color:var(--soft);flex:none;width:36px}
  /* Der Betrag darf nie umbrechen — „240.000,00" und das € gehören zusammen. */
  .jahr .jw{font:600 12.5px var(--mono);flex:1;text-align:right;white-space:nowrap}
  .jahr .jq{font:500 10px var(--mono);letter-spacing:.02em;padding:4px 7px;
            border-radius:8px;background:#F1F4F4;color:var(--soft);flex:none;
            white-space:nowrap}
  .jahr.gemessen .jq{background:var(--teal-l);color:var(--teal-d)}
  .jahr .weg{border:none;background:none;color:var(--soft);font:400 18px var(--body);
    cursor:pointer;width:40px;height:40px;border-radius:9px;flex:none}
  .jahr .weg:hover{color:var(--neg);background:var(--paper)}
  .dlgnote{font:400 12px var(--body);color:var(--soft);line-height:1.5;
           margin:0 0 16px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button class="back" id="back">Zurück</button>
    <a class="barlogo" id="barlogo" href="index.html" aria-label="Zur Übersicht"></a>
    <div class="barwrap">
      <h1 id="titel">Objekt</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll" id="inhalt"></div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html" aria-current="page"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<dialog id="dlg">
  <div class="dh" id="dlgTitel">Eintrag</div>
  <form method="dialog" id="dlgForm"></form>
</dialog>

<script type="module">
import { installLogos, logoSvg, api, eur, eurVoll, esc, fristKlasse, fristText,
         melde, frage, schiebeFrage } from './assets/immo.js';
import { kostenIcon } from './assets/kostenicons.js';

/* Lesbare Eingabe (Tausenderpunkte, IBAN in Vierergruppen, Steuernummer).
   Bewusst dynamisch geladen: fehlt die Datei, bleiben es schlichte Felder —
   die Seite muss deswegen nicht ausfallen. */
let eingabe = null;
try {
  eingabe = await import('./assets/eingabe.js');
} catch {
  eingabe = null;
}

installLogos();

const slug = new URLSearchParams(location.search).get('o');
const inhalt = document.getElementById('inhalt');
const titel = document.getElementById('titel');
const sub = document.getElementById('sub');
const dlg = document.getElementById('dlg');

document.getElementById('back').addEventListener('click', () => history.length > 1
  ? history.back() : location.href = 'index.html');

/* Zahlungsturnus kommt aus der API — die Bereiche haben unterschiedliche
   sinnvolle Auswahlen, und die soll nicht doppelt gepflegt werden. */
const turnusCache = new Map();
async function turnusOptionen(bereich) {
  if (!turnusCache.has(bereich)) {
    try {
      turnusCache.set(bereich, await api(`/turnus/${bereich}`));
    } catch {
      turnusCache.set(bereich, { optionen: [], vorgabe: '' });
    }
  }
  return turnusCache.get(bereich);
}

const proTurnus = { monatlich: '/ M', vierteljaehrlich: '/ Q', halbjaehrlich: '/ HJ',
                    jaehrlich: '/ J', einmalig: 'einm.' };
const kuerzel = t => proTurnus[t] || '/ J';

/* Welche Felder hat welcher Bereich — steuert Liste, Formular und Symbol. */
const BEREICHE = {
  mieten: {
    titel: 'Mieten & Mieter', einzahl: 'Mietverhältnis', ikon: 'Miete',
    felder: [
      { k: 'einheit', l: 'Einheit', typ: 'text' },
      { k: 'partei', l: 'Mieter / Partei', typ: 'text' },
      { k: 'kaltmiete', l: 'Kaltmiete', typ: 'number', schritt: '0.01', geld: true },
      { k: 'nebenkosten_vz', l: 'NK-Vorauszahlung', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'stellplatz', l: 'Stellplatzmiete', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'sonstige', l: 'Sonstige Einnahmen', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'turnus', l: 'Zahlungsturnus', typ: 'turnus' },
      { k: 'ab_datum', l: 'Gültig ab', typ: 'date', pflicht: true },
      { k: 'bis_datum', l: 'Beendet am', typ: 'date' },
      { k: 'email', l: 'E-Mail', typ: 'email' },
      { k: 'telefon', l: 'Telefon', typ: 'tel' },
      { k: 'anschrift', l: 'Anschrift', typ: 'text' },
      { k: 'personen', l: 'Personen im Haushalt', typ: 'number', schritt: '1' },
      { k: 'kaution', l: 'Kaution', typ: 'number', schritt: '0.01', geld: true },
      { k: 'notiz', l: 'Notiz', typ: 'text' },
    ],
    name: e => e.partei || e.einheit || 'Mietverhältnis',
    /* Die Mailadresse steht nicht in der Zeile — sie bricht auf dem Handy
       mitten im Wort um. Ein Zeichen genügt als Auskunft, ob sie da ist.
       Bei mehreren Bewohnern zählt, wie viele erreichbar sind. */
    detail: e => [
      e.einheit,
      e.geplant ? `ab ${datum(e.ab_datum)}`
        : (e.bis_datum ? `bis ${datum(e.bis_datum)}`
                       : (e.ab_datum ? `seit ${datum(e.ab_datum)}` : '')),
      kontaktText(e),
    ].filter(Boolean).join(' · '),
    /* Was insgesamt hereinkommt — eine reine Stellplatzmiete stünde sonst
       mit 0,00 € in der Liste. */
    wert: e => `${eur((e.kaltmiete || 0) + (e.stellplatz || 0) + (e.sonstige || 0))
                } ${kuerzel(e.turnus)}`,
    /* Beendete Mietverhältnisse bleiben als Historie stehen, treten aber
       zurück. Ein Stand, der erst mit der nächsten Erhöhung endet, läuft
       heute noch — der darf nicht blass werden. */
    matt: e => Boolean(e.beendet),
    chip: e => e.geplant ? ['amber', 'geplant'] : null,
  },
  versicherungen: {
    titel: 'Versicherungen', einzahl: 'Versicherung', ikon: 'Versicherung',
    felder: [
      { k: 'art', l: 'Art', typ: 'text', pflicht: true },
      { k: 'anbieter', l: 'Anbieter', typ: 'text' },
      { k: 'police_nr', l: 'Policen-Nr.', typ: 'text' },
      { k: 'jahresbeitrag', l: 'Beitrag je Turnus', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'turnus', l: 'Zahlungsturnus', typ: 'turnus' },
      { k: 'versicherungswert', l: 'Versicherungswert', typ: 'number',
        schritt: '0.01', geld: true },
      { k: 'beginn', l: 'Beginn', typ: 'date' },
      { k: 'ende', l: 'Ende', typ: 'date' },
      { k: 'umlagefaehig', l: 'Umlagefähig', typ: 'ja_nein' },
      { k: 'notiz', l: 'Notiz', typ: 'text' },
    ],
    name: e => e.art,
    detail: e => [e.anbieter, e.police_nr,
                  e.umlagefaehig ? 'umlagefähig' : ''].filter(Boolean).join(' · '),
    wert: e => `${eur(e.jahresbeitrag)} ${kuerzel(e.turnus)}`,
  },
  kredite: {
    titel: 'Kredite', einzahl: 'Kredit', ikon: 'Kredit',
    felder: [
      { k: 'bezeichnung', l: 'Bezeichnung', typ: 'text', pflicht: true },
      { k: 'bank', l: 'Bank', typ: 'text' },
      { k: 'darlehensnummer', l: 'Darlehensnummer', typ: 'text' },
      { k: 'urspruenglich', l: 'Ursprungsbetrag', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'restschuld', l: 'Restschuld bei Beginn', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'zinssatz', l: 'Zinssatz %', typ: 'number', schritt: '0.01' },
      { k: 'rate_monatlich', l: 'Rate je Turnus', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'turnus', l: 'Zahlungsturnus', typ: 'turnus' },
      { k: 'beginn', l: 'Beginn', typ: 'date' },
      { k: 'zinsbindung_bis', l: 'Zinsbindung bis', typ: 'date' },
      { k: 'notiz', l: 'Notiz', typ: 'text' },
    ],
    name: e => e.bezeichnung,
    /* Gezeigt wird die fortgeschriebene Restschuld, nicht die eingetragene:
       eingegeben wird nur der Stand zum Jahresende, dazwischen rechnet die
       App aus Rate und Zinssatz weiter. */
    detail: e => [e.bank, restText(e),
                  e.zinssatz ? `${prozent(e.zinssatz)} %` : ''].filter(Boolean).join(' · '),
    wert: e => `${eur(e.rate_monatlich)} ${kuerzel(e.turnus)}`,
    chip: e => e.stand && e.stand.quelle === 'fortgeschrieben'
      ? ['teal', `Stand ${e.stand.stand_jahr}`] : null,
  },
  zahlungen: {
    titel: 'Steuer & Zahlungen', einzahl: 'Zahlung', ikon: 'Steuer',
    felder: [
      { k: 'art', l: 'Art', typ: 'text', pflicht: true },
      { k: 'kategorie', l: 'Kategorie', typ: 'select',
        werte: ['Steuer', 'Kredit', 'Instandhaltung', 'Sonstiges'] },
      { k: 'jahr', l: 'Jahr', typ: 'number', pflicht: true,
        vorgabe: new Date().getFullYear() },
      { k: 'betrag', l: 'Betrag je Turnus', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'turnus', l: 'Zahlungsturnus', typ: 'turnus' },
      { k: 'absetzbar', l: 'Steuerlich absetzbar', typ: 'ja_nein' },
      { k: 'notiz', l: 'Notiz', typ: 'text' },
    ],
    name: e => e.art,
    detail: e => [e.kategorie, e.jahr, e.absetzbar ? 'absetzbar' : ''].
      filter(Boolean).join(' · '),
    wert: e => `${eur(e.betrag)} ${kuerzel(e.turnus)}`,
  },
};

/* Stammdaten des Objekts: dieselbe Feldbeschreibung für Anzeige und Formular. */
const STAMMFELDER = [
  { k: 'name', l: 'Name', typ: 'text', pflicht: true },
  { k: 'strasse', l: 'Straße', typ: 'text' },
  { k: 'plz', l: 'PLZ', typ: 'text' },
  { k: 'ort', l: 'Ort', typ: 'text' },
  { k: 'flaeche', l: 'Gesamtfläche', typ: 'number', schritt: '0.01', einheit: 'm²' },
  { k: 'kaufpreis', l: 'Kaufpreis', typ: 'number', schritt: '0.01', geld: true },
  { k: 'kaufdatum', l: 'Kaufdatum', typ: 'date' },
  { k: 'verkehrswert', l: 'Verkehrswert', typ: 'number', schritt: '0.01', geld: true },
  { k: 'bank', l: 'Bank', typ: 'text' },
  { k: 'iban', l: 'IBAN', typ: 'text', iban: true },
  { k: 'kontoinhaber', l: 'Kontoinhaber', typ: 'text' },
];

const datum = s => s ? new Date(s).toLocaleDateString('de-DE') : '';

/* Datum als ISO-Tag ohne Umweg über UTC — `toISOString` verschiebt in
   Mitteleuropa auf den Vortag und macht aus dem 1. den 31. */
const isoDatum = d => `${d.getFullYear()}-${String(d.getMonth() + 1)
  .padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
const tagDavor = iso => {
  const d = new Date(`${iso}T12:00:00`);
  d.setDate(d.getDate() - 1);
  return isoDatum(d);
};
const ersterNaechsterMonat = () => {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + 1);
  return isoDatum(d);
};

/* Zinssatz deutsch: 2,75 statt 2.75 — zwei Nachkommastellen, mehr nie. */
const prozent = n => Number(n).toLocaleString('de-DE', { maximumFractionDigits: 2 });

/* Wer ist erreichbar: der Hauptkontakt am Mietverhältnis und die Bewohner,
   die eine eigene Mailadresse haben. */
function kontaktText(e) {
  const extra = (e.bewohner || []).filter(b => b.email).length;
  if (!e.email && !extra) return '✉ fehlt';
  const zahl = (e.email ? 1 : 0) + extra;
  return zahl === 1 ? '✉ hinterlegt' : `✉ ${zahl} Adressen`;
}

/* Die Restschuld, die heute gilt. Ohne Cent: zwischen zwei Jahresständen ist
   sie gerechnet, da wäre eine Angabe auf den Cent nur vorgetäuschte Schärfe. */
function restText(e) {
  const rest = e.restschuld_aktuell ?? e.restschuld;
  return rest ? `Rest ${eurVoll(rest)}` : '';
}

/* Tausendstel mit hoechstens einer Nachkommastelle — 333,3 statt 333,29999.
   Ohne Tausenderpunkt, sonst liest sich "1.000 ‰" wie eintausend Komma null. */
const zahl = n => Number(n ?? 0).toLocaleString('de-DE',
  { maximumFractionDigits: 1, useGrouping: false });
/* Bestandszeilen kennen nur `tausendstel`; neue tragen `promille`. */
const promille = a => zahl(a.promille ?? a.tausendstel ?? 0);

function stammwert(f, o) {
  const v = o[f.k];
  if (v == null || v === '') return null;
  if (f.typ === 'date') return datum(v);
  if (f.geld) return eur(v);
  if (f.einheit) return `${Number(v).toLocaleString('de-DE')} ${f.einheit}`;
  return String(v);
}

let objekt = null;
let daten = null;

function bannerHtml(z) {
  if (!z || z.frist_tage == null) return '';
  const k = fristKlasse(z.frist_tage);
  const tage = z.frist_tage < 0
    ? `${Math.abs(z.frist_tage)} Tage über`
    : `noch ${z.frist_tage} Tage`;
  return `<div class="banner ${k}"><span class="d"></span>
      <span>Frist § 556 BGB · ${esc(z.label)}</span>
      <span class="days">${tage}</span></div>`;
}

/* Was nach einem Update noch nachzutragen wäre — ruhig, nie als Fehler. */
function nachpflegeHtml(n) {
  if (!n || !n.anzahl) return '';
  return `<div class="merker"><span class="hi">!</span><span class="ht">
      <span class="t">${n.anzahl === 1 ? 'Eine Angabe fehlt noch'
                                        : `${n.anzahl} Angaben fehlen noch`}</span>
      <span class="d">${esc(n.text)}. Nichts davon ist dringend — die
        Abrechnung läuft auch ohne. Ergänzen kannst du es jederzeit.</span>
    </span></div>`;
}

function kennzahlenHtml(v, jahresmiete, restschuld) {
  if (!v) return '';
  // Die Restschuld kommt aus den fortgeschriebenen Krediten dieser Seite.
  // Stünde hier der eingetragene Stand, widerspräche die Kennzahl oben der
  // Kreditzeile weiter unten.
  const rest = restschuld != null ? Math.round(restschuld * 100) / 100
                                  : v.restschuld;
  const eigen = v.wert != null ? Math.round((v.wert - rest) * 100) / 100
                               : null;
  const zellen = [];
  if (v.wert != null)
    zellen.push(['kv', eur(v.wert), v.wertquelle || 'Wert']);
  if (rest) zellen.push(['kv neg', eur(rest), 'Restschuld']);
  if (eigen != null)
    zellen.push([`kv ${eigen >= 0 ? 'pos' : 'neg'}`, eur(eigen), 'Eigenkapital']);
  if (jahresmiete) zellen.push(['kv', eur(jahresmiete), 'Miete pro Jahr']);
  if (!zellen.length) return '';
  return `<div class="kennzahlen">${zellen.map(([k, w, l]) =>
    `<div class="kennzahl"><span class="${k}">${w}</span>
       <span class="kl">${esc(l)}</span></div>`).join('')}</div>`;
}

function stammHtml(o) {
  const zeilen = STAMMFELDER.map(f => {
    const w = stammwert(f, o);
    return `<div class="paar"><span class="pl">${esc(f.l)}</span>
      <span class="pv${w ? '' : ' leer'}">${w ? esc(w) : 'nicht erfasst'}</span></div>`;
  }).join('');
  return `<div class="sekopf"><h2 class="sec">Stammdaten</h2>
      <button data-stamm="1">Bearbeiten</button></div>
    <div class="paare">${zeilen}</div>`;
}

function abschnitt(bereich, eintraege) {
  const cfg = BEREICHE[bereich];
  const zeilen = eintraege.length
    ? eintraege.map(e => {
        const marke = cfg.chip ? cfg.chip(e) : null;
        return `<div class="eintrag klick" data-edit="${bereich}:${e.id}"
          ${cfg.matt && cfg.matt(e) ? 'style="opacity:.62"' : ''}>
        <span class="sym">${kostenIcon(cfg.ikon)}</span>
        <span class="et">
          <span class="en">${esc(cfg.name(e))}${marke
            ? ` <span class="chip ${marke[0]}">${esc(marke[1])}</span>` : ''}</span>
          ${cfg.detail(e) ? `<span class="ed">${esc(cfg.detail(e))}</span>` : ''}
        </span>
        <span class="ew">${cfg.wert(e)}</span>
        <button class="del" data-del="${bereich}:${e.id}" aria-label="löschen">×</button>
      </div>`; }).join('')

function eigentuemerHtml(stand) {
  if (!stand) return '';
  const zeilen = stand.anteile.length
    ? stand.anteile.map(a => `<div class="eintrag">
        <span class="sym">${kostenIcon('Eigentümer')}</span>
        <span class="et"><span class="en">${esc(a.name)}</span>
          <span class="ed">${esc([a.rolle, a.notiz].filter(Boolean).join(' · '))}</span>
        </span>
        <span class="ew">${promille(a)} ‰</span>
        <button class="del" data-anteil="${a.id}" aria-label="entfernen">×</button>
      </div>`).join('')
    : `<div class="leerzeile">Noch kein Eigentümer zugeordnet</div>`;

  // Auch ohne jede Zuordnung hinweisen — ein Objekt ganz ohne Eigentümer
  // fällt sonst nirgends auf.
  const rest = !stand.stimmig
    ? `<div class="merker"><span class="hi">!</span><span class="ht">
         <span class="t">${stand.frei > 0 ? `${zahl(stand.frei)} ‰ nicht verteilt`
                                          : `${zahl(-stand.frei)} ‰ zu viel verteilt`}</span>
         <span class="d">Die Anteile sollten zusammen 1000 ‰ ergeben.
           Eine Nachkommastelle genügt — 333,3 dreimal gilt als vollständig.</span>
       </span></div>` : '';

  return `<div class="sekopf"><h2 class="sec">Eigentümer</h2>
      <button data-anteil-neu="1">Zuordnen</button></div>
    <div class="liste">${zeilen}</div>${rest}`;
}

async function laden() {
  if (!slug) {
    inhalt.innerHTML = `<div class="empty"><div class="big">Kein Objekt gewählt</div>
      <p>Zurück zur Übersicht und eine Immobilie antippen.</p></div>`;
    return;
  }
  let det;
  try {
    det = await api(`/objekte/${encodeURIComponent(slug)}`);
  } catch (fehler) {
    inhalt.innerHTML = `<div class="empty"><div class="big">Objekt nicht gefunden</div>
      <p>${esc(String(fehler.message || 'Die Daten konnten nicht geladen werden.'))}</p></div>`;
    return;
  }

  // Die Nebenabrufe duerfen einzeln danebengehen — dass eine Versicherungsliste
  // hakt, heisst nicht, dass es das Objekt nicht gibt. Fehlende Bereiche bleiben
  // leer, gemeldet wird einmal am Ende.
  const luecken = [];
  const zweig = async (was, ruf, ersatz) => {
    try { return await ruf(); }
    catch (fehler) { luecken.push(`${was}: ${fehler.message || fehler}`); return ersatz; }
  };
  const [bereiche, anteile, vermoegen] = await Promise.all([
    Promise.all(Object.keys(BEREICHE).map(async b =>
      [b, await zweig(BEREICHE[b].titel,
                      () => api(`/objekte/${encodeURIComponent(slug)}/${b}`), [])]))
      .then(Object.fromEntries),
    zweig('Eigentümer', () => api(`/objekte/${encodeURIComponent(slug)}/anteile`), null),
    zweig('Vermögen',
          async () => (await api('/vermoegen')).objekte.find(z => z.slug === slug),
          null),
  ]);
  if (luecken.length) melde(`Nicht alles konnte geladen werden — ${luecken[0]}`, 'neg');

  objekt = det.objekt;
  daten = det;
  titel.textContent = objekt.name;
  document.getElementById('barlogo').innerHTML = logoSvg(objekt.typ);
  // Der Ort enthaelt oft schon die Einheitenzahl ("Mixed-Use · 7 Einheiten") —
  // dann nicht zusaetzlich zaehlen, sonst steht es doppelt und die Zeile bricht um.
  const ortText = (objekt.ort || objekt.strasse || '').trim();
  sub.textContent = /einheit|wohnung/i.test(ortText) || !ortText
    ? (ortText || `${det.einheiten.length} Einheit${det.einheiten.length === 1 ? '' : 'en'}`)
    : `${ortText} · ${det.einheiten.length} Einheit${det.einheiten.length === 1 ? '' : 'en'}`;

  const laufend = det.zeitraeume.find(z => z.status === 'in Arbeit');
  const zr = det.zeitraeume.length
    ? det.zeitraeume.map(z => {
        const chip = z.status === 'in Arbeit'
          ? `<span class="chip ${fristKlasse(z.frist_tage)}">${esc(fristText(z.frist_tage) || 'in Arbeit')}</span>`
          : '<span class="chip">abgeschlossen</span>';
        return `<button class="eintrag klick" data-zeitraum="${z.id}"
                        style="cursor:pointer">
            <span class="et">
              <span class="en">${esc(z.label)}</span>
              <span class="ed">${esc(z.typ)}</span></span>${chip}
            <span class="ew" style="color:var(--soft);font-family:var(--body)">›</span>
          </button>`;
      }).join('')
    : `<div class="leerzeile">Noch kein Abrechnungszeitraum</div>`;

  // Was heute läuft: beendete Stände zählen nicht, geplante noch nicht.
  const jahresmiete = (bereiche.mieten || [])
    .filter(m => !m.beendet && !m.geplant)
    .reduce((s, m) => s + (m.kaltmiete || 0) *
      ({ monatlich: 12, vierteljaehrlich: 4, halbjaehrlich: 2 }[m.turnus] || 1), 0);

  const restschuld = (bereiche.kredite || []).reduce(
    (s, k) => s + (k.restschuld_aktuell ?? k.restschuld ?? 0), 0);

  inhalt.innerHTML = `
    ${bannerHtml(laufend)}
    ${nachpflegeHtml(det.nachpflege)}
    ${kennzahlenHtml(vermoegen, jahresmiete, restschuld)}
    <div class="sekopf"><h2 class="sec">Abrechnungszeiträume</h2>
      <button data-zeitraum-neu="1">Anlegen</button></div>
    <div class="liste">${zr}</div>
    ${stammHtml(objekt)}
    <div class="sekopf"><h2 class="sec">Dokumentenablage</h2></div>
    <div id="cloudbereich"><div class="cloudbox"><div class="zeile">
      <span class="sym offen">…</span>
      <span class="txt"><span class="t">wird geprüft …</span></span>
    </div></div></div>
    ${eigentuemerHtml(anteile)}
    ${Object.keys(BEREICHE).map(b => abschnitt(b, bereiche[b])).join('')}
    <div class="gefahr-block">
      <div class="gt">Sicherung und Löschen</div>
      <p>Die Sicherung enthält alle Daten dieser Immobilie und lässt sich
         wieder einlesen. Beim Löschen wird sie zusätzlich in die Nextcloud
         geschrieben — die dort abgelegten Unterlagen bleiben unberührt.</p>
      <button class="btn leise" data-export="1">Sicherung herunterladen</button>
      <button class="btn gefahr" data-loeschen="1">Immobilie löschen</button>
    </div>`;

  cloudZeigen();
}

/* Die Ordnerstruktur lässt sich jederzeit nachträglich anlegen — auch wenn
   das Objekt längst existiert und Nextcloud erst später verbunden wurde. */
async function cloudZeigen() {
  const ziel = document.getElementById('cloudbereich');
  if (!ziel) return;
  let s;
  try {
    s = await api(`/nextcloud/objekte/${encodeURIComponent(slug)}/status`);
  } catch (fehler) {
    // Frueher verschwand der ganze Block hier kommentarlos — dann sah es aus,
    // als gaebe es die Dokumentenablage gar nicht.
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">⬡</span>
        <span class="txt">
          <span class="t">Status der Ablage nicht abrufbar</span>
          <span class="d">${esc(String(fehler.message || fehler))}</span>
        </span></div>
        <div class="tat nebensache"><button data-cloud="status">Nochmal prüfen</button></div>
      </div>`;
    return;
  }

  if (s.angelegt) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym fertig">✓</span>
        <span class="txt">
          <span class="t">Ordner verknüpft</span>
          <span class="d">${esc(s.ordner)}</span>
        </span></div>
        <div id="ordnerliste"></div>
        <div class="tat nebensache">
          <button data-cloud="struktur">Fehlende Unterordner anlegen</button>
        </div>
      </div>`;
    ordnerZeigen();
    return;
  }

  if (!s.cloud_verbunden) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">⬡</span>
        <span class="txt">
          <span class="t">Nextcloud ist noch nicht verbunden</span>
          <span class="d">Das Objekt ist gespeichert. Sobald du die Verbindung
            einrichtest, kannst du die Ordnerstruktur hier nachträglich anlegen.</span>
        </span></div>
        <div class="tat"><a href="settings.html">Verbindung einrichten</a></div>
      </div>`;
    return;
  }

  if (!s.home) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">▣</span>
        <span class="txt">
          <span class="t">Kein Home-Ordner gewählt</span>
          <span class="d">Wähle den Ordner, unter dem die Immobilien liegen.</span>
        </span></div>
        <div class="tat"><a href="settings.html">Home-Ordner wählen</a></div>
      </div>`;
    return;
  }

  ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
      <span class="sym offen">＋</span>
      <span class="txt">
        <span class="t">Ordnerstruktur noch nicht angelegt</span>
        <span class="d">Wird angelegt unter <b>${esc(s.vorschlag)}</b> —
          vorhandene Ordner und Dateien bleiben unberührt.</span>
      </span></div>
      <div class="tat"><button data-cloud="struktur">Ordnerstruktur anlegen</button></div>
    </div>`;
}

/* Selbst angelegte Ordner werden mit ausgewiesen — ImmoCalc rührt sie nicht an,
   aber verschweigen soll es sie auch nicht. */
async function ordnerZeigen() {
  const ziel = document.getElementById('ordnerliste');
  if (!ziel) return;
  let s;
  try {
    s = await api(`/nextcloud/objekte/${encodeURIComponent(slug)}/ordner`);
  } catch (fehler) {
    ziel.innerHTML = `<span class="d" style="display:block;margin-top:10px">Ordnerliste
      nicht lesbar — ${esc(String(fehler.message || fehler))}</span>`;
    return;

  ziel.innerHTML = `
    <div class="strukturliste">${s.ordner.map(o =>
      `<span class="${o.eigen ? 'eigen' : ''}" title="${esc(o.name)}">${esc(o.name)}</span>`
    ).join('')}</div>
    <span class="d" style="display:block;margin-top:10px;font:400 12px var(--body);
      color:var(--soft)">${s.ordner.length} Ordner${eigene
        ? ` · ${eigene} davon von dir angelegt (grün) — die bleiben unverändert`
        : ''}${s.fehlend.length ? ` · ${s.fehlend.length} aus der Struktur fehlen` : ''}</span>`;
}

/* ---- Formular: eine Fabrik für alle Bereiche ---- */
async function feldHtml(f, bereich, wert) {
  const id = `f_${f.k}`;
  if (f.typ === 'turnus') {
    const { optionen, vorgabe } = await turnusOptionen(bereich);
    const gewaehlt = wert ?? vorgabe;
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        ${optionen.map(o => `<option value="${o.wert}"
          ${o.wert === gewaehlt ? 'selected' : ''}>${esc(o.text)}</option>`).join('')}
      </select></div>`;
  }
  if (f.typ === 'select') {
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        ${f.werte.map(w => `<option ${w === wert ? 'selected' : ''}>${esc(w)}</option>`)
          .join('')}
      </select></div>`;
  }
  if (f.typ === 'ja_nein') {
    const ja = wert === undefined ? true : Boolean(wert);
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        <option value="ja" ${ja ? 'selected' : ''}>ja</option>
        <option value="nein" ${ja ? '' : 'selected'}>nein</option>
      </select></div>`;
  }
  const v = wert == null ? (f.vorgabe != null ? f.vorgabe : '') : wert;
  // Geldfelder sind Textfelder: ein <input type="number"> nimmt keine
  // Tausenderpunkte an. Die Zifferntastatur bleibt über inputmode erhalten.
  const typ = f.geld ? 'text' : f.typ;
  const zusatz = f.geld ? 'inputmode="decimal"'
                        : (f.schritt ? `step="${f.schritt}"` : '');
  return `<div class="field"><label for="${id}">${esc(f.l)}</label>
    <input class="inp" id="${id}" name="${f.k}" type="${typ}" ${zusatz}
           value="${esc(v)}" ${f.pflicht ? 'required' : ''}></div>`;
}

/* Lesbare Eingabe anhängen — und beim Schliessen wieder lösen, sonst häufen
   sich die Beobachter mit jedem geöffneten Dialog. */
let formate = [];

function formateLoesen() {
  for (const f of formate) {
    try { f.zerstoere(); } catch { /* schon weg */ }
  }
  formate = [];
}

function formateSetzen(form, felder) {
  formateLoesen();
  if (!eingabe) return;
  for (const f of felder) {
    const el = form.elements[f.k];
    if (!el || el.tagName !== 'INPUT') continue;
    const bauer = f.geld ? eingabe.geldFeld
                : f.iban ? eingabe.ibanFeld
                : f.steuer ? eingabe.steuernummerFeld : null;
    if (typeof bauer !== 'function') continue;
    try {
      const griff = bauer(el);
      if (griff && typeof griff.zerstoere === 'function') formate.push(griff);
    } catch { /* eine Formatierung ist kein Muss */ }
  }
}

async function formular({ titel: dtitel, felder, bereich, werte = {}, absicht,
                          hinweis = '', extra = '', knopf = 'Speichern' }) {
  const form = document.getElementById('dlgForm');
  const html = await Promise.all(
    felder.map(f => feldHtml(f, bereich, werte[f.k])));
  document.getElementById('dlgTitel').textContent = dtitel;
  // Abbrechen ist bewusst type="button": als Submit-Knopf loeste es den
  // submit-Handler aus und speicherte. Die Abfrage darauf lief ins Leere,
  // weil returnValue am <dialog> haengt, nicht am <form>.
  form.innerHTML = (hinweis ? `<p class="dlgnote">${esc(hinweis)}</p>` : '')
    + html.join('') + extra +
    `<button class="btn" value="ok">${esc(knopf)}</button>
     <button class="btn leise" type="button" data-abbruch
             style="margin-top:8px">Abbrechen</button>`;
  form.dataset.absicht = absicht;
  form.dataset.bereich = bereich || '';
  form.dataset.id = werte.id || '';
  delete form.dataset.vorgaenger;   // sonst endet beim nächsten Mal ein fremder Stand
  formateSetzen(form, felder);
  // Ein zweiter showModal-Aufruf auf einem offenen Dialog wirft — der Wechsel
  // von der Miete zur Erhöhung tauscht nur den Inhalt aus.
  if (!dlg.open) dlg.showModal();
  form.scrollTop = 0;
}

/* Was wirklich im Feld steht — auch wenn es "1.250.000" anzeigt.
   `data-wert` hat Vorrang: dort legt die Formatierung den rohen Wert ab. */
function zahlAus(el) {
  const roh = el.dataset.wert != null && el.dataset.wert !== ''
    ? el.dataset.wert : el.value;
  const text = String(roh ?? '').replace(/[^\d,.-]/g, '');
  if (text === '') return null;
  const komma = text.lastIndexOf(',');
  const sauber = komma >= 0
    ? `${text.slice(0, komma).replace(/\./g, '')}.${text.slice(komma + 1).replace(/\D/g, '')}`
    // Ein einzelner Punkt mit ein bis zwei Stellen dahinter ist ein
    // Dezimalpunkt (so kommt der Wert aus der API), sonst Tausendertrennung.
    : (/^-?\d+\.\d{1,2}$/.test(text) ? text : text.replace(/\./g, ''));
  const zahl = Number(sauber);
  return Number.isFinite(zahl) ? zahl : null;
}

function ausFormular(form, felder) {
  const werte = {};
  for (const f of felder) {
    const el = form.elements[f.k];
    if (!el) continue;
    if (f.typ === 'ja_nein') { werte[f.k] = el.value === 'ja'; continue; }
    // Leeren heisst hier wirklich leeren — sonst liesse sich ein einmal
    // gesetztes Enddatum nie wieder entfernen.
    if (f.typ === 'number') { werte[f.k] = zahlAus(el); continue; }
    if (el.value === '') { werte[f.k] = f.typ === 'date' ? null : ''; continue; }
    werte[f.k] = el.value;
  }
  return werte;
}

    <span class="bt">Bewohner</span>
    <span class="bd">Wohnen mehrere Personen in der Einheit, bekommt jede ihre
      eigene Adresse und Nummer. Der Kontakt oben bleibt der Hauptkontakt des
      Mietverhältnisses.</span>
    ${(liste || []).map(bewohnerZeile).join('')}
    <button type="button" class="zusatz" data-bw-neu>＋ Bewohner</button>
  </div>`;
}

/* Was im Dialog steht, mit dem Bestand abgleichen: geändert, neu, entfernt. */
async function bewohnerSpeichern(form, miete_id) {
  const block = form.querySelector('#bewohnerblock');
  if (!block || !miete_id) return;
  for (const bid of bewohnerWeg) {
    await api(`/bewohner/${bid}`, { method: 'DELETE' });
  }
  bewohnerWeg = [];
  for (const zeile of block.querySelectorAll('.bwzeile')) {
    const daten = {
      name: zeile.querySelector('[name=bw_name]').value.trim(),
      email: zeile.querySelector('[name=bw_email]').value.trim(),
      telefon: zeile.querySelector('[name=bw_telefon]').value.trim(),
    };
    if (zeile.dataset.bid) {
      await api(`/bewohner/${zeile.dataset.bid}`, { method: 'PATCH', body: daten });
    } else if (daten.name || daten.email || daten.telefon) {
      await api(`/mieten/${miete_id}/bewohner`, { method: 'POST', body: daten });
    }
  }
}

/* ---- Jahresstände eines Kredits ---- */

const STANDFELDER = [
  { k: 'jahr', l: 'Jahr', typ: 'number', pflicht: true,
    vorgabe: new Date().getFullYear() - 1 },
  { k: 'restschuld', l: 'Restschuld am 31.12.', typ: 'number', schritt: '0.01',
    geld: true, pflicht: true },
];

function verlaufBlock(s) {
  const zeilen = (s.verlauf || []).map(j => `<div class="jahr${
      j.eingetragen ? ' gemessen' : ''}">
      <span class="jj">${j.jahr}</span>
      <span class="jw">${eur(j.restschuld)}</span>
      <span class="jq">${j.eingetragen ? 'eingetragen' : 'gerechnet'}</span>
      ${j.eingetragen ? `<button type="button" class="weg"
          data-stand-weg="${(s.staende.find(x => x.jahr === j.jahr) || {}).id}"
          aria-label="Stand entfernen">×</button>`
        : '<span class="weg" aria-hidden="true"></span>'}
    </div>`).join('');
  return `<div class="block">
    <span class="bt">Verlauf</span>
    <span class="bd">Grün hinterlegt ist, was du eingetragen hast. Die Jahre
      dazwischen rechnet die App aus Rate und Zinssatz.</span>
    ${zeilen ? `<div class="jahre">${zeilen}</div>`
             : '<div class="bd">Noch kein Stand eingetragen.</div>'}
  </div>`;
}

/* ---- Zusatzblöcke der Formulare ---- */

function mietExtra(eintrag) {
  const kopien = (eintrag ? eintrag.bewohner : []) || [];
  return bewohnerBlock(kopien) + (eintrag ? `<div class="block">
      <span class="bt">Mieterhöhung</span>
      <span class="bd">Eine beschlossene Erhöhung lässt sich schon jetzt
        eintragen. Sie steht als „geplant" in der Liste, bis sie wirksam wird;
        der heutige Stand endet automatisch am Tag davor.</span>
      <button type="button" class="zusatz"
              data-erhoehung="${eintrag.id}">＋ Mieterhöhung planen</button>
    </div>` : '');
}

function kreditExtra(eintrag) {
  if (!eintrag) return '';
  const s = eintrag.stand || {};
  return `<div class="block">
    <span class="bt">Restschuld</span>
    <span class="bd">${s.stand_jahr
      ? `Zuletzt eingetragen zum 31.12.${s.stand_jahr}: ${eur(s.stand_wert)} —
         heute fortgeschrieben ${eur(s.restschuld)}.`
      : `Trage die Restschuld zum 31.12. ein, wie sie im Kontoauszug steht.
         Dazwischen rechnet ImmoCalc aus Rate und Zinssatz weiter.`}</span>
    <button type="button" class="zusatz"
            data-staende="${eintrag.id}">Jahresstände pflegen</button>
  </div>`;
}

/* Eine geplante Erhöhung ist ein neuer Mietstand derselben Partei — nicht ein
   geänderter alter. So bleibt nachvollziehbar, was wann galt. */
async function erhoehungFormular(mid) {
  let alt;
  try {
    alt = (await api(`/objekte/${encodeURIComponent(slug)}/mieten`))
      .find(x => String(x.id) === String(mid));
  } catch (fehler) {
    return melde(String(fehler.message || fehler), 'neg');
  }
  if (!alt) return;
  const bewohner = (alt.bewohner || []).map(b => ({ ...b, id: null }));
  await formular({
    titel: 'Mieterhöhung planen',
    hinweis: 'Trage die neue Miete und den Tag ein, ab dem sie gilt. Der '
      + 'bisherige Stand läuft bis zum Tag davor weiter und bleibt als '
      + 'Historie erhalten.',
    felder: BEREICHE.mieten.felder, bereich: 'mieten', absicht: 'eintrag',
    werte: { ...alt, id: '', ab_datum: ersterNaechsterMonat(), bis_datum: null },
    extra: bewohnerBlock(bewohner), knopf: 'Erhöhung planen',
  });
  document.getElementById('dlgForm').dataset.vorgaenger = mid;
}

async function standFormular(kid) {
  let s;
  try {
    s = await api(`/kredite/${kid}/staende`);
  } catch (fehler) {
    return melde(String(fehler.message || fehler), 'neg');
  }
  await formular({
    titel: 'Restschuld zum Jahresende',
    hinweis: 'Die Bank weist die Restschuld zum 31.12. aus — trage sie ein wie '
      + 'einen Zählerstand. Dazwischen schreibt ImmoCalc monatlich fort: Rate '
      + 'minus Zinsanteil ist Tilgung. Jeder neue Stand korrigiert die Rechnung.',
    felder: STANDFELDER, werte: { id: kid }, absicht: 'stand',
    extra: verlaufBlock(s), knopf: 'Stand eintragen',
  });
}

dlg.addEventListener('close', formateLoesen);

document.getElementById('dlgForm').addEventListener('click', async e => {
  if (e.target.closest('[data-abbruch]')) return dlg.close('abbruch');

  const weg = e.target.closest('[data-bw-weg]');
  if (weg) {
    // Erst beim Speichern wirklich löschen — bis dahin nur gemerkt.
    const zeile = weg.closest('.bwzeile');
    if (zeile.dataset.bid) bewohnerWeg.push(zeile.dataset.bid);
    zeile.remove();
    return;
  }
  if (e.target.closest('[data-bw-neu]')) {
    e.target.closest('[data-bw-neu]').insertAdjacentHTML('beforebegin',
      bewohnerZeile({}));
    return;
  }

  const standWeg = e.target.closest('[data-stand-weg]');
  if (standWeg) {
    const kid = document.getElementById('dlgForm').dataset.id;
    try {
      await api(`/kreditstaende/${standWeg.dataset.standWeg}`, { method: 'DELETE' });
    } catch (fehler) {
      return melde(String(fehler.message || fehler), 'neg');
    }
    await laden();
    return standFormular(kid);
  }

  const staende = e.target.closest('[data-staende]');
  if (staende) return standFormular(staende.dataset.staende);

  const erhoehung = e.target.closest('[data-erhoehung]');
  if (erhoehung) return erhoehungFormular(erhoehung.dataset.erhoehung);
});

document.getElementById('dlgForm').addEventListener('submit', async e => {
  const form = e.target;
  const { absicht, bereich, id } = form.dataset;

  try {
    if (absicht === 'stamm') {
      await api(`/objekte/${encodeURIComponent(slug)}`,
                { method: 'PATCH', body: ausFormular(form, STAMMFELDER) });
    } else if (absicht === 'anteil') {
      const werte = ausFormular(form, ANTEILFELDER);
      await api(`/objekte/${encodeURIComponent(slug)}/anteile`, {
        method: 'POST',
        body: { eigentuemer_id: Number(werte.eigentuemer_id),
                promille: Number(werte.promille) || 1000,
                notiz: werte.notiz || '' },
      });
    } else if (absicht === 'zeitraum') {
      const werte = ausFormular(form, ZEITRAUMFELDER);
      await api(`/objekte/${encodeURIComponent(slug)}/zeitraeume`,
                { method: 'POST', body: { jahr: Number(werte.jahr) } });
    } else if (absicht === 'stand') {
      const werte = ausFormular(form, STANDFELDER);
      await api(`/kredite/${id}/staende`, {
        method: 'POST',
        body: { jahr: Number(werte.jahr), restschuld: werte.restschuld || 0 },
      });
      await laden();
      // Gleich weiter: Jahresstände werden meist mehrere auf einmal gepflegt.
      return standFormular(id);
    } else {
      const werte = ausFormular(form, BEREICHE[bereich].felder);
      let miete_id = id;
      if (id) {
        await api(`/stammdaten/${bereich}/${id}`, { method: 'PATCH', body: werte });
      } else {
        const neu = await api(`/objekte/${encodeURIComponent(slug)}/${bereich}`,
                              { method: 'POST', body: werte });
        miete_id = neu.id;
      }
      if (bereich === 'mieten') {
        await bewohnerSpeichern(form, miete_id);
        // Die Erhöhung löst den bisherigen Stand ab — er endet am Tag davor.
        if (form.dataset.vorgaenger && werte.ab_datum) {
          await api(`/stammdaten/mieten/${form.dataset.vorgaenger}`, {
            method: 'PATCH', body: { bis_datum: tagDavor(werte.ab_datum) } });
        }
      }
    }
    await laden();
  } catch (fehler) {
    melde(String(fehler.message || 'Konnte nicht gespeichert werden.'), 'neg');
  }
});

const ZEITRAUMFELDER = [
  { k: 'jahr', l: 'Abrechnungsjahr', typ: 'number', pflicht: true,
    vorgabe: new Date().getFullYear() - 1 },
];

let ANTEILFELDER = [];

async function anteilFormular() {
  let eigner = [];
  try { eigner = await api('/eigentuemer'); } catch { /* leer behandeln */ }
  if (!eigner.length) {
    const hin = await frage('Noch kein Eigentümer angelegt',
      'Eigentümer werden einmal zentral gepflegt und dann den Immobilien '
      + 'zugeordnet. Jetzt in den Einstellungen anlegen?',
      { knopf: 'Zu den Einstellungen' });
    if (hin) location.href = 'settings.html#eigentuemer';
    return;
  }
  ANTEILFELDER = [
    { k: 'eigentuemer_id', l: 'Eigentümer', typ: 'select',
      werte: eigner.map(e => e.name) },
    { k: 'promille', l: 'Anteil in Tausendstel (‰)', typ: 'number', schritt: '0.1',
      vorgabe: 1000, pflicht: true },
    { k: 'notiz', l: 'Notiz', typ: 'text' },
  ];
  await formular({ titel: 'Eigentümer zuordnen', felder: ANTEILFELDER,
                   absicht: 'anteil' });
  // Der Name im Auswahlfeld muss zur ID werden — die Reihenfolge ist dieselbe.
  const feld = document.getElementById('f_eigentuemer_id');
  eigner.forEach((e, i) => { feld.options[i].value = e.id; });
}

inhalt.addEventListener('click', async e => {
  const zeitraum = e.target.closest('[data-zeitraum]');
  if (zeitraum) {
    location.href = `zeitraum.html?z=${zeitraum.dataset.zeitraum}`;
    return;
  }

  if (e.target.closest('[data-zeitraum-neu]')) {
    return formular({ titel: 'Abrechnungszeitraum anlegen', felder: ZEITRAUMFELDER,
                      absicht: 'zeitraum' });
  }

  if (e.target.closest('[data-stamm]')) {
    return formular({ titel: 'Stammdaten bearbeiten', felder: STAMMFELDER,
                      werte: objekt, absicht: 'stamm' });
  }

  if (e.target.closest('[data-anteil-neu]')) return anteilFormular();

  const anteilWeg = e.target.closest('[data-anteil]');
  if (anteilWeg) {
    const ja = await frage('Zuordnung entfernen?',
      'Der Eigentümer bleibt erhalten — nur die Beteiligung an dieser '
      + 'Immobilie wird gelöst.', { knopf: 'Entfernen', gefahr: true });
    if (!ja) return;
    try {
      await api(`/anteile/${anteilWeg.dataset.anteil}`, { method: 'DELETE' });
    } catch (fehler) {
      return melde(String(fehler.message || 'Konnte nicht entfernt werden.'), 'neg');
    }
    return laden();
  }

  const cloud = e.target.closest('[data-cloud]');
  if (cloud && cloud.dataset.cloud === 'status') return cloudZeigen();
  if (cloud) {
    cloud.disabled = true;
    cloud.textContent = 'Lege an …';
    try {
      const antwort = await api(
        `/nextcloud/objekte/${encodeURIComponent(slug)}/struktur`, { method: 'POST' });
      cloud.textContent = antwort.neu_angelegt.length
        ? `${antwort.neu_angelegt.length} Ordner angelegt`
        : 'Alles schon vorhanden';
      setTimeout(cloudZeigen, 1600);
    } catch (fehler) {
      cloud.disabled = false;
      cloud.textContent = 'Fehlgeschlagen — nochmal';
      melde(String(fehler.message || fehler), 'neg');
    }
    return;
  }

  if (e.target.closest('[data-export]')) {
    location.href = `/api/objekte/${encodeURIComponent(slug)}/export`;
    return;
  }

  const weg = e.target.closest('[data-loeschen]');
  if (weg) {
    // Schieben statt klicken: Löschen ist nicht rückgängig zu machen, und ein
    // zweiter Klick an derselben Stelle passiert zu leicht aus Versehen.
    const ja = await schiebeFrage(`„${objekt.name}“ löschen`,
      'Alle Eingaben zu dieser Immobilie werden entfernt. Die Unterlagen in '
      + 'der Nextcloud bleiben bestehen; eine Sicherung wird vorher dort '
      + 'abgelegt.', 'Zum Löschen schieben');
    if (!ja) return;
    weg.disabled = true;
    weg.textContent = 'Sichere und lösche …';
    try {
      const antwort = await api(`/objekte/${encodeURIComponent(slug)}`,
                                { method: 'DELETE' });
      // Erst melden, dann zurück: sonst wäre die Bestätigung schon weg,
      // bevor sie jemand gelesen hat.
      melde(antwort.sicherung?.gesichert
        ? `„${antwort.name}“ gelöscht · Sicherung: ${antwort.sicherung.pfad}`
        : `„${antwort.name}“ gelöscht — ohne Sicherung in der Nextcloud `
          + `(${antwort.sicherung?.grund || 'kein Grund genannt'})`,
        antwort.sicherung?.gesichert ? 'pos' : '');
      setTimeout(() => { location.href = 'index.html'; }, 2600);
    } catch (fehler) {
      weg.disabled = false;
      weg.textContent = 'Immobilie löschen';
      melde(String(fehler.message || fehler), 'neg');
    }
    return;
  }

  const del = e.target.closest('[data-del]');
  if (del) {
    e.stopPropagation();
    const [bereich, id] = del.dataset.del.split(':');
    const ja = await frage(`${BEREICHE[bereich].einzahl} löschen?`,
      'Der Eintrag wird entfernt. Rückgängig machen lässt sich das nicht.',
      { knopf: 'Löschen', gefahr: true });
    if (!ja) return;
    try {
      await api(`/stammdaten/${bereich}/${id}`, { method: 'DELETE' });
    } catch (fehler) {
      return melde(String(fehler.message || 'Konnte nicht gelöscht werden.'), 'neg');
    }
    return laden();
  }

  const add = e.target.closest('[data-add]');
  if (add) {
    const bereich = add.dataset.add;
    return formular({ titel: `${BEREICHE[bereich].einzahl} hinzufügen`,
                      felder: BEREICHE[bereich].felder, bereich,
                      absicht: 'eintrag',
                      extra: bereich === 'mieten' ? mietExtra(null) : '' });
  }

  const edit = e.target.closest('[data-edit]');
  if (edit) {
    const [bereich, id] = edit.dataset.edit.split(':');
    const eintrag = (await api(`/objekte/${encodeURIComponent(slug)}/${bereich}`))
      .find(x => String(x.id) === id);
    if (!eintrag) return;
    const extra = bereich === 'mieten' ? mietExtra(eintrag)
                : bereich === 'kredite' ? kreditExtra(eintrag) : '';
    return formular({ titel: `${BEREICHE[bereich].einzahl} bearbeiten`,
                      felder: BEREICHE[bereich].felder, bereich,
                      werte: eintrag, absicht: 'eintrag', extra });
  }
});

await laden();
</script>
