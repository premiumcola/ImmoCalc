<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Objekt · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .barlogo{width:34px;height:34px;border-radius:9px;overflow:hidden;flex:none;
           border:none;background:none;padding:0;cursor:pointer;display:block}
  .barlogo:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;
          font:600 12px var(--mono);margin-bottom:18px;line-height:1.4}
  .banner .d{width:8px;height:8px;border-radius:50%;flex:none}
  .banner .days{margin-left:auto;font-weight:700;white-space:nowrap}
  .banner.pos{background:var(--pos-bg);color:var(--pos)} .banner.pos .d{background:var(--pos)}
  .banner.amber{background:var(--amber-bg);color:var(--amber)} .banner.amber .d{background:var(--amber)}
  .banner.neg{background:var(--neg-bg);color:var(--neg)} .banner.neg .d{background:var(--neg)}

  .sekopf{display:flex;align-items:baseline;gap:10px;margin:26px 0 12px}
  .sekopf h2.sec{font:700 17px var(--disp);letter-spacing:-.015em;margin:0;flex:1}
  .sekopf button{border:none;background:none;color:var(--teal-d);cursor:pointer;
    font:600 12.5px var(--disp);padding:8px 4px;margin:-8px -4px;min-height:44px}
  .sekopf button:hover{color:var(--teal)}
  .sekopf:first-child{margin-top:0}

  .liste{background:var(--sheet);border-radius:14px;overflow:hidden;margin-bottom:10px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .eintrag{display:flex;gap:12px;align-items:center;padding:13px 15px;width:100%;
           border:none;background:none;text-align:left;font-family:var(--body);
           color:inherit}
  .eintrag + .eintrag{border-top:1px solid var(--line)}
  .eintrag .sym{width:34px;height:34px;border-radius:10px;flex:none;display:flex;
                align-items:center;justify-content:center;background:#EDF1F0;
                color:var(--soft)}
  .eintrag .sym svg{width:20px;height:20px;display:block}
  .eintrag .et{flex:1;min-width:0}
  /* hyphens vor overflow-wrap: aus „Ankaufsdarlehen" wird ein getrenntes
     „Ankaufs-darlehen" statt eines Bruchs mitten im Wort. break-word bricht
     nur, wo eine Wortgrenze ist; anywhere zerschnitt jedes Wort. */
  .eintrag .en{display:block;font:600 14px var(--disp);letter-spacing:-.01em;
               hyphens:auto;overflow-wrap:break-word}
  /* Der Zustandshinweis läuft mit dem Namen mit, statt ihm Platz wegzunehmen —
     als eigene Spalte quetscht er den Namen auf schmalen Geräten Buchstabe
     für Buchstabe um. */
  .eintrag .en .chip{margin-left:6px;vertical-align:1px;font-size:10px}
  .eintrag .ed{display:block;font:400 12px var(--body);color:var(--soft);margin-top:3px;
               line-height:1.4;overflow-wrap:anywhere}
  .eintrag .ew{font:600 13px var(--mono);white-space:nowrap;flex:none}
  .eintrag.klick{cursor:pointer}
  .eintrag.klick:hover{background:#F6F8F8}
  /* CLXXXVII — Löschen ist ein Ziel für den Daumen: 44x44. Die negativen
     Ränder halten die Zeile trotzdem so hoch wie zuvor — der Knopf greift in
     die Zeilenpolsterung hinein, statt sie zu vergrössern. */
  .eintrag .del{border:none;background:none;color:var(--soft);font:400 18px var(--body);
                cursor:pointer;padding:0;width:44px;height:44px;flex:none;
                margin:-5px -12px -5px 0;border-radius:11px}
  .eintrag .del:hover{color:var(--neg)}
  .leerzeile{font:400 13px var(--body);color:var(--soft);padding:16px 15px;text-align:center}
  .add{width:100%;border:1.5px dashed #B4C4C1;background:transparent;color:var(--teal-d);
       border-radius:12px;padding:12px;font:600 13.5px var(--disp);cursor:pointer;
       min-height:44px;margin-bottom:4px}
  .add:hover{background:var(--teal-l)}

  /* Stammdaten als Paarliste — Beschriftung links, Wert rechts */
  .paare{background:var(--sheet);border-radius:14px;padding:4px 15px;margin-bottom:10px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .paar{display:flex;justify-content:space-between;gap:14px;padding:11px 0;
        font:500 13.5px var(--body)}
  .paar + .paar{border-top:1px solid var(--line)}
  .paar .pl{color:var(--soft);flex:none}
  .paar .pv{font-family:var(--mono);font-weight:600;text-align:right;min-width:0;
            overflow-wrap:anywhere}
  .paar .pv.leer{color:var(--soft);font-weight:400;font-family:var(--body)}
  /* Gerechnete Zeilen treten zurück — sie sind Ergebnis, nicht Eingabe. */
  .paar .pv.abgeleitet{color:var(--teal-d)}
  /* Freitext bekommt die ganze Zeilenbreite: nebeneinander bliebe für den
     Wortlaut aus dem Katasterauszug eine Spalte von vier Zeichen. */
  .paar.lang{flex-direction:column;align-items:flex-start;gap:4px}
  .paar.lang .pv{text-align:left;font-size:13px}
  .fussnote{font:400 12px var(--body);color:var(--soft);line-height:1.5;
            margin:-2px 2px 10px}

  dialog{border:none;border-radius:18px;padding:0;max-width:420px;width:calc(100% - 32px);
         background:var(--paper);box-shadow:0 30px 70px -20px rgba(22,38,44,.5);
         max-height:86dvh}
  dialog::backdrop{background:rgba(22,38,44,.45)}
  dialog .dh{font:700 17px var(--disp);letter-spacing:-.02em;padding:20px 20px 4px}
  dialog form{padding:12px 20px 20px;overflow-y:auto;max-height:calc(86dvh - 60px)}
  .zeile2{display:flex;gap:10px} .zeile2 > *{flex:1}

  .cloudbox{background:var(--sheet);border-radius:14px;padding:15px;margin-bottom:10px;
            box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .cloudbox .zeile{display:flex;gap:12px;align-items:center}
  .cloudbox .sym{width:42px;height:42px;border-radius:11px;flex:none;display:flex;
                 align-items:center;justify-content:center;font:600 16px var(--mono)}
  .cloudbox .sym.offen{background:var(--amber-bg);color:var(--amber)}
  .cloudbox .sym.fertig{background:var(--pos-bg);color:var(--pos)}
  .cloudbox .txt{flex:1;min-width:0}
  .cloudbox .t{display:block;font:600 14px var(--disp);letter-spacing:-.01em}
  .cloudbox .d{display:block;font:400 12px var(--body);color:var(--soft);margin-top:3px;
               line-height:1.45;word-break:break-word}
  .cloudbox .tat{margin-top:12px}
  .cloudbox .tat button,.cloudbox .tat a{display:block;width:100%;text-align:center;
    border:none;border-radius:11px;padding:12px;cursor:pointer;font:600 13.5px var(--disp);
    min-height:44px;background:var(--teal);color:#fff;text-decoration:none}
  .cloudbox .tat button:hover,.cloudbox .tat a:hover{background:var(--teal-d)}
  .cloudbox .tat button[disabled]{opacity:.6;cursor:default}
  /* Ist die Struktur da, ist das Nachlegen nur noch eine Nebensache:
     kleiner, rechts, ohne Farbfläche. */
  .cloudbox .tat.nebensache{margin-top:10px;text-align:right}
  .cloudbox .tat.nebensache button{display:inline-block;width:auto;background:none;
    color:var(--teal-d);padding:9px 12px;min-height:40px;font-size:12.5px;
    box-shadow:inset 0 0 0 1.5px var(--line)}
  .cloudbox .tat.nebensache button:hover{background:var(--teal-l)}
  .strukturliste{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
                 gap:6px;margin-top:12px}
  .strukturliste span{font:500 11px var(--mono);color:var(--soft);background:#F1F4F4;
    border-radius:8px;padding:7px 9px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap}
  .strukturliste span.eigen{background:var(--teal-l);color:var(--teal-d)}

  .gefahr-block{margin-top:30px;border-radius:16px;background:var(--sheet);padding:16px;
                box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .gefahr-block .gt{font:600 14px var(--disp);letter-spacing:-.01em;margin-bottom:6px}
  .gefahr-block p{font:400 12.5px var(--body);color:var(--soft);margin:0 0 14px;
                  line-height:1.5}
  .gefahr-block .btn + .btn{margin-top:8px}

  /* Untergruppen im Dialog: Bewohner, Jahresstände — eigener Block mit Luft,
     damit sie nicht wie ein weiteres Formularfeld wirken. */
  .block{margin:22px 0 16px}
  .block .bt{display:block;font:700 13px var(--disp);letter-spacing:-.01em;
             margin-bottom:5px}
  .block .bd{display:block;font:400 12px var(--body);color:var(--soft);
             line-height:1.5;margin-bottom:12px}
  .bwzeile{background:var(--sheet);border-radius:12px;padding:11px 12px;
           margin-bottom:8px;position:relative}
  .bwzeile input{width:100%;border:1.5px solid var(--line);border-radius:9px;
    padding:10px 11px;font:400 14px var(--body);color:var(--ink);background:#fff;
    margin-bottom:7px;min-height:44px}
  .bwzeile input:last-of-type{margin-bottom:0}
  .bwzeile input:focus{outline:none;border-color:var(--teal)}
  .bwzeile .weg{position:absolute;top:3px;right:3px;border:none;background:none;
    color:var(--soft);font:400 20px var(--body);cursor:pointer;
    width:44px;height:44px;border-radius:11px}
  .bwzeile .weg:hover{color:var(--neg);background:var(--paper)}
  .bwzeile .nm{padding-right:48px}
  .zusatz{width:100%;border:1.5px dashed #B4C4C1;background:transparent;
    color:var(--teal-d);border-radius:11px;padding:11px;font:600 13px var(--disp);
    cursor:pointer;min-height:44px}
  .zusatz:hover{background:var(--teal-l)}

  .jahre{background:var(--sheet);border-radius:12px;overflow:hidden;margin-bottom:12px}
  .jahr{display:flex;align-items:center;gap:8px;padding:9px 10px;
        font:500 13px var(--body)}
  .jahr + .jahr{border-top:1px solid var(--line)}
  .jahr .jj{font:600 12px var(--mono);color:var(--soft);flex:none;width:36px}
  /* Der Betrag darf nie umbrechen — „240.000,00" und das € gehören zusammen. */
  .jahr .jw{font:600 12.5px var(--mono);flex:1;text-align:right;white-space:nowrap}
  .jahr .jq{font:500 10px var(--mono);letter-spacing:.02em;padding:4px 7px;
            border-radius:8px;background:#F1F4F4;color:var(--soft);flex:none;
            white-space:nowrap}
  .jahr.gemessen .jq{background:var(--teal-l);color:var(--teal-d)}
  .jahr .weg{border:none;background:none;color:var(--soft);font:400 18px var(--body);
    cursor:pointer;width:44px;height:44px;border-radius:11px;flex:none;
    margin:-6px -4px -6px 0}
  .jahr .weg:hover{color:var(--neg);background:var(--paper)}
  .dlgnote{font:400 12px var(--body);color:var(--soft);line-height:1.5;
           margin:0 0 16px}

  /* ---- CLXVIII: zwei Ebenen ------------------------------------------
     Der Weg zurück zum Haus steht ganz oben und sieht aus wie eine Karte,
     nicht wie ein Formularknopf — er führt eine Stufe hinauf, nicht weiter. */
  .hausweg{display:flex;align-items:center;gap:12px;width:100%;border:none;
    background:var(--sheet);border-radius:14px;padding:12px 14px;cursor:pointer;
    font-family:var(--body);color:inherit;text-align:left;margin-bottom:20px;
    min-height:56px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .hausweg:hover{background:#F6F8F8}
  .hausweg:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .hausweg .pfeil{font:400 20px var(--body);color:var(--soft);flex:none;
    width:22px;text-align:center}
  .hausweg .ic{width:38px;height:38px;border-radius:10px;overflow:hidden;flex:none}
  .hausweg .ic svg{width:100%;height:100%;display:block}
  .hausweg .ht{flex:1;min-width:0}
  .hausweg .hl{display:block;font:500 10.5px var(--mono);color:var(--soft);
    letter-spacing:.06em;text-transform:uppercase}
  .hausweg .hn{display:block;font:600 14.5px var(--disp);letter-spacing:-.01em;
    margin-top:3px;overflow-wrap:anywhere}

  /* ---- CLXIX: Einheiten als Blasen — dieselbe Sprache wie die Startseite */
  .bubbles{display:flex;flex-wrap:wrap;gap:6px}
  .bubble{display:inline-flex;align-items:center;gap:8px;max-width:100%;
    min-height:44px;padding:8px 16px;border:none;border-radius:999px;
    background:var(--sheet);color:inherit;font-family:var(--body);
    text-align:left;cursor:pointer;box-shadow:0 1px 2px rgba(22,38,44,.06);
    transition:transform .1s,box-shadow .15s}
  .bubble:hover{box-shadow:0 5px 14px -8px rgba(22,38,44,.3)}
  .bubble:active{transform:scale(.97)}
  .bubble:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .bubble .bt{font:600 13.5px var(--body);line-height:1.3;
              overflow-wrap:anywhere;min-width:0}
  .bubble .bf{font:500 10.5px var(--mono);color:var(--soft);white-space:nowrap}
  .bubble.frei{background:#F1F4F4}
  .bubble .bfrei{font:600 10.5px var(--mono);color:var(--amber);
    letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  /* Die gewählte Blase trägt die Auszeichnungsfarbe — eine Wahl, sichtbar
     ohne Häkchen. */
  .bubble.gewaehlt{background:var(--teal);box-shadow:none}
  .bubble.gewaehlt .bt{color:#fff}
  .bubble.gewaehlt .bf,.bubble.gewaehlt .bfrei{color:rgba(255,255,255,.8)}
  .feldnote{display:block;font:400 11.5px var(--body);color:var(--soft);
    line-height:1.5;margin-top:8px}
  /* ---- CXCIII: gedeckter Ja/Nein-Schalter, im Ton der Blasen ---- */
  .schalter{display:inline-flex;gap:4px;padding:4px;border-radius:999px;
    background:var(--paper);box-shadow:inset 0 1px 2px rgba(22,38,44,.06)}
  .schaltknopf{min-height:40px;min-width:72px;padding:8px 20px;border:none;
    border-radius:999px;background:transparent;color:var(--soft);
    font:600 13.5px var(--body);cursor:pointer;transition:background .12s,
    color .12s,box-shadow .12s}
  .schaltknopf:active{transform:scale(.97)}
  .schaltknopf:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .schaltknopf.an{background:var(--teal);color:#fff;
    box-shadow:0 1px 2px rgba(22,38,44,.12)}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button class="back" id="back">Zurück</button>
    <a class="barlogo" id="barlogo" href="index.html" aria-label="Zur Übersicht"></a>
    <div class="barwrap">
      <h1 id="titel">Objekt</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll" id="inhalt"></div>

  <div data-nav></div>
</div>

<dialog id="dlg">
  <div class="dh" id="dlgTitel">Eintrag</div>
  <!-- Kein method="dialog": das schliesst den Dialog beim Absenden sofort,
       noch bevor der Handler die Antwort hat. Wird das Speichern abgelehnt —
       etwa weil die Einheit schon vermietet ist —, waren damit alle Eingaben
       weg. Geschlossen wird jetzt erst, wenn es geklappt hat. -->
  <form id="dlgForm"></form>
</dialog>

<script type="module">
import { installLogos, installNav, logoSvg, api, eur, eurVoll, esc, fristKlasse,
         fristText, melde, frage, schiebeFrage, promille } from './assets/immo.js';
import { kostenIcon } from './assets/kostenicons.js';
import { auswahlfeld } from './assets/auswahl.js';
installNav();

/* Lesbare Eingabe (Tausenderpunkte, IBAN in Vierergruppen, Steuernummer).
   Bewusst dynamisch geladen: fehlt die Datei, bleiben es schlichte Felder —
   die Seite muss deswegen nicht ausfallen. */
let eingabe = null;
try {
  eingabe = await import('./assets/eingabe.js');
} catch {
  eingabe = null;
}

installLogos();

/* Ein Grundstück ist ein eigener Fall, kein Haus mit weniger Feldern: keine
   Einheiten, keine Nebenkostenabrechnung, dafür Kataster und Grundsteuer.
   Erkannt wird es am Objekttyp. */
const GRUNDSTUECK = 'lg-grundstueck';
const istGrundstueck = () => Boolean(objekt) && objekt.typ === GRUNDSTUECK;

const anfrage = new URLSearchParams(location.search);
const slug = anfrage.get('o');
/* CLXVIII — dieselbe Seite, zwei Ebenen: ohne `e` das ganze Haus, mit `e` die
   eine Einheit im Fokus. Als zweite Datei wären Mietverhältnis, Kontakte und
   Abrechnung ein zweites Mal zu pflegen und liefen mit der Zeit auseinander. */
const fokusWunsch = anfrage.get('e');
const inhalt = document.getElementById('inhalt');
const titel = document.getElementById('titel');
const sub = document.getElementById('sub');
const dlg = document.getElementById('dlg');

const hausUrl = () => `objekt.html?o=${encodeURIComponent(slug)}`;
const einheitUrl = id => `${hausUrl()}&e=${id}`;

/* Aus dem Fokus führt „Zurück" immer ans Haus — auch wenn man über einen Link
   direkt in der Einheit gelandet ist und es gar keine Historie gibt. */
document.getElementById('back').addEventListener('click', () => {
  if (fokus) { location.href = hausUrl(); return; }
  return history.length > 1 ? history.back() : location.href = 'index.html';
});

/* Zahlungsturnus kommt aus der API — die Bereiche haben unterschiedliche
   sinnvolle Auswahlen, und die soll nicht doppelt gepflegt werden. */
const turnusCache = new Map();
async function turnusOptionen(bereich) {
  if (!turnusCache.has(bereich)) {
    try {
      turnusCache.set(bereich, await api(`/turnus/${bereich}`));
    } catch {
      turnusCache.set(bereich, { optionen: [], vorgabe: '' });
    }
  }
  return turnusCache.get(bereich);
}

const proTurnus = { monatlich: '/ M', vierteljaehrlich: '/ Q', halbjaehrlich: '/ HJ',
                    jaehrlich: '/ J', einmalig: 'einm.' };
const kuerzel = t => proTurnus[t] || '/ J';
/* Wie oft im Jahr gezahlt wird — Grundlage für Monats- und Jahresgrößen. */
const proJahr = t => ({ monatlich: 12, vierteljaehrlich: 4,
                        halbjaehrlich: 2 }[t] || 1);

/* ---- CXLIX: Darlehen oder Bausparvertrag --------------------------------
   Beide hängen an derselben Immobilie und kosten dieselbe Rate im Monat —
   gerechnet werden sie umgekehrt. Beim Darlehen sinkt die Restschuld, beim
   Bausparvertrag wächst das Guthaben. Deshalb entscheidet die Vertragsart
   ganz oben, wie die Maske darunter aussieht; die Regeln dazu stehen in
   `api/app/vermoegen.py`, hier wird nur gefragt und gezeigt. */
const VERTRAGSARTEN = ['Darlehen', 'Bausparvertrag'];
const istBausparer = art =>
  String(art || '').trim().toLowerCase().startsWith('bauspar');

function kreditFelder(art, werte = {}) {
  const bauspar = istBausparer(art);
  return [
    { k: 'art', l: 'Vertragsart', typ: 'auswahl', werte: VERTRAGSARTEN,
      vorgabe: 'Darlehen', ohneLeer: true, umbau: true,
      note: bauspar
        ? 'Beim Bausparvertrag wird gespart, nicht getilgt: eingetragen '
          + 'werden Bausparsumme und Guthaben.'
        : 'Beim Darlehen wird getilgt: eingetragen wird die Restschuld.' },
    { k: 'bezeichnung', l: 'Bezeichnung', typ: 'text', pflicht: true },
    { k: 'bank', l: bauspar ? 'Bausparkasse' : 'Bank', typ: 'text' },
    { k: 'darlehensnummer', l: bauspar ? 'Vertragsnummer' : 'Darlehensnummer',
      typ: 'text' },
    ...(bauspar ? [
      { k: 'bausparsumme', l: 'Bausparsumme', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'angespart', l: 'Bisher angespart', typ: 'number', schritt: '0.01',
        geld: true, note: (werte.uebernommen
          ? 'Aus der bisherigen Restschuld vorgeschlagen — prüfe den Betrag, '
            + 'bevor du speicherst. '
          : '')
          + 'Was noch zu sparen ist, ergibt sich als Differenz zur '
          + 'Bausparsumme.' },
    ] : [
      { k: 'urspruenglich', l: 'Ursprungsbetrag', typ: 'number', schritt: '0.01',
        geld: true },
      { k: 'restschuld', l: 'Restschuld bei Beginn', typ: 'number',
        schritt: '0.01', geld: true },
      /* CXLVIII — zwei Wege zum selben Satz. Wer den Zinssatz nicht kennt,
         liest den monatlichen Zinsanteil aus dem Kontoauszug ab; die Kopplung
         rechnet ihn in den Satz um (und umgekehrt). Gespeichert wird nur der
         Zinssatz — ein zweites Feld am Modell wäre eine zweite Wahrheit,
         deshalb `hilfe: true`. Beim Bausparvertrag gibt es nichts
         umzurechnen: dort fällt kein Zins an, dort kommt welcher dazu. */
    ]),
    { k: 'zinssatz', l: bauspar ? 'Guthabenzins' : 'Zinssatz', typ: 'number',
      schritt: '0.01', einheit: '%' },
    ...(bauspar ? [] : [
      { k: 'zins_monat', l: 'Zinsanteil je Monat', typ: 'number',

/* Was ein Vertrag heute wert ist — als Schuld oder als Guthaben. */
function kreditStandText(e) {
  if (istBausparer(e.art)) {
    const gespart = e.guthaben_aktuell ?? e.angespart ?? 0;
    return e.bausparsumme
      ? `${eurVoll(gespart)} von ${eurVoll(e.bausparsumme)}`
      : (gespart ? `Guthaben ${eurVoll(gespart)}` : '');
  }
  return restText(e);
}

/* Welche Felder ein Formular zeigt. Nur die Kredite hängen von einem Wert im
   Formular selbst ab — der Vertragsart. */
const felderFuer = (bereich, werte = {}) => bereich === 'kredite'
  ? kreditFelder(werte.art, werte) : cfgFuer(bereich).felder;

/* Wird ein Vertrag von Darlehen auf Bausparvertrag umgestellt, ist der Betrag
   derselbe und seine Bedeutung eine andere: aus der Restschuld wird das
   Guthaben. Genau dieser Fall steht heute in der Datenbank — der „LBS
   Bausparer" lief als Kredit. Der Betrag wird deshalb angeboten, nicht
   ersetzt: er steht sichtbar im Feld und wird erst mit „Speichern" übernommen.
   Umgekehrt gibt es nichts anzubieten — ein Guthaben ist keine Schuld. */
function uebernahmeAnbieten(werte) {
  if (istBausparer(werte.art) && werte.angespart == null && werte.restschuld) {
    return { ...werte, angespart: werte.restschuld, uebernommen: true };
  }
  return werte;
}

/* Beim Grundstück gibt es keine Wohnfläche und kein Hauskonto — die Zeilen
   stehen dort nicht ausgegraut herum, sie kommen gar nicht erst vor. Der
   Verkehrswert wandert in den Grundstücksblock. */
const OHNE_BEIM_GRUNDSTUECK = new Set(['flaeche', 'verkehrswert']);
const stammfelder = () => istGrundstueck()
  ? STAMMFELDER.filter(f => !OHNE_BEIM_GRUNDSTUECK.has(f.k))
  : STAMMFELDER;

const datum = s => s ? new Date(s).toLocaleDateString('de-DE') : '';

/* Datum als ISO-Tag ohne Umweg über UTC — `toISOString` verschiebt in
   Mitteleuropa auf den Vortag und macht aus dem 1. den 31. */
const isoDatum = d => `${d.getFullYear()}-${String(d.getMonth() + 1)
  .padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
const tagDavor = iso => {
  const d = new Date(`${iso}T12:00:00`);
  d.setDate(d.getDate() - 1);
  return isoDatum(d);
};
const ersterNaechsterMonat = () => {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + 1);
  return isoDatum(d);
};

/* Zinssatz deutsch: 2,75 statt 2.75 — zwei Nachkommastellen, mehr nie. */
const prozent = n => Number(n).toLocaleString('de-DE', { maximumFractionDigits: 2 });

/* Wer ist erreichbar: der Hauptkontakt am Mietverhältnis und die Bewohner,
   die eine eigene Mailadresse haben. */
function kontaktText(e) {
  const extra = (e.bewohner || []).filter(b => b.email).length;
  if (!e.email && !extra) return '✉ fehlt';
  const zahl = (e.email ? 1 : 0) + extra;
  return zahl === 1 ? '✉ hinterlegt' : `✉ ${zahl} Adressen`;
}

/* Die Restschuld, die heute gilt. Ohne Cent: zwischen zwei Jahresständen ist
   sie gerechnet, da wäre eine Angabe auf den Cent nur vorgetäuschte Schärfe. */
function restText(e) {
  const rest = e.restschuld_aktuell ?? e.restschuld;
  return rest ? `Rest ${eurVoll(rest)}` : '';
}

/* IBAN in Vierergruppen, egal wie sie gespeichert wurde: „DE42 7635 0000 …".
   Die letzte Gruppe darf kürzer sein. */
const ibanSchoen = s => String(s || '').replace(/\s+/g, '').toUpperCase()
  .replace(/(.{4})/g, '$1 ').trim();

function stammwert(f, o) {
  const v = o[f.k];
  if (v == null || v === '') return null;
  if (f.typ === 'date') return datum(v);
  if (f.iban) return ibanSchoen(v);
  // `voll`: ein Kaufpreis oder Verkehrswert ist ein runder Betrag — die zwei
  // Nachkommastellen sind dort nur Rauschen. Der Grundsteuer-Messbetrag (1,43 €)
  // trägt sie dagegen bewusst.
  if (f.geld) return f.voll ? eurVoll(v) : eur(v);
  if (f.einheit) return `${Number(v).toLocaleString('de-DE')} ${f.einheit}`;
  return String(v);
}

let daten = null;
/* Die Einheiten des Hauses — gebraucht von der Hausebene, vom Fokus und von
   den Blasen im Mietformular. Ein Grundstück hat keine. */
let einheiten = [];
/* Die Einheit, auf die gerade geschaut wird — null heisst: das ganze Haus. */
let fokus = null;

const flaecheText = f => `${Number(f).toLocaleString('de-DE',
  { maximumFractionDigits: 1 })} m²`;

/* Auf welche Einheit ein Mietverhältnis zeigt. Spiegelt `verteilung.bezuege`:
   ohne Angabe gehört es bei genau einer Einheit zu dieser — sonst nirgendwohin. */
const zuEinheit = m => (m.einheit || '').trim()
  || (einheiten.length === 1 ? einheiten[0].bezeichnung : '');

function bannerHtml(z) {
  if (!z || z.frist_tage == null) return '';
  const k = fristKlasse(z.frist_tage);
  const tage = z.frist_tage < 0
    ? `${Math.abs(z.frist_tage)} Tage über`
    : `noch ${z.frist_tage} Tage`;
  return `<div class="banner ${k}"><span class="d"></span>
      <span>Frist § 556 BGB · ${esc(z.label)}</span>
      <span class="days">${tage}</span></div>`;
}

/* Was nach einem Update noch nachzutragen wäre — ruhig, nie als Fehler. */
function nachpflegeHtml(n) {
  if (!n || !n.anzahl) return '';
  return `<div class="merker"><span class="hi">!</span><span class="ht">
      <span class="t">${n.anzahl === 1 ? 'Eine Angabe fehlt noch'
                                        : `${n.anzahl} Angaben fehlen noch`}</span>
      <span class="d">${esc(n.text)}. Nichts davon ist dringend — die
        Abrechnung läuft auch ohne. Ergänzen kannst du es jederzeit.</span>
    </span></div>`;
}

function kennzahlenHtml(v, jahresmiete, restschuld, guthaben) {
  if (!v) return '';
  // Die Restschuld kommt aus den fortgeschriebenen Krediten dieser Seite.
  // Stünde hier der eingetragene Stand, widerspräche die Kennzahl oben der
  // Kreditzeile weiter unten.
  const rest = restschuld != null ? Math.round(restschuld * 100) / 100
                                  : v.restschuld;
  // CXLIX — ein Bausparguthaben ist Guthaben, keine Schuld: es kommt zum
  // Eigenkapital hinzu, statt es zu drücken.
  const gespart = guthaben != null ? Math.round(guthaben * 100) / 100
                                   : (v.bauspar_guthaben || 0);
  const eigen = v.wert != null
    ? Math.round((v.wert - rest + gespart) * 100) / 100 : null;
  const zellen = [];
  if (v.wert != null)
    zellen.push(['kv', eur(v.wert), istGrundstueck() ? 'Grundstückswert'
                                                     : (v.wertquelle || 'Wert')]);
  if (rest) zellen.push(['kv neg', eur(rest), 'Restschuld']);
  if (gespart) zellen.push(['kv pos', eur(gespart), 'Bausparguthaben']);
  if (eigen != null)
    zellen.push([`kv ${eigen >= 0 ? 'pos' : 'neg'}`, eur(eigen), 'Eigenkapital']);
  if (jahresmiete) zellen.push(['kv', eur(jahresmiete),
    istGrundstueck() ? 'Pacht pro Jahr' : 'Miete pro Jahr']);
  if (!zellen.length) return '';
  return `<div class="kennzahlen">${zellen.map(([k, w, l]) =>
    `<div class="kennzahl"><span class="${k}">${w}</span>
       <span class="kl">${esc(l)}</span></div>`).join('')}</div>`;
}

function paarZeile(label, wert, { abgeleitet = false, lang = false } = {}) {
  return `<div class="paar${lang && wert ? ' lang' : ''}">
    <span class="pl">${esc(label)}</span>
    <span class="pv${wert ? (abgeleitet ? ' abgeleitet' : '') : ' leer'}"
      >${wert ? esc(wert) : 'nicht erfasst'}</span></div>`;
}

function stammHtml(o) {
  const zeilen = stammfelder()
    .map(f => paarZeile(f.l, stammwert(f, o))).join('');
  return `<div class="sekopf"><h2 class="sec">Stammdaten</h2>
      <button data-stamm="1">Bearbeiten</button></div>
    <div class="paare">${zeilen}</div>`;
}

/* Preis je m² und Grundsteuer werden gerechnet, nicht gepflegt: sie stünden
   sonst irgendwann im Widerspruch zu den Zahlen, aus denen sie stammen. */
function grundstueckHtml(o) {
  if (!istGrundstueck()) return '';
  const zeilen = GRUNDFELDER
    .map(f => paarZeile(f.l, stammwert(f, o), { lang: f.lang })).join('');
  const abgeleitet = [];
  if (o.verkehrswert && o.grundstueck_flaeche) {
    abgeleitet.push(['Wert je m²', eur(o.verkehrswert / o.grundstueck_flaeche)]);
  }
  if (o.grundsteuer_messbetrag && o.grundsteuer_hebesatz) {
    abgeleitet.push(['Grundsteuer im Jahr',
      eur(o.grundsteuer_messbetrag * o.grundsteuer_hebesatz / 100)]);
  }
  return `<div class="sekopf"><h2 class="sec">Grundstück</h2>
      <button data-grund="1">Bearbeiten</button></div>
    <div class="paare">${zeilen}${
      abgeleitet.map(([l, w]) => paarZeile(l, w, { abgeleitet: true })).join('')}</div>
    ${abgeleitet.length ? `<div class="fussnote">Wert je m² und Grundsteuer
      rechnet ImmoCalc aus den Angaben darüber — eingetragen wird nur, was im
      Bescheid steht.</div>` : ''}`;
}

/* CCVIII — die WEG-Ebene. Beim Grundstück gibt es sie nicht (keine Mieter, keine
   Hausverwaltung). Ist das Objekt keine WEG, steht hier nur der Hinweis, wie man
   es einschaltet; ist es eine, stehen Hausgeld, Rücklagenzuführung und
   Verwalter. Der Wirtschaftsplan hat vorerst keinen eigenen Datensatz — Platz
   dafür schafft die Notiz am Verwalter und die Fussnote. */
function wegHtml(o) {
  if (istGrundstueck()) return '';
  if (!o.weg) {
    return `<div class="sekopf"><h2 class="sec">WEG-Ebene</h2>
        <button data-weg="1">Einrichten</button></div>
      <div class="fussnote">Ist diese Wohnung Teil einer
        Wohnungseigentümergemeinschaft, verteilt die Hausverwaltung die
        Nebenkosten. Schalte die WEG-Ebene ein: du trägst dann die fertigen
        Werte je Mieter direkt ein und pflegst hier Hausgeld und
        Wirtschaftsplan.</div>`;
  }
  const zeilen = WEGFELDER
    .filter(f => f.k !== 'weg')
    // Der Verwaltername ist oft lang — als eigene Zeilenbreite statt eines
    // Bruchs mitten im Wort in der schmalen rechten Spalte.
    .map(f => paarZeile(f.l, stammwert(f, o),
                        { lang: f.k === 'weg_verwalter' })).join('');
  const jahr = o.hausgeld_monatlich
    ? paarZeile('Hausgeld im Jahr', eurVoll(o.hausgeld_monatlich * 12),
                { abgeleitet: true })
    : '';
  return `<div class="sekopf"><h2 class="sec">WEG-Ebene</h2>
      <button data-weg="1">Bearbeiten</button></div>
    <div class="paare">${zeilen}${jahr}</div>
    <div class="fussnote">Die Hausverwaltung verteilt die Nebenkosten auf die
      Mieter — in der Abrechnung trägst du die Werte vom Zettel je Mieter direkt
      ein, ImmoCalc verteilt sie nicht selbst. Das Hausgeld zählt zu deinen
      Eigentümerkosten und steht in der Wertentwicklung.</div>`;
}

function abschnitt(bereich, eintraege, { imFokus = false, kopf = '',
                                        vorspann = '' } = {}) {
  const cfg = cfgFuer(bereich);
  const zeilen = eintraege.length
    ? eintraege.map(e => {
        const marke = cfg.chip ? cfg.chip(e) : null;
        const beschreibung = cfg.detail(e, imFokus);
        return `<div class="eintrag klick" data-edit="${bereich}:${e.id}"
          ${cfg.matt && cfg.matt(e) ? 'style="opacity:.62"' : ''}>
        <span class="sym">${kostenIcon(cfg.ikon)}</span>
        <span class="et">
          <span class="en">${esc(cfg.name(e))}${marke
            ? ` <span class="chip ${marke[0]}">${esc(marke[1])}</span>` : ''}</span>
          ${beschreibung ? `<span class="ed">${esc(beschreibung)}</span>` : ''}
        </span>
        <span class="ew">${cfg.wert(e)}</span>
        <button class="del" data-del="${bereich}:${e.id}" aria-label="löschen">×</button>
      </div>`; }).join('')
    : `<div class="leerzeile">Noch nichts erfasst</div>`;

  return `<div class="sekopf"><h2 class="sec">${esc(kopf || cfg.titel)}</h2></div>
    ${vorspann}
    <div class="liste">${zeilen}</div>
    <button class="add" data-add="${bereich}">＋ ${esc(cfg.einzahl)} hinzufügen</button>`;
}

/* ---- CXLI/CLXVIII: die Einheiten des Hauses und ihr Fokus ---------------- */

function einheitDetail(e) {
  return [e.nutzungsart,
          e.flaeche ? flaecheText(e.flaeche) : '',
          e.stellplaetze ? (e.stellplaetze > 1 ? `${e.stellplaetze} Stellplätze`
                                               : '1 Stellplatz') : '',
          e.mieter].filter(Boolean).join(' · ');
}

/* Die Zeile führt eine Ebene tiefer — angetippt wird sie ganz, nicht ein
   Pfeilchen am Rand. */
function einheitenHtml() {
  if (istGrundstueck()) return '';
  const zeilen = einheiten.length
    ? einheiten.map(e => `<div class="eintrag klick" data-einheit="${e.id}">
        <span class="sym">${kostenIcon('Miete')}</span>
        <span class="et">
          <span class="en">${esc(e.bezeichnung)}${e.vermietet ? ''
            : ' <span class="chip amber">frei</span>'}${
            e.nk_abrechnung === false
              ? ' <span class="chip">nicht in NK</span>' : ''}</span>
          ${einheitDetail(e) ? `<span class="ed">${esc(einheitDetail(e))}</span>` : ''}
        </span>
        <span class="ew">${e.vermietet && e.kaltmiete ? `${eur(e.kaltmiete)} / M` : ''}</span>
        <button class="del" data-einheit-weg="${e.id}" aria-label="löschen">×</button>
      </div>`).join('')
    : `<div class="leerzeile">Noch keine Einheit erfasst</div>`;

  return `<div class="sekopf"><h2 class="sec">Einheiten</h2></div>
    <div class="liste">${zeilen}</div>
    <button class="add" data-einheit-neu="1">＋ Einheit hinzufügen</button>
    ${einheiten.length ? `<div class="fussnote">Eine Einheit antippen: dort
      stehen Mieter, Kontakt und Nebenkosten dieser Wohnung. Alles Übergeordnete
      — Stammdaten, Eigentümer, Kredite, Versicherungen, Steuer und Ablage —
      bleibt hier am Haus.</div>` : ''}`;
}

function hausWegHtml() {
  return `<button class="hausweg" data-haus="1">
      <span class="pfeil" aria-hidden="true">‹</span>
      <span class="ic">${logoSvg(objekt.typ)}</span>
      <span class="ht"><span class="hl">Zurück zum Haus</span>
        <span class="hn">${esc(objekt.name)}</span></span>
    </button>`;
}

/* Die Einheit selbst — ohne ihre Bezeichnung: die steht schon in der Kopfzeile. */
function einheitStammHtml(e) {
  // Der NK-Schalter (CXCIII) ist ein bool — als „true"-Zeile stünde er nur im
  // Weg. Die Teilnahme ist der Normalfall und bleibt still; nur der Ausschluss
  // wird als eigener Hinweis gezeigt.
  const zeilen = EINHEITFELDER
    .filter(f => f.k !== 'bezeichnung' && f.k !== 'nk_abrechnung')
    .map(f => paarZeile(f.l, stammwert(f, e))).join('');
  const aus = e.nk_abrechnung === false
    ? `<div class="merker"><span class="hi">i</span><span class="ht">
         <span class="t">Nicht Teil der Nebenkostenabrechnung</span>
         <span class="d">Diese Einheit zählt in keinem Verteilungsschlüssel mit
           — selbstgenutzt, separat abgerechnet oder mit eigenem Zähler.
           „Bearbeiten" schaltet die Teilnahme wieder ein.</span>
       </span></div>` : '';
  return `<div class="sekopf"><h2 class="sec">Einheit</h2>
      <button data-einheit-edit="${e.id}">Bearbeiten</button></div>
    <div class="paare">${zeilen}</div>${aus}`;
}

/* Im Fokus zählt, was diese Wohnung einbringt — Wert und Restschuld gehören
   dem ganzen Haus und stehen deshalb nur dort. Ein Verkehrswert je Einheit
   liesse sich heute nirgends pflegen. */
function einheitKennzahlen(e, eigene) {
  const laufende = eigene.filter(m => !m.beendet && !m.geplant);
  const monat = (m, feld) => (m[feld] || 0) * proJahr(m.turnus) / 12;
  const kalt = laufende.reduce((s, m) => s + monat(m, 'kaltmiete')
    + monat(m, 'stellplatz') + monat(m, 'sonstige'), 0);
  const nk = laufende.reduce((s, m) => s + monat(m, 'nebenkosten_vz'), 0);
  const zellen = [];
  if (kalt) zellen.push(['kv', eur(kalt), 'Miete / Monat']);
  if (nk) zellen.push(['kv', eur(nk), 'NK-Vorauszahlung']);
  if (kalt && e.flaeche) zellen.push(['kv', eur(kalt / e.flaeche), 'je m²']);
  if (!zellen.length) return '';
  return `<div class="kennzahlen">${zellen.map(([k, w, l]) =>
    `<div class="kennzahl"><span class="${k}">${w}</span>
       <span class="kl">${esc(l)}</span></div>`).join('')}</div>`;
}

function eigentuemerHtml(stand) {
  if (!stand) return '';
  // CLXI — ein Anteil zeigt aufs ganze Haus oder auf eine Einheit. Die Einheit
  // steht als Auszeichnung am Namen, damit „mir gehört Wohnung 2" sichtbar ist.
  // Bestandszeilen kennen nur `tausendstel`; neue tragen `promille`.
  const zeilen = stand.anteile.length
    ? stand.anteile.map(a => `<div class="eintrag">
        <span class="sym">${kostenIcon('Eigentümer')}</span>
        <span class="et"><span class="en">${esc(a.name)}${a.einheit
            ? ` <span class="chip teal">${esc(a.einheit)}</span>` : ''}</span>
          <span class="ed">${esc([a.einheit ? '' : a.rolle, a.notiz]
            .filter(Boolean).join(' · '))}</span>
        </span>
        <span class="ew">${promille(a.promille ?? a.tausendstel ?? 0)}</span>
        <button class="del" data-anteil="${a.id}" aria-label="entfernen">×</button>
      </div>`).join('')
    : `<div class="leerzeile">Noch kein Eigentümer zugeordnet</div>`;

  // Warnung analog zu `parteien_ohne_einheit`: erst das Haus (der „Rest"),
  // dann jede Einheit, deren Anteile nicht aufgehen.
  const probleme = [];
  if (stand.objekt_noetig && stand.frei !== 0) {
    probleme.push(stand.frei > 0
      ? `Am Haus fehlen noch ${promille(stand.frei)}`
      : `Am Haus sind ${promille(-stand.frei)} zu viel verteilt`);
  } else if (!stand.objekt_noetig && stand.vergeben > 0) {
    probleme.push(`${promille(stand.vergeben)} am Haus, obwohl schon jede Einheit `
      + `einzeln zugeordnet ist`);
  }
  for (const es of (stand.einheiten_stand || [])) {
    if (es.stimmig) continue;
    probleme.push(es.unbekannt
      ? `„${es.einheit}" gibt es als Einheit nicht (mehr)`
      : (es.frei > 0
          ? `In „${es.einheit}" fehlen noch ${promille(es.frei)}`
          : `In „${es.einheit}" sind ${promille(-es.frei)} zu viel verteilt`));
  }
  const rest = !stand.stimmig
    ? `<div class="merker"><span class="hi">!</span><span class="ht">
         <span class="t">Zurechnung geht noch nicht auf</span>
         <span class="d">${probleme.length
            ? esc(probleme.join(' · ')) + '. '
            : ''}Je Haus und je Einheit sollten 1000 ‰ verteilt sein. Eine
           Nachkommastelle genügt — 333,3 dreimal gilt als vollständig.
           Einheit-Anteile haben Vorrang für ihre Einheit, der Haus-Anteil
           deckt den Rest.</span>
       </span></div>` : '';

  return `<div class="sekopf"><h2 class="sec">Eigentümer</h2>
      <button data-anteil-neu="1">Zuordnen</button></div>
    <div class="liste">${zeilen}</div>${rest}`;
}

async function laden() {
  if (!slug) {
    inhalt.innerHTML = `<div class="empty"><div class="big">Kein Objekt gewählt</div>
      <p>Zurück zur Übersicht und eine Immobilie antippen.</p></div>`;
    return;
  }
  let det;
  try {
    det = await api(`/objekte/${encodeURIComponent(slug)}`);
  } catch (fehler) {
    inhalt.innerHTML = `<div class="empty"><div class="big">Objekt nicht gefunden</div>
      <p>${esc(String(fehler.message || 'Die Daten konnten nicht geladen werden.'))}</p></div>`;
    return;
  }

  // Die Nebenabrufe duerfen einzeln danebengehen — dass eine Versicherungsliste
  // hakt, heisst nicht, dass es das Objekt nicht gibt. Fehlende Bereiche bleiben
  // leer, gemeldet wird einmal am Ende.
  const luecken = [];
  const zweig = async (was, ruf, ersatz) => {
    try { return await ruf(); }
    catch (fehler) { luecken.push(`${was}: ${fehler.message || fehler}`); return ersatz; }
  };
  const [bereiche, anteile, vermoegen, einheitenRoh] = await Promise.all([
    Promise.all(Object.keys(BEREICHE).map(async b =>
      [b, await zweig(BEREICHE[b].titel,
                      () => api(`/objekte/${encodeURIComponent(slug)}/${b}`), [])]))
      .then(Object.fromEntries),
    zweig('Eigentümer', () => api(`/objekte/${encodeURIComponent(slug)}/anteile`), null),
    zweig('Vermögen',
          async () => (await api('/vermoegen')).objekte.find(z => z.slug === slug),
          null),
    zweig('Einheiten',
          () => api(`/objekte/${encodeURIComponent(slug)}/einheiten`), []),
  ]);
  if (luecken.length) melde(`Nicht alles konnte geladen werden — ${luecken[0]}`, 'neg');

  objekt = det.objekt;
  daten = det;
  // Ein Grundstück hat keine Einheiten — dort darf die zweite Ebene gar nicht
  // erst auftauchen, auch nicht über einen alten Link.
  einheiten = istGrundstueck() ? [] : (einheitenRoh || []);
  fokus = fokusWunsch
    ? (einheiten.find(e => String(e.id) === String(fokusWunsch)) || null)
    : null;
  if (fokusWunsch && !fokus) {
    melde('Diese Einheit gibt es nicht mehr — hier steht das ganze Haus.', '');
  }

  titel.textContent = fokus ? fokus.bezeichnung : objekt.name;
  document.getElementById('barlogo').innerHTML = logoSvg(objekt.typ);
  // Der Ort enthaelt oft schon die Einheitenzahl ("Mixed-Use · 7 Einheiten") —
  // dann nicht zusaetzlich zaehlen, sonst steht es doppelt und die Zeile bricht um.
  const ortText = (objekt.ort || objekt.strasse || '').trim();
  if (fokus) {
    // Im Fokus beschreibt die Unterzeile die Einheit. Das Haus steht in der
    // Karte darunter — hier stünde es ein zweites Mal.
    sub.textContent = [fokus.nutzungsart,
                       fokus.flaeche ? flaecheText(fokus.flaeche) : '',
                       fokus.mieter].filter(Boolean).join(' · ') || 'Einheit';
  } else if (istGrundstueck()) {
    // Einheiten gibt es hier nicht; was das Grundstück ausmacht, ist seine
    // Fläche und wofür sie genutzt wird.
    const flaeche = objekt.grundstueck_flaeche
      ? `${Number(objekt.grundstueck_flaeche).toLocaleString('de-DE')} m²` : '';
    sub.textContent = [ortText, objekt.grundstueck_nutzungsart, flaeche]
      .filter(Boolean).join(' · ') || 'Grundstück';
  } else {
    sub.textContent = /einheit|wohnung/i.test(ortText) || !ortText
      ? (ortText || `${det.einheiten.length} Einheit${det.einheiten.length === 1 ? '' : 'en'}`)
      : `${ortText} · ${det.einheiten.length} Einheit${det.einheiten.length === 1 ? '' : 'en'}`;
  }

  const laufend = det.zeitraeume.find(z => z.status === 'in Arbeit');
  const zr = det.zeitraeume.length
    ? det.zeitraeume.map(z => {
        const chip = z.status === 'in Arbeit'
          ? `<span class="chip ${fristKlasse(z.frist_tage)}">${esc(fristText(z.frist_tage) || 'in Arbeit')}</span>`
          : '<span class="chip">abgeschlossen</span>';
        return `<button class="eintrag klick" data-zeitraum="${z.id}"
                        style="cursor:pointer">
            <span class="et">
              <span class="en">${esc(z.label)}</span>
              <span class="ed">${esc(z.typ)}</span></span>${chip}
            <span class="ew" style="color:var(--soft);font-family:var(--body)">›</span>
          </button>`;
      }).join('')
    : `<div class="leerzeile">Noch kein Abrechnungszeitraum</div>`;

  // Was heute läuft: beendete Stände zählen nicht, geplante noch nicht.
  const jahresmiete = (bereiche.mieten || [])
    .filter(m => !m.beendet && !m.geplant)
    .reduce((s, m) => s + (m.kaltmiete || 0) * proJahr(m.turnus), 0);

  // Schulden und Guthaben getrennt: `restschuld_aktuell` ist beim
  // Bausparvertrag 0 und `guthaben_aktuell` beim Darlehen — die API trennt
  // beides, damit hier nichts zusammenfällt, was gegensätzlich ist.
  const restschuld = (bereiche.kredite || []).reduce(
    (s, k) => s + (k.restschuld_aktuell ?? k.restschuld ?? 0), 0);
  const guthaben = (bereiche.kredite || []).reduce(
    (s, k) => s + (k.guthaben_aktuell || 0), 0);

  // Ein Grundstück rechnet keine Nebenkosten ab: weder die Frist nach
  // § 556 BGB noch die Abrechnungszeiträume haben hier etwas zu suchen.
  const zeitraumBlock = istGrundstueck() ? '' : `
    <div class="sekopf"><h2 class="sec">Abrechnungszeiträume</h2>
      ${fokus ? '' : '<button data-zeitraum-neu="1">Anlegen</button>'}</div>
    <div class="liste">${zr}</div>
    ${fokus ? `<div class="fussnote">Abgerechnet wird immer das ganze Haus;
      im Zeitraum steht, was davon auf diese Einheit entfällt.</div>` : ''}`;

  if (fokus) {
    // CLXVIII — im Fokus zählen die Mieterthemen. Stammdaten, Eigentümer,
    // Kredite, Versicherungen, Steuer und Ablage gehören dem Haus und werden
    // hier bewusst nicht wiederholt.
    const eigene = (bereiche.mieten || [])
      .filter(m => zuEinheit(m) === fokus.bezeichnung);
    inhalt.innerHTML = `
      ${hausWegHtml()}
      ${bannerHtml(laufend)}
      ${einheitKennzahlen(fokus, eigene)}
      ${einheitStammHtml(fokus)}
      ${abschnitt('mieten', eigene, { imFokus: true })}
      ${zeitraumBlock}`;
    return;
  }

  // Mietverhältnisse, die auf keine Einheit zeigen. Sie fallen aus der
  // Kostenverteilung (Fund XCII) — deshalb stehen sie am Haus, nicht im
  // Nirgendwo. Gibt es überhaupt keine Einheiten, ist das der Normalfall und
  // die Liste heisst schlicht „Mieten & Mieter".
  const bekannt = new Set(einheiten.map(e => e.bezeichnung));
  const heimatlos = (bereiche.mieten || []).filter(m => !bekannt.has(zuEinheit(m)));
  const mietBlock = !einheiten.length
    ? abschnitt('mieten', bereiche.mieten)
    : (heimatlos.length ? abschnitt('mieten', heimatlos, {
        kopf: 'Ohne Einheit',
        vorspann: `<div class="merker"><span class="hi">!</span><span class="ht">
            <span class="t">${heimatlos.length === 1
              ? 'Ein Mietverhältnis gehört zu keiner Einheit'
              : `${heimatlos.length} Mietverhältnisse gehören zu keiner Einheit`}</span>
            <span class="d">Ohne Einheit fällt die Partei aus der
              Kostenverteilung: sie bekommt keine Kosten und ihre Vorauszahlung
              voll erstattet. Eintrag öffnen und die Einheit antippen.</span>
          </span></div>`,
      }) : '');

  inhalt.innerHTML = `
    ${istGrundstueck() ? '' : bannerHtml(laufend)}
    ${nachpflegeHtml(det.nachpflege)}
    ${kennzahlenHtml(vermoegen, jahresmiete, restschuld, guthaben)}
    ${einheitenHtml()}
    ${zeitraumBlock}
    ${grundstueckHtml(objekt)}
    ${stammHtml(objekt)}
    ${wegHtml(objekt)}
    <div class="sekopf"><h2 class="sec">Dokumentenablage</h2></div>
    <div id="cloudbereich"><div class="cloudbox"><div class="zeile">
      <span class="sym offen">…</span>
      <span class="txt"><span class="t">wird geprüft …</span></span>
    </div></div></div>
    ${eigentuemerHtml(anteile)}
    ${mietBlock}
    ${['versicherungen', 'kredite', 'zahlungen']
      .map(b => abschnitt(b, bereiche[b])).join('')}
    <div class="gefahr-block">
      <div class="gt">Sicherung und Löschen</div>
      <p>Die Sicherung enthält alle Daten dieser Immobilie und lässt sich
         wieder einlesen. Beim Löschen wird sie zusätzlich in die Nextcloud
         geschrieben — die dort abgelegten Unterlagen bleiben unberührt.</p>
      <button class="btn leise" data-export="1">Sicherung herunterladen</button>
      <button class="btn gefahr" data-loeschen="1">Immobilie löschen</button>
    </div>`;

  cloudZeigen();
}

/* Die Ordnerstruktur lässt sich jederzeit nachträglich anlegen — auch wenn
   das Objekt längst existiert und Nextcloud erst später verbunden wurde. */
async function cloudZeigen() {
  const ziel = document.getElementById('cloudbereich');
  if (!ziel) return;
  let s;
  try {
    s = await api(`/nextcloud/objekte/${encodeURIComponent(slug)}/status`);
  } catch (fehler) {
    // Frueher verschwand der ganze Block hier kommentarlos — dann sah es aus,
    // als gaebe es die Dokumentenablage gar nicht.
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">⬡</span>
        <span class="txt">
          <span class="t">Status der Ablage nicht abrufbar</span>
          <span class="d">${esc(String(fehler.message || fehler))}</span>
        </span></div>
        <div class="tat nebensache"><button data-cloud="status">Nochmal prüfen</button></div>
      </div>`;
    return;
  }

  if (s.angelegt) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym fertig">✓</span>
        <span class="txt">
          <span class="t">Ordner verknüpft</span>
          <span class="d">${esc(s.ordner)}</span>
        </span></div>
        <div id="ordnerliste"></div>
        <div class="tat nebensache">
          <button data-cloud="struktur">Fehlende Unterordner anlegen</button>
        </div>
      </div>`;
    ordnerZeigen();
    return;
  }

  if (!s.cloud_verbunden) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">⬡</span>
        <span class="txt">
          <span class="t">Nextcloud ist noch nicht verbunden</span>
          <span class="d">Das Objekt ist gespeichert. Sobald du die Verbindung
            einrichtest, kannst du die Ordnerstruktur hier nachträglich anlegen.</span>
        </span></div>
        <div class="tat"><a href="settings.html">Verbindung einrichten</a></div>
      </div>`;
    return;
  }

  if (!s.home) {
    ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
        <span class="sym offen">▣</span>
        <span class="txt">
          <span class="t">Kein Home-Ordner gewählt</span>
          <span class="d">Wähle den Ordner, unter dem die Immobilien liegen.</span>
        </span></div>
        <div class="tat"><a href="settings.html">Home-Ordner wählen</a></div>
      </div>`;
    return;
  }

  ziel.innerHTML = `<div class="cloudbox"><div class="zeile">
      <span class="sym offen">＋</span>
      <span class="txt">
        <span class="t">Ordnerstruktur noch nicht angelegt</span>
        <span class="d">Wird angelegt unter <b>${esc(s.vorschlag)}</b> —
          vorhandene Ordner und Dateien bleiben unberührt.</span>
      </span></div>
      <div class="tat"><button data-cloud="struktur">Ordnerstruktur anlegen</button></div>
    </div>`;
}

/* Selbst angelegte Ordner werden mit ausgewiesen — ImmoCalc rührt sie nicht an,
   aber verschweigen soll es sie auch nicht. */
async function ordnerZeigen() {
  const ziel = document.getElementById('ordnerliste');
  if (!ziel) return;
  let s;
  try {
    s = await api(`/nextcloud/objekte/${encodeURIComponent(slug)}/ordner`);
  } catch (fehler) {
    ziel.innerHTML = `<span class="d" style="display:block;margin-top:10px">Ordnerliste
      nicht lesbar — ${esc(String(fehler.message || fehler))}</span>`;
    return;
  }
  if (!s.ordner.length) return;
  const eigene = s.eigene.length;
  ziel.innerHTML = `
    <div class="strukturliste">${s.ordner.map(o =>
      `<span class="${o.eigen ? 'eigen' : ''}" title="${esc(o.name)}">${esc(o.name)}</span>`
    ).join('')}</div>
    <span class="d" style="display:block;margin-top:10px;font:400 12px var(--body);
      color:var(--soft)">${s.ordner.length} Ordner${eigene
        ? ` · ${eigene} davon von dir angelegt (grün) — die bleiben unverändert`
        : ''}${s.fehlend.length ? ` · ${s.fehlend.length} aus der Struktur fehlen` : ''}</span>`;
}

/* ---- Formular: eine Fabrik für alle Bereiche ---- */

/* CXLVII — welches Zeichen rechts im Eingabefeld steht. Geld ist immer Euro,
   alles andere sagt es selbst („m²", „%"). Leer heisst: schmuckloses Feld. */
const feldEinheit = f => (f.geld ? '€' : f.einheit) || '';

async function feldHtml(f, bereich, wert) {
  const id = `f_${f.k}`;
  if (f.typ === 'auswahl') {
    // Kein natives <select>: die aufgeklappte Liste zeichnete sonst das
    // Betriebssystem. Der wirkliche Wert steht im versteckten Feld, damit
    // `ausFormular` ihn wie bei jedem anderen Feld findet.
    // Beschriftung ohne `for`: den Knopf baut auswahl.js selbst und gibt ihm
    // eine eigene id — die Verknüpfung läuft über aria-label.
    // `ohneLeer`: eine Vertragsart gibt es immer — „nicht gewählt" wäre dort
    // keine mögliche Antwort, sondern eine Lücke im Datenmodell.
    const werte = f.ohneLeer ? f.werte : ['', ...f.werte];
    const gesetzt = wert ?? f.vorgabe ?? '';
    return `<div class="field"><label>${esc(f.l)}</label>
      <input type="hidden" id="${id}" name="${f.k}" value="${esc(gesetzt)}">
      <div data-auswahl="${esc(f.k)}" data-label="${esc(f.l)}"
           ${f.umbau ? 'data-umbau="1"' : ''}
           data-optionen="${esc(JSON.stringify(werte))}"></div>
      ${f.note ? `<span class="feldnote">${esc(f.note)}</span>` : ''}</div>`;
  }
  if (f.typ === 'einheit') {
    // CLXIX — die Einheit wird angetippt, nicht getippt. Freitext liess einen
    // Tippfehler durch, und die Partei fiel stumm aus der Kostenverteilung
    // (Fund XCII). Ohne erfasste Einheiten bleibt es ein Textfeld: sonst
    // liesse sich an einem Bestandsobjekt gar kein Mietverhältnis anlegen.
    if (!einheiten.length) {
      return `<div class="field"><label for="${id}">${esc(f.l)}</label>
        <input class="inp" id="${id}" name="${f.k}" type="text"
               value="${esc(wert ?? '')}"></div>`;
    }
    const gewaehlt = wert ?? (einheiten.length === 1
      ? einheiten[0].bezeichnung : '');
    const blasen = einheiten.map(e => {
      const an = e.bezeichnung === gewaehlt;
      return `<button type="button" class="bubble${an ? ' gewaehlt' : ''}${
          e.vermietet ? '' : ' frei'}" data-wahl="${esc(e.bezeichnung)}"
          aria-pressed="${an}">
        <span class="bt">${esc(e.bezeichnung)}</span>
        ${e.flaeche ? `<span class="bf">${flaecheText(e.flaeche)}</span>` : ''}
        ${e.vermietet ? '' : '<span class="bfrei">frei</span>'}
      </button>`;
    }).join('');
    return `<div class="field"><label>${esc(f.l)}</label>
      <input type="hidden" id="${id}" name="${f.k}" value="${esc(gewaehlt)}">
      <div class="bubbles" data-wahlfeld="${esc(f.k)}" role="group"
           aria-label="${esc(f.l)}">${blasen}</div>
      <span class="feldnote">Antippen statt tippen — nur so findet die
        Kostenverteilung die Einheit wieder.</span></div>`;
  }
  if (f.typ === 'anteileinheit') {
    // CLXI — worauf ein Eigentümer-Anteil zeigt: das ganze Haus oder eine
    // Einheit. „Ganzes Haus" steht als erste Blase und ist vorgewählt — der
    // gewachsene Fall bleibt der Normalfall. Dieselbe Blasen-Verdrahtung wie
    // bei der Einheitenwahl der Miete (data-wahl/data-wahlfeld).
    const gewaehlt = wert ?? '';
    const blase = (w, text, extra) => {
      const an = w === gewaehlt;
      return `<button type="button" class="bubble${an ? ' gewaehlt' : ''}"
          data-wahl="${esc(w)}" aria-pressed="${an}">
        <span class="bt">${esc(text)}</span>${extra || ''}</button>`;
    };
    const blasen = blase('', 'Ganzes Haus')
      + einheiten.map(e => blase(e.bezeichnung, e.bezeichnung,
          e.flaeche ? `<span class="bf">${flaecheText(e.flaeche)}</span>` : '')).join('');
    return `<div class="field"><label>${esc(f.l)}</label>
      <input type="hidden" id="${id}" name="${f.k}" value="${esc(gewaehlt)}">
      <div class="bubbles" data-wahlfeld="${esc(f.k)}" role="group"
           aria-label="${esc(f.l)}">${blasen}</div>
      <span class="feldnote">Gehört dem Eigentümer nur eine Wohnung, hier die
        Einheit wählen — sonst „Ganzes Haus". Einheit-Anteile haben Vorrang für
        ihre Einheit, der Haus-Anteil deckt den Rest.</span></div>`;
  }
  if (f.typ === 'turnus') {
    const { optionen, vorgabe } = await turnusOptionen(bereich);
    const gewaehlt = wert ?? f.vorgabe ?? vorgabe;
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        ${optionen.map(o => `<option value="${o.wert}"
          ${o.wert === gewaehlt ? 'selected' : ''}>${esc(o.text)}</option>`).join('')}
      </select></div>`;
  }
  if (f.typ === 'select') {
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        ${f.werte.map(w => `<option ${w === wert ? 'selected' : ''}>${esc(w)}</option>`)
          .join('')}
      </select></div>`;
  }
  if (f.typ === 'ja_nein') {
    const ja = wert === undefined ? true : Boolean(wert);
    return `<div class="field"><label for="${id}">${esc(f.l)}</label>
      <select class="inp" id="${id}" name="${f.k}">
        <option value="ja" ${ja ? 'selected' : ''}>ja</option>
        <option value="nein" ${ja ? '' : 'selected'}>nein</option>
      </select></div>`;
  }
  if (f.typ === 'schalter') {
    // CXCIII — ein gedeckter Ja/Nein-Schalter im Stil der Seite, kein natives
    // Kästchen. Er borgt sich die Blasen-Verdrahtung (data-wahl/-wahlfeld): der
    // echte Wert steht im versteckten Feld, `ausFormular` liest ihn als bool.
    const ja = wert == null ? (f.vorgabe == null ? true : Boolean(f.vorgabe))
                            : Boolean(wert);
    const knopf = (w, an, text) => `<button type="button"
        class="schaltknopf${an ? ' an' : ''}" data-wahl="${w}"
        aria-pressed="${an}">${text}</button>`;
    return `<div class="field"><label>${esc(f.l)}</label>
      <input type="hidden" id="${id}" name="${f.k}" value="${ja ? 'ja' : 'nein'}">
      <div class="schalter" data-wahlfeld="${esc(f.k)}" role="group"
           aria-label="${esc(f.l)}">
        ${knopf('ja', ja, 'Ja')}${knopf('nein', !ja, 'Nein')}
      </div>
      ${f.note ? `<span class="feldnote">${esc(f.note)}</span>` : ''}</div>`;
  }
  const v = wert == null ? (f.vorgabe != null ? f.vorgabe : '') : wert;
  // Felder mit Einheit sind Textfelder: ein <input type="number"> nimmt keine
  // Tausenderpunkte an und stellte seine Pfeilchen genau dorthin, wo das
  // Zeichen sitzt. Die Zifferntastatur bleibt über inputmode erhalten.
  const einheit = feldEinheit(f);
  const typ = einheit ? 'text' : f.typ;
  const zusatz = einheit ? 'inputmode="decimal"'
                         : (f.schritt ? `step="${f.schritt}"` : '');
  return `<div class="field"><label for="${id}">${esc(f.l)}</label>
    <input class="inp" id="${id}" name="${f.k}" type="${typ}" ${zusatz}
           value="${esc(v)}" ${f.pflicht ? 'required' : ''}>
    ${f.note ? `<span class="feldnote" id="n_${f.k}">${esc(f.note)}</span>` : ''}</div>`;
}

/* Lesbare Eingabe anhängen — und beim Schliessen wieder lösen, sonst häufen
   sich die Beobachter mit jedem geöffneten Dialog. */
let formate = [];

function formateLoesen() {
  for (const f of formate) {
    try { f.zerstoere(); } catch { /* schon weg */ }
  }
  formate = [];
}

function formateSetzen(form, felder) {
  formateLoesen();
  if (!eingabe) return;
  for (const f of felder) {
    const el = form.elements[f.k];
    if (!el || el.tagName !== 'INPUT') continue;
    const einheit = feldEinheit(f);
    const bauer = einheit ? feld => eingabe.geldFeld(feld, einheit)
                : f.iban ? eingabe.ibanFeld
                : f.steuer ? eingabe.steuernummerFeld : null;
    if (typeof bauer !== 'function') continue;
    try {
      const griff = bauer(el);
      if (griff && typeof griff.zerstoere === 'function') formate.push(griff);
    } catch { /* eine Formatierung ist kein Muss */ }
  }
}

/* Auswahlfelder im eigenen Design — je Dialog neu gebaut und beim Schliessen
   wieder abgeräumt, wie die Formatierungen darüber. */
let auswahlen = [];

function auswahlLoesen() {
  for (const a of auswahlen) {
    try { a.zerstoere(); } catch { /* schon weg */ }
  }
  auswahlen = [];
}

function auswahlSetzen(form) {
  auswahlLoesen();
  for (const halter of form.querySelectorAll('[data-auswahl]')) {
    const feld = form.elements[halter.dataset.auswahl];
    if (!feld) continue;
    const optionen = JSON.parse(halter.dataset.optionen)
      .map(w => ({ wert: w, text: w || 'nicht gewählt' }));
    auswahlen.push(auswahlfeld(halter, {
      optionen, wert: feld.value, label: halter.dataset.label,
      aenderung: neu => {
        feld.value = neu;
        // Ein Feld, das die Maske umstellt (die Vertragsart), baut das
        // Formular neu — aber erst im nächsten Anlauf: sonst zöge sich das
        // Auswahlfeld sein eigenes DOM unter den Füssen weg.
        if (halter.dataset.umbau && dialogUmbau) setTimeout(dialogUmbau, 0);
      },
    }));
  }
}

/* CXLVIII — Zinssatz und Zinsanteil je Monat halten sich gegenseitig aktuell.
   Wer den Satz kennt, tippt ihn; wer nur den Zinsanteil aus dem Kontoauszug
   hat, tippt den — beides führt zum selben Ergebnis. Gespeichert wird der
   Zinssatz.

   Die Regel dahinter steht in `api/app/vermoegen.py` (`monatszins` und
   `zinssatz_aus_monatszins`) und ist dort geprüft; hier wird sie nur
   angezeigt, damit die Zahl schon während des Tippens dasteht. Wer sie ändert,
   ändert sie an beiden Stellen. */
const ZINSTEXT = {
  ja: 'Eines von beidem genügt — das andere ergibt sich aus der Restschuld.',
  nein: 'Ohne Restschuld lässt sich das nicht umrechnen — trag sie oben ein.',
};

function zinsKopplung(form) {
  const satz = form.querySelector('#f_zinssatz');
  const monat = form.querySelector('#f_zins_monat');
  const rest = form.querySelector('#f_restschuld');
  const note = form.querySelector('#n_zins_monat');
  if (!satz || !monat || !rest) return;
  // Das Nachtragen im anderen Feld ist keine Eingabe des Nutzers.
  let rechnet = false;

  /* Die Restschuld, auf die sich beide Felder beziehen — null, solange keine
     eingetragen ist. */
  const basis = () => {
    const r = zahlAus(rest);
    return r && r > 0 ? r : null;
  };

  const setze = (feld, wert) => {
    rechnet = true;
    feld.value = wert == null ? '' : String(wert);
    rechnet = false;
  };
  const auf2 = n => Math.round(n * 100) / 100;

  function ausSatz() {
    const r = basis();
    const s = zahlAus(satz);
    setze(monat, r == null || s == null ? null : auf2(r * s / 100 / 12));
  }

  /* Umgekehrt nur, wenn wirklich etwas dasteht: ein geleertes Hilfsfeld soll
     keinen eingetragenen Zinssatz mitnehmen. */
  function ausMonat() {
    const r = basis();
    const m = zahlAus(monat);
    if (r == null || m == null) return;
    setze(satz, auf2(m * 12 / r * 100));
  }

  /* Die fehlende Restschuld wird erst zum Thema, wenn wirklich etwas
     umzurechnen wäre — ein frisch geöffnetes Formular wird nicht gleich
     ermahnt. */
  function melde() {
    if (!note) return;
    const angefangen = zahlAus(satz) != null || zahlAus(monat) != null;
    note.textContent = !basis() && angefangen ? ZINSTEXT.nein : ZINSTEXT.ja;
  }

  const beiEingabe = rechnung => () => {
    if (rechnet) return;
    rechnung();
    melde();
  };

  satz.addEventListener('input', beiEingabe(ausSatz));
  monat.addEventListener('input', beiEingabe(ausMonat));
  // Ändert sich die Restschuld, gilt weiter der Zinssatz — er ist das
  // Gespeicherte, der Zinsanteil folgt ihm.
  rest.addEventListener('input', beiEingabe(ausSatz));

  melde();
  ausSatz();
}

/* Die Felder, die gerade im Dialog stehen. Beim Speichern wird genau das
   ausgelesen, was auch gezeigt wurde — bei den Verträgen hängt das an der
   Vertragsart und lässt sich nicht aus dem Bereich allein ableiten. */
let dialogFelder = [];
/* Baut den offenen Dialog mit anderen Feldern neu auf, ohne das Eingetippte
   zu verlieren. Gesetzt von `formular`, gerufen vom Auswahlfeld mit `umbau`. */
let dialogUmbau = null;

async function formular(einst) {
  const { titel: dtitel, felder, bereich, werte = {}, absicht,
          hinweis = '', extra = '', knopf = 'Speichern' } = einst;
  const form = document.getElementById('dlgForm');
  const html = await Promise.all(
    felder.map(f => feldHtml(f, bereich, werte[f.k])));
  document.getElementById('dlgTitel').textContent = dtitel;
  // Abbrechen ist bewusst type="button": als Submit-Knopf loeste es den
  // submit-Handler aus und speicherte. Die Abfrage darauf lief ins Leere,
  // weil returnValue am <dialog> haengt, nicht am <form>.
  form.innerHTML = (hinweis ? `<p class="dlgnote">${esc(hinweis)}</p>` : '')
    + html.join('') + extra +
    `<button class="btn" value="ok">${esc(knopf)}</button>
     <button class="btn leise" type="button" data-abbruch
             style="margin-top:8px">Abbrechen</button>`;
  form.dataset.absicht = absicht;
  form.dataset.bereich = bereich || '';
  form.dataset.id = werte.id || '';
  delete form.dataset.vorgaenger;   // sonst endet beim nächsten Mal ein fremder Stand
  dialogFelder = felder;
  dialogUmbau = async () => {
    // Das schon Eingetippte überlebt den Umbau — nur die Felder wechseln.
    const stand = bereich === 'kredite'
      ? uebernahmeAnbieten({ ...werte, ...ausFormular(form, felder) })
      : { ...werte, ...ausFormular(form, felder) };
    await formular({ ...einst, felder: felderFuer(bereich, stand),
                     werte: stand });
  };
  formateSetzen(form, felder);
  auswahlSetzen(form);
  zinsKopplung(form);
  // Ein zweiter showModal-Aufruf auf einem offenen Dialog wirft — der Wechsel
  // von der Miete zur Erhöhung tauscht nur den Inhalt aus.
  if (!dlg.open) dlg.showModal();
  form.scrollTop = 0;
}

/* Was wirklich im Feld steht — auch wenn es "1.250.000" anzeigt.
   `data-wert` hat Vorrang: dort legt die Formatierung den rohen Wert ab. */
function zahlAus(el) {
  const roh = el.dataset.wert != null && el.dataset.wert !== ''
    ? el.dataset.wert : el.value;
  const text = String(roh ?? '').replace(/[^\d,.-]/g, '');
  if (text === '') return null;
  const komma = text.lastIndexOf(',');
  const sauber = komma >= 0
    ? `${text.slice(0, komma).replace(/\./g, '')}.${text.slice(komma + 1).replace(/\D/g, '')}`
    // Ein einzelner Punkt mit ein bis zwei Stellen dahinter ist ein
    // Dezimalpunkt (so kommt der Wert aus der API), sonst Tausendertrennung.
    : (/^-?\d+\.\d{1,2}$/.test(text) ? text : text.replace(/\./g, ''));
  const zahl = Number(sauber);
  return Number.isFinite(zahl) ? zahl : null;
}

function ausFormular(form, felder) {
  const werte = {};
  for (const f of felder) {
    // Hilfsfelder helfen beim Ausfüllen und werden nicht gespeichert — der
    // Zinsanteil je Monat steckt schon im Zinssatz.
    if (f.hilfe) continue;
    const el = form.elements[f.k];
    if (!el) continue;
    if (f.typ === 'ja_nein' || f.typ === 'schalter') {
      werte[f.k] = el.value === 'ja'; continue;
    }
    // Leeren heisst hier wirklich leeren — sonst liesse sich ein einmal
    // gesetztes Enddatum nie wieder entfernen.
    if (f.typ === 'number') { werte[f.k] = zahlAus(el); continue; }
    if (el.value === '') { werte[f.k] = f.typ === 'date' ? null : ''; continue; }
    werte[f.k] = el.value;
  }
  return werte;
}

/* ---- Bewohner: mehrere Kontakte an einem Mietverhältnis ---- */

/* Beim Speichern zu entfernende Bewohner. Erst dann, nicht beim Antippen —
   ein versehentlicher Druck lässt sich so noch mit Abbrechen zurücknehmen. */
let bewohnerWeg = [];

function bewohnerZeile(b) {
  return `<div class="bwzeile" ${b.id ? `data-bid="${b.id}"` : ''}>
    <button type="button" class="weg" data-bw-weg aria-label="Bewohner entfernen">×</button>
    <input class="nm" name="bw_name" type="text" placeholder="Name"
           value="${esc(b.name || '')}">
    <input name="bw_email" type="email" placeholder="E-Mail"
           value="${esc(b.email || '')}">
    <input name="bw_telefon" type="tel" placeholder="Handy"
           value="${esc(b.telefon || '')}">
  </div>`;
}

function bewohnerBlock(liste) {
  bewohnerWeg = [];
  return `<div class="block" id="bewohnerblock">
    <span class="bt">Bewohner</span>
    <span class="bd">Wohnen mehrere Personen in der Einheit, bekommt jede ihre
      eigene Adresse und Nummer. Der Kontakt oben bleibt der Hauptkontakt des
      Mietverhältnisses.</span>
    ${(liste || []).map(bewohnerZeile).join('')}
    <button type="button" class="zusatz" data-bw-neu>＋ Bewohner</button>
  </div>`;
}

/* Was im Dialog steht, mit dem Bestand abgleichen: geändert, neu, entfernt. */
async function bewohnerSpeichern(form, miete_id) {
  const block = form.querySelector('#bewohnerblock');
  if (!block || !miete_id) return;
  for (const bid of bewohnerWeg) {
    await api(`/bewohner/${bid}`, { method: 'DELETE' });
  }
  bewohnerWeg = [];
  for (const zeile of block.querySelectorAll('.bwzeile')) {
    const daten = {
      name: zeile.querySelector('[name=bw_name]').value.trim(),
      email: zeile.querySelector('[name=bw_email]').value.trim(),
      telefon: zeile.querySelector('[name=bw_telefon]').value.trim(),
    };
    if (zeile.dataset.bid) {
      await api(`/bewohner/${zeile.dataset.bid}`, { method: 'PATCH', body: daten });
    } else if (daten.name || daten.email || daten.telefon) {
      await api(`/mieten/${miete_id}/bewohner`, { method: 'POST', body: daten });
    }
  }
}

/* ---- Jahresstände eines Kredits ---- */

/* Das Feld heisst weiter `restschuld` — so heisst die Spalte, und beim
   Bausparvertrag steht dort der Sparstand (siehe `models.Kreditstand`).
   Gefragt wird trotzdem nach dem, was auf dem Auszug steht. */
const standFelder = bauspar => [
  { k: 'jahr', l: 'Jahr', typ: 'number', pflicht: true,
    vorgabe: new Date().getFullYear() - 1 },
  { k: 'restschuld', l: bauspar ? 'Sparstand am 31.12.'
                                : 'Restschuld am 31.12.',
    typ: 'number', schritt: '0.01', geld: true, pflicht: true },
];

function verlaufBlock(s) {
  const bauspar = istBausparer(s.art);
  const zeilen = (s.verlauf || []).map(j => `<div class="jahr${
      j.eingetragen ? ' gemessen' : ''}">
      <span class="jj">${j.jahr}</span>
      <span class="jw">${eur(j.restschuld)}</span>
      <span class="jq">${j.eingetragen ? 'eingetragen' : 'gerechnet'}</span>
      ${j.eingetragen ? `<button type="button" class="weg"
          data-stand-weg="${(s.staende.find(x => x.jahr === j.jahr) || {}).id}"
          aria-label="Stand entfernen">×</button>`
        : '<span class="weg" aria-hidden="true"></span>'}
    </div>`).join('');
  return `<div class="block">
    <span class="bt">Verlauf</span>
    <span class="bd">Grün hinterlegt ist, was du eingetragen hast. Die Jahre
      dazwischen rechnet die App aus ${bauspar ? 'Sparbeitrag und Guthabenzins'
                                              : 'Rate und Zinssatz'}.</span>
    ${zeilen ? `<div class="jahre">${zeilen}</div>`
             : '<div class="bd">Noch kein Stand eingetragen.</div>'}
  </div>`;
}

/* ---- Zusatzblöcke der Formulare ---- */

function mietExtra(eintrag) {
  // Ein Acker hat keine Bewohner. Die Staffelung des Pachtzinses schon —
  // die läuft über denselben Weg wie eine Mieterhöhung.
  const pacht = istGrundstueck();
  const kopf = pacht ? 'Pachterhöhung' : 'Mieterhöhung';
  const kopien = (eintrag ? eintrag.bewohner : []) || [];
  return (pacht ? '' : bewohnerBlock(kopien)) + (eintrag ? `<div class="block">
      <span class="bt">${kopf}</span>
      <span class="bd">Eine beschlossene Erhöhung lässt sich schon jetzt
        eintragen. Sie steht als „geplant" in der Liste, bis sie wirksam wird;
        der heutige Stand endet automatisch am Tag davor.</span>
      <button type="button" class="zusatz"
              data-erhoehung="${eintrag.id}">＋ ${kopf} planen</button>
    </div>` : '');
}

function kreditExtra(eintrag) {
  if (!eintrag) return '';
  const s = eintrag.stand || {};
  const bauspar = istBausparer(eintrag.art);
  const gemessen = s.stand_jahr
    ? `Zuletzt eingetragen zum 31.12.${s.stand_jahr}: ${eur(s.stand_wert)} —
       heute fortgeschrieben ${eur(s.stand)}.`
    : (bauspar
        ? `Trage den Sparstand zum 31.12. ein, wie er auf dem Kontoauszug
           steht. Dazwischen rechnet ImmoCalc aus Sparbeitrag und
           Guthabenzins weiter.`
        : `Trage die Restschuld zum 31.12. ein, wie sie im Kontoauszug steht.
           Dazwischen rechnet ImmoCalc aus Rate und Zinssatz weiter.`);
  // Beim Bausparvertrag zählt, was noch fehlt — das ist die Zahl, die der
  // Nutzer im Kopf hat: 140.000 Bausparsumme, 45.000 gespart, Rest offen.
  const rest = bauspar && s.noch_zu_sparen != null
    ? (s.zuteilungsreif
        ? ` Die Bausparsumme ist erreicht — der Vertrag ist zuteilungsreif.`
        : ` Bis zur Bausparsumme fehlen noch ${eur(s.noch_zu_sparen)}.`)
    : '';
  const zins = bauspar
    ? (s.habenzins_monat ? ` Das Guthaben bringt zurzeit
        ${eur(s.habenzins_monat)} im Monat an Zinsen.` : '')
    : (s.zins_monat ? ` Davon gehen zurzeit ${eur(s.zins_monat)} im Monat
        an Zinsen weg.` : '');
  return `<div class="block">
    <span class="bt">${bauspar ? 'Sparstand' : 'Restschuld'}</span>
    <span class="bd">${gemessen}${rest}${zins}</span>
    <button type="button" class="zusatz"
            data-staende="${eintrag.id}">Jahresstände pflegen</button>
  </div>`;
}

/* ---- CLXXVI: Kappungsgrenze nach § 558 Abs. 3 BGB -----------------------
   Wie viel eine Erhöhung binnen drei Jahren zulegen darf, hängt an der
   Gemeinde: 20 %, in Gebieten mit angespanntem Wohnungsmarkt 15 %. Welche
   Gemeinden das sind und wie gerechnet wird, steht in
   `api/app/kappungsgrenze.py` — hier wird nur gefragt und gezeigt.

   Gewarnt, nicht verboten: eine Erhöhung nach Modernisierung (§ 559 BGB)
   fällt gar nicht unter die Grenze, und über Ausnahmen entscheidet nicht
   diese Seite. Gespeichert wird deshalb in jedem Fall. */
async function kappungWachen(mid) {
  const form = document.getElementById('dlgForm');
  const feld = form.querySelector('#f_kaltmiete');
  const abFeld = form.querySelector('#f_ab_datum');
  if (!feld || !feld.closest('.field')) return;

  const halter = document.createElement('div');
  // Eigener Abstand nach unten: sonst klebt die Fundstelle an der
  // Beschriftung des nächsten Feldes.
  halter.style.margin = '-4px 0 18px';
  feld.closest('.field').insertAdjacentElement('afterend', halter);

  let lauf = 0;
  async function zeigen() {
    const frage = new URLSearchParams();
    const neu = zahlAus(feld);
    if (neu != null && neu > 0) frage.set('neu', String(neu));
    if (abFeld && abFeld.value) frage.set('ab', abFeld.value);
    const nummer = ++lauf;
    let s;
    try {
      s = await api(`/mieten/${mid}/kappungsgrenze?${frage}`);
    } catch {
      return;                    // ohne Auskunft lieber nichts behaupten
    }
    // Eine ältere Antwort darf eine neuere nicht überschreiben, und ein
    // umgebautes Formular hat den Platz gar nicht mehr.
    if (nummer !== lauf || !halter.isConnected) return;
    // Die Fundstelle steht immer, aber leise: sie gehört zur Auskunft, ist
    // aber nicht die Nachricht. Die Warnung selbst bleibt kurz.
    const quelle = `<span class="feldnote">Grundlage: ${esc(s.fundstelle)}.
      ${s.ueberschritten ? 'Eine Erhöhung nach Modernisierung (§ 559 BGB) '
        + 'fällt nicht darunter — eintragen lässt sie sich trotzdem.' : ''}</span>`;
    halter.innerHTML = (s.ueberschritten
      ? `<div class="merker" style="margin-top:10px">
           <span class="hi">!</span><span class="ht">
           <span class="t">${esc(s.titel)}</span>
           <span class="d">${esc(s.text)}</span></span></div>`
      : `<span class="feldnote">${esc(s.text)}</span>`) + quelle;
  }

  let warten = null;
  const spaeter = () => {
    clearTimeout(warten);
    warten = setTimeout(zeigen, 350);
  };
  feld.addEventListener('input', spaeter);
  if (abFeld) abFeld.addEventListener('change', spaeter);
  await zeigen();
}

/* Eine geplante Erhöhung ist ein neuer Mietstand derselben Partei — nicht ein
   geänderter alter. So bleibt nachvollziehbar, was wann galt. */
async function erhoehungFormular(mid) {
  let alt;
  try {
    alt = (await api(`/objekte/${encodeURIComponent(slug)}/mieten`))
      .find(x => String(x.id) === String(mid));
  } catch (fehler) {
    return melde(String(fehler.message || fehler), 'neg');
  }
  if (!alt) return;
  const pacht = istGrundstueck();
  const bewohner = (alt.bewohner || []).map(b => ({ ...b, id: null }));
  await formular({
    titel: pacht ? 'Pachterhöhung planen' : 'Mieterhöhung planen',
    hinweis: `Trage ${pacht ? 'den neuen Pachtzins' : 'die neue Miete'} und `
      + 'den Tag ein, ab dem er gilt. Der bisherige Stand läuft bis zum Tag '
      + 'davor weiter und bleibt als Historie erhalten.',
    felder: cfgFuer('mieten').felder, bereich: 'mieten', absicht: 'eintrag',
    werte: { ...alt, id: '', ab_datum: ersterNaechsterMonat(), bis_datum: null },
    extra: pacht ? '' : bewohnerBlock(bewohner), knopf: 'Erhöhung planen',
  });
  document.getElementById('dlgForm').dataset.vorgaenger = mid;
  // Beim Pachtzins gibt es keine Kappungsgrenze — § 558 BGB gilt für
  // Wohnraum, nicht für Grund und Boden.
  if (!pacht) await kappungWachen(mid);
}

  formateLoesen();
