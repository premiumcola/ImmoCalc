<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wertentwicklung &amp; Cashflow · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  /* ------------------------------------------------------------------
     Gemeinsame Regeln von wertentwicklung.html und nebenkosten.html.
     Sie stammen aus der frueheren statistik.html und stehen bewusst
     doppelt in beiden Seiten, weil immo.css hier nicht angefasst werden
     darf. GEHOERT SPAETER NACH immo.css: .filter, .karte, .chart,
     .chartleer, .kpi, .legende, .tabelle und .applogo — alles davon ist
     seitenuebergreifend und nicht seitenspezifisch.
     ------------------------------------------------------------------ */
  .filter{display:flex;gap:8px;margin-bottom:18px}
  .filter > div{flex:1;min-width:0}
  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:14px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);letter-spacing:-.01em;margin:0 0 14px;color:var(--ink)}
  /* max-width: die SVGs haben eine viewBox und wuerden auf breiten Schirmen
     samt Schrift und Balken ins Riesenhafte skalieren. */
  .chart{width:100%;max-width:560px;height:auto;display:block;overflow:visible}
  @media(min-width:1000px){
    .kpi{max-width:560px}
    .tabelle{max-width:720px}
  }
  .chartleer{font:400 13px var(--body);color:var(--soft);text-align:center;padding:22px 8px}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi .k{background:var(--sheet);border-radius:14px;padding:13px 12px;
          box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kpi .kl{display:block;font:600 9.5px var(--mono);letter-spacing:.08em;
           text-transform:uppercase;color:var(--soft)}
  .kpi .kv{display:block;font:700 16px var(--disp);letter-spacing:-.02em;margin-top:6px}
  .kpi .kv.pos{color:var(--pos)} .kpi .kv.neg{color:var(--neg)}
  .legende{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
  .legende .le{display:flex;align-items:center;gap:6px;font:500 11.5px var(--body);
               color:var(--soft)}
  .legende .le i{width:10px;height:10px;border-radius:3px;flex:none}
  .tabelle{width:100%;border-collapse:collapse;margin-top:2px}
  .tabelle th{font:600 9.5px var(--mono);letter-spacing:.07em;text-transform:uppercase;
              color:var(--soft);text-align:right;padding:0 0 8px;white-space:nowrap}
  .tabelle th:first-child{text-align:left}
  /* Ohne Abstand zwischen den Zahlenspalten laufen auf 390 px sowohl die
     Kopfzeilen als auch „—“ und „212k €“ ineinander. */
  .tabelle th + th, .tabelle td + td{padding-left:12px}
  .tabelle td{font:500 13px var(--body);padding:9px 0;border-top:1px solid var(--line);
              text-align:right;white-space:nowrap}
  .tabelle td:first-child{white-space:normal}
  .tabelle td:first-child{text-align:left;font-weight:600}
  .tabelle td.pos{color:var(--pos)} .tabelle td.neg{color:var(--neg)}

  /* App-Symbol in der Kopfzeile — kommt auf index.html und eingang.html
     gleich vor; gehoert eigentlich nach immo.css. */
  .applogo{width:34px;height:34px;border-radius:9px;flex:none;display:block}
  .applogo-link{display:block;border-radius:9px}
  .applogo-link:focus-visible{outline:2px solid var(--teal); outline-offset:2px}

  /* Der Titel ist lang — auf dem iPhone eine Spur kleiner, damit die
     Kopfzeile einzeilig bleibt. */
  @media(max-width:439px){ .bar h1{font-size:16px} }

  /* ---- nur diese Seite: Cashflow je Einheit ----------------------------
     Eine Tabelle mit sechs Spalten waere auf 390 px nicht lesbar. Deshalb
     je Einheit ein kleiner Block, dessen Kennzahlen sich umbrechen:
     drei nebeneinander auf dem Handy, alle fuenf auf dem Schirm. */
  .einheit{border-top:1px solid var(--line);padding:14px 0 2px}
  .einheit:first-child{border-top:none;padding-top:0}
  .ename{display:block;font:600 14px var(--disp);letter-spacing:-.01em;color:var(--ink)}
  .emeta{display:block;font:400 11.5px var(--body);color:var(--soft);margin-top:3px}
  .ezahlen{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));
           gap:10px 12px;margin-top:12px}
  .ezahlen div{min-width:0}
  .ezahlen i{display:block;font:600 9px var(--mono);letter-spacing:.07em;
             text-transform:uppercase;color:var(--soft);font-style:normal}
  .ezahlen b{display:block;font:600 13.5px var(--body);margin-top:4px;
             letter-spacing:-.01em;overflow-wrap:anywhere}
  .ezahlen b.pos{color:var(--pos)} .ezahlen b.neg{color:var(--neg)}
  .kartesub{font:400 12px var(--body);color:var(--soft);margin:-8px 0 14px;line-height:1.45}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <a href="index.html" aria-label="Zur Übersicht" class="applogo-link"><img src="icons/icon.svg" alt="" class="applogo"></a>
    <div class="barwrap">
      <h1>Wertentwicklung &amp; Cashflow</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div class="filter">
      <div id="jahr"></div>
      <div id="objekt"></div>
    </div>
    <div id="inhalt"></div>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html" aria-current="page"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
/* Wertentwicklung & Cashflow — die Zahlen des Eigentuemers.
   Was auf die Mieter umgelegt wird (Kostenbloecke, Kostenfluss,
   Abrechnungsstand), steht auf nebenkosten.html. Jede Zahl nur einmal. */
import { api, eurKurz, esc } from './assets/immo.js';
import { saeulen, linie, legende, farbe } from './assets/charts.js';
import { auswahlfeld } from './assets/auswahl.js';

const inhalt = document.getElementById('inhalt');
const sub = document.getElementById('sub');

const jetzt = new Date().getFullYear();
const jahrWahl = auswahlfeld(document.getElementById('jahr'), {
  label: 'Jahr',
  optionen: Array.from({ length: 6 }, (_, i) => jetzt - i)
    .map(j => ({ wert: String(j), text: String(j) })),
  wert: String(jetzt),
  aenderung: () => zeichnen(),
});

const objektWahl = auswahlfeld(document.getElementById('objekt'), {
  label: 'Objekt',
  optionen: [{ wert: '', text: 'Alle Objekte' }],
  wert: '',
  aenderung: () => zeichnen(),
});

let objekte = [];
try {
  objekte = await api('/objekte');
  objektWahl.fuelle([{ wert: '', text: 'Alle Objekte' },
                     ...objekte.map(o => ({ wert: o.slug, text: o.name }))], '');
} catch {
  sub.textContent = 'API nicht erreichbar';
}

const qm = n => n == null ? '—'
  : n.toLocaleString('de-DE', { maximumFractionDigits: 1 }) + ' m²';
const proQm = n => n == null ? '—'
  : n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

function kpiFeld(label, wert, klasse = '') {
  return `<div class="k"><span class="kl">${label}</span>
          <span class="kv ${klasse}">${wert}</span></div>`;
}

/* Vermögenslage: Wert, Restschuld, Eigenkapital. Bei gewähltem Objekt nur
   dessen Zeile, sonst die Summe über alle. */
function vermoegenHtml(besitz, objekt) {
  if (!besitz) return '';
  const z = objekt
    ? besitz.objekte.find(o => o.slug === objekt)
    : besitz.gesamt;
  if (!z || (z.wert == null && !z.restschuld)) return '';

  const zeilen = besitz.objekte.map(o => `<tr>
      <td>${esc(o.name)}</td>
      <td>${o.wert == null ? '—' : eurKurz(o.wert)}</td>
      <td>${o.restschuld ? eurKurz(o.restschuld) : '—'}</td>
      <td class="${(o.eigenkapital ?? 0) >= 0 ? 'pos' : 'neg'}">${
        o.eigenkapital == null ? '—' : eurKurz(o.eigenkapital)}</td>
    </tr>`).join('');

  const fehlen = besitz.gesamt.ohne_wert;
  return `<div class="karte">
      <h3>Vermögen${objekt ? '' : ' · alle Objekte'}</h3>
      <div class="kpi" style="margin-bottom:${objekt ? '0' : '14px'}">
        ${kpiFeld('Wert', z.wert == null ? '—' : eurKurz(z.wert))}
        ${kpiFeld('Restschuld', eurKurz(z.restschuld), z.restschuld ? 'neg' : '')}
        ${kpiFeld('Eigenkapital', z.eigenkapital == null ? '—' : eurKurz(z.eigenkapital),
                  (z.eigenkapital ?? 0) >= 0 ? 'pos' : 'neg')}
      </div>
      ${objekt ? '' : `<table class="tabelle">
        <thead><tr><th>Objekt</th><th>Wert</th><th>Schuld</th><th>Eigen</th></tr></thead>
        <tbody>${zeilen}</tbody>
      </table>`}
      ${z.beleihung != null ? `<div class="chartleer" style="padding:12px 0 0">
        Beleihung ${z.beleihung} % · Tilgung ${eurKurz(z.tilgung_jahr)} und
        Zinsen ${eurKurz(z.zinslast_jahr)} pro Jahr</div>` : ''}
      ${!objekt && fehlen ? `<div class="chartleer" style="padding:6px 0 0">
        Bei ${fehlen} Objekt${fehlen === 1 ? '' : 'en'} fehlt noch ein Wert —
        Kaufpreis oder Verkehrswert auf der Objektseite nachtragen.</div>` : ''}
    </div>`;
}

/* Cashflow je Einheit — die eigentliche Eigentuemersicht: was traegt eine
   einzelne Wohnung, was kostet sie, und wie liegt sie beim Quadratmeterpreis.
   Die Objektkosten (Kredit, Versicherung, Steuer) verteilt die Engine nach
   Flaeche, deshalb hat auch eine Garage ohne Flaeche keine Kostenlast. */
function cashflowHtml(satz, einzeln) {
  const einheiten = (satz.einheiten || []).filter(e => e.einnahmen_jahr || e.kosten_jahr);
  if (!einheiten.length) return '';

  const bloecke = einheiten.map(e => `<div class="einheit">
      <span class="ename">${esc(e.bezeichnung)}</span>
      <span class="emeta">${esc([e.nutzungsart, e.partei].filter(Boolean).join(' · ')) || 'ohne Partei'}</span>
      <div class="ezahlen">
        <div><i>Fläche</i><b>${qm(e.flaeche)}</b></div>
        <div><i>€/m²</i><b>${proQm(e.miete_pro_qm)}</b></div>
        <div><i>Miete/Monat</i><b>${eurKurz(e.einnahmen_monat)}</b></div>
        <div><i>Einnahmen/Jahr</i><b class="pos">${eurKurz(e.einnahmen_jahr)}</b></div>
        <div><i>Kosten/Jahr</i><b class="neg">${eurKurz(e.kosten_jahr)}</b></div>
        <div><i>Saldo/Jahr</i><b class="${e.saldo_jahr >= 0 ? 'pos' : 'neg'}">${
          eurKurz(e.saldo_jahr)}</b></div>
      </div>
    </div>`).join('');

  return `<div class="karte">
      <h3>Cashflow je Einheit${einzeln ? '' : ' · ' + esc(satz.name)}</h3>
      <div class="kartesub">Objektkosten sind nach Fläche auf die Einheiten
        verteilt. Saldo = Jahresmiete abzüglich dieses Anteils.</div>
      ${saeulen(einheiten.map(e => ({ name: e.bezeichnung,
                                      a: e.einnahmen_jahr, b: e.kosten_jahr })))}
      ${legende([{ name: 'Einnahmen', farbe: '#2E7D4F' },
                 { name: 'Kostenanteil', farbe: '#B24229' }])}
      <div style="margin-top:18px">${bloecke}</div>
    </div>`;
}

async function zeichnen() {
  const jahr = jahrWahl.wert();
  const objekt = objektWahl.wert();
  const frage = new URLSearchParams({ jahr });
  if (objekt) frage.set('objekt', objekt);

  let daten, verlauf, besitz;
  try {
    [daten, verlauf, besitz] = await Promise.all([
      api('/auswertung?' + frage),
      api('/auswertung/mietverlauf' + (objekt ? '?objekt=' + encodeURIComponent(objekt) : '')),
      // Die Vermögenslage ist ein Bestand, kein Jahreswert — sie folgt dem
      // Objektfilter, nicht dem Jahr.
      api('/vermoegen').catch(() => null),
    ]);
  } catch {
    inhalt.innerHTML = `<div class="empty"><div class="big">Keine Verbindung</div>
      <p>Die Auswertung konnte nicht geladen werden.</p></div>`;
    return;
  }

  // Der Cashflow-Endpunkt kennt nur ein Objekt je Aufruf. Ohne Objektfilter
  // werden deshalb alle nebenlaeufig geholt — einzeln nachladen waere sichtbar
  // langsam und wuerde die Karten nacheinander einblenden.
  const slugs = objekt ? [objekt] : objekte.map(o => o.slug);
  const cashflows = (await Promise.all(slugs.map(s =>
    api(`/auswertung/cashflow?objekt=${encodeURIComponent(s)}&jahr=${jahr}`)
      .catch(() => null)))).filter(Boolean);

  // Das Saeulendiagramm traegt nur die Objekte, die im Jahr auch Zahlen haben,
  // und hoechstens acht davon: bei zwoelf Gruppen ueberlagern sich die
  // Beschriftungen zu einem unlesbaren Streifen — auch auf dem Desktop.
  const mitZahlen = daten.objekte
    .filter(o => o.einnahmen || o.ausgaben)
    .sort((a, b) => (b.einnahmen + b.ausgaben) - (a.einnahmen + a.ausgaben));
  const saeulenObjekte = mitZahlen.slice(0, 8);
  const weitere = daten.objekte.length - saeulenObjekte.length;

  const g = daten.gesamt;
  sub.textContent = `${daten.objekte.length} ${daten.objekte.length === 1 ? 'Objekt' : 'Objekte'} · ${jahr}`;

  inhalt.innerHTML = `
    <div class="kpi">
      ${kpiFeld('Einnahmen', eurKurz(g.einnahmen), 'pos')}
      ${kpiFeld('Ausgaben', eurKurz(g.ausgaben), 'neg')}
      ${kpiFeld('Saldo', eurKurz(g.saldo), g.saldo >= 0 ? 'pos' : 'neg')}
    </div>

    ${vermoegenHtml(besitz, objekt)}

    ${cashflows.map(c => cashflowHtml(c, Boolean(objekt))).join('')}

    <div class="karte">
      <h3>Einnahmen und Ausgaben je Objekt</h3>
      ${saeulen(saeulenObjekte.map(o => ({ name: o.name, a: o.einnahmen, b: o.ausgaben })))}
      ${legende([{ name: 'Einnahmen', farbe: '#2E7D4F' }, { name: 'Ausgaben', farbe: '#B24229' }])}
      ${weitere ? `<div class="chartleer" style="padding:10px 0 0">
        ${weitere} weitere${weitere === 1 ? 's' : ''} Objekt${weitere === 1 ? '' : 'e'}
        ohne Zahlen in ${jahr} — sie stehen oben in der Vermögenstabelle.</div>` : ''}
    </div>

    <div class="karte">
      <h3>Mietverlauf</h3>
      ${linie(verlauf.jahre, verlauf.reihen)}
      ${verlauf.reihen.length ? legende(verlauf.reihen.map((r, i) => ({ name: r.name, farbe: farbe(i) }))) : ''}
    </div>`;
}

await zeichnen();
</script>
</body>
</html>
