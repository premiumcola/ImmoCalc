<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nebenkostenabrechnung · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  /* ------------------------------------------------------------------
     Gemeinsame Regeln von wertentwicklung.html und nebenkosten.html.
     Sie stammen aus der frueheren statistik.html und stehen bewusst
     doppelt in beiden Seiten, weil immo.css hier nicht angefasst werden
     darf. GEHOERT SPAETER NACH immo.css: .filter, .kategorien, .karte,
     .chart, .chartleer, .legende und .applogo — alles davon ist
     seitenuebergreifend und nicht seitenspezifisch.
     ------------------------------------------------------------------ */
  /* Pillenform wie die Kategorie-Schalter darunter — sonst wirken die
     Auswahlfelder als einzige Elemente der Seite kantig. */
  .filter{display:flex;gap:8px;margin-bottom:12px}
  .filter > div{flex:1;min-width:0}
  .kategorien{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  /* Ein leeres Jahr hat nichts zu filtern — dann steht hier auch kein
     Zwischenraum, sonst klaffte über den Diagrammen eine Lücke. */
  .kategorien:empty{display:none}
  .kategorien button{border:none;background:var(--sheet);color:var(--soft);
    border-radius:999px;padding:9px 14px;font:600 12px var(--disp);cursor:pointer;
    min-height:38px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kategorien button[aria-pressed=true]{background:var(--teal-l);color:var(--teal-d)}
  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:14px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);letter-spacing:-.01em;margin:0 0 14px;color:var(--ink)}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .kpi .k{background:var(--sheet);border-radius:14px;padding:13px 12px;
          box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kpi .kl{display:block;font:600 9.5px var(--mono);letter-spacing:.08em;
           text-transform:uppercase;color:var(--soft)}
  .kpi .kv{display:block;font:700 16px var(--disp);letter-spacing:-.02em;margin-top:6px}
  .kpi .kv.pos{color:var(--pos)} .kpi .kv.neg{color:var(--neg)}
  @media(min-width:1000px){ .kpi{max-width:560px} }
  /* max-width: die SVGs haben eine viewBox und wuerden auf breiten Schirmen
     samt Schrift und Balken ins Riesenhafte skalieren. */
  .chart{width:100%;max-width:560px;height:auto;display:block;overflow:visible}
  .chartleer{font:400 13px var(--body);color:var(--soft);text-align:center;padding:22px 8px}
  .legende{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
  .legende .le{display:flex;align-items:center;gap:6px;font:500 11.5px var(--body);
               color:var(--soft)}
  .legende .le i{width:10px;height:10px;border-radius:3px;flex:none}

  /* App-Symbol in der Kopfzeile — kommt auf index.html und eingang.html
     gleich vor; gehoert eigentlich nach immo.css. */
  .applogo{width:34px;height:34px;border-radius:9px;flex:none;display:block}
  .applogo-link{display:block;border-radius:9px}
  .applogo-link:focus-visible{outline:2px solid var(--teal); outline-offset:2px}

  /* ---- nur diese Seite: Stand der Abrechnungszeitraeume ----------------
     Je Objekt eine Gruppe, darunter die Zeitraeume als Sprungziele nach
     zeitraum.html. Bewusst keine .row-Klasse: die traegt einen eigenen
     Kartenhintergrund, hier liegen die Zeilen aber schon in einer Karte. */
  .objgruppe{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .objgruppe:first-child{border-top:none;padding-top:0;margin-top:0}
  .objkopf{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px}
  .objname{font:600 14px var(--disp);letter-spacing:-.01em;color:var(--ink);
           min-width:0;overflow-wrap:anywhere}
  .zr{display:flex;flex-wrap:wrap;align-items:center;gap:8px;min-height:46px;
      padding:9px 12px;margin-top:7px;border-radius:12px;background:var(--paper);
      text-decoration:none;color:inherit}
  .zr:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .zrl{flex:1 1 150px;min-width:0;font:600 12.5px var(--body);letter-spacing:-.01em}
  /* Auf dem iPhone passen Zeitraum und zwei Chips nicht in eine Zeile — das
     Datum brach dann mitten im Bindestrich um. Lieber die Chips darunter. */
  @media(max-width:439px){
    .zr{padding:11px 12px}
    .zrl{flex-basis:100%;white-space:nowrap}
  }
  .zrl em{display:block;font:400 11px var(--body);font-style:normal;
          color:var(--soft);margin-top:3px}
  .zrpfeil{color:var(--soft);font:400 16px var(--body);flex:none}

  /* Reichweite des Filters — steht nur da, wenn wirklich gefiltert ist.
     Ohne diese Zeile bliebe offen, worauf sich die Auswahl auswirkt und
     worauf nicht. */
  .katstand{display:flex;flex-wrap:wrap;align-items:center;gap:10px;
            margin:-8px 0 18px;font:400 12px var(--body);color:var(--soft)}
  .katstand[hidden]{display:none}
  .katstand button{border:none;background:var(--sheet);color:var(--teal-d);
    border-radius:999px;padding:0 16px;min-height:44px;font:600 12px var(--disp);
    cursor:pointer;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .katstand button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  /* Merker an der Ueberschrift der gefilterten Karten. */
  .kfilter{display:inline-block;margin-left:8px;padding:3px 9px;border-radius:999px;
    background:var(--teal-l);color:var(--teal-d);
    font:600 9.5px var(--mono);letter-spacing:.07em;text-transform:uppercase;
    vertical-align:middle}

  /* Der Verweis auf die Eigentuemerseite. Steht genau einmal — die Trennung
     der beiden Bereiche muss erklaert werden, aber nicht dreimal. */
  .grenze{font:400 12px var(--body);color:var(--soft);line-height:1.5;
          margin:0 0 18px;max-width:560px}
  .grenze a{color:var(--teal-d);font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <a href="index.html" aria-label="Zur Übersicht" class="applogo-link"><img src="icons/icon.svg" alt="" class="applogo"></a>
    <div class="barwrap">
      <h1>Nebenkostenabrechnung</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div class="filter">
      <div id="jahr"></div>
      <div id="objekt"></div>
    </div>
    <div id="kopf"></div>
    <div class="kategorien" id="kategorien" role="group" aria-label="Kostenarten"></div>
    <p class="katstand" id="katstand" hidden></p>
    <div id="inhalt"></div>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html" aria-current="page"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
/* Nebenkostenabrechnung — der Mieterbereich. Hier steht ausschliesslich, was
   auf die Mieter umgelegt wird: ihre Vorauszahlungen, die umlagefaehigen
   Kosten je Kostenart und der Stand der Abrechnungszeitraeume.
   Kredit, Steuer und Versicherung traegt der Eigentuemer — die stehen auf
   wertentwicklung.html, ebenso Vermoegen, Cashflow und Mietverlauf. */
import { api, eurKurz, esc, fristKlasse, fristText } from './assets/immo.js';
import { balken, sankey } from './assets/charts.js';
import { auswahlfeld } from './assets/auswahl.js';

const kopf = document.getElementById('kopf');
const inhalt = document.getElementById('inhalt');
const sub = document.getElementById('sub');

const jetzt = new Date().getFullYear();
const jahrWahl = auswahlfeld(document.getElementById('jahr'), {
  label: 'Jahr',
  optionen: Array.from({ length: 6 }, (_, i) => jetzt - i)
    .map(j => ({ wert: String(j), text: String(j) })),
  wert: String(jetzt),
  aenderung: () => zeichnen(),
});

const objektWahl = auswahlfeld(document.getElementById('objekt'), {
  label: 'Objekt',
  optionen: [{ wert: '', text: 'Alle Objekte' }],
  wert: '',
  aenderung: () => zeichnen(),
});

let objekte = [];
try {
  objekte = await api('/objekte');
  objektWahl.fuelle([{ wert: '', text: 'Alle Objekte' },
                     ...objekte.map(o => ({ wert: o.slug, text: o.name }))], '');
} catch {
  sub.textContent = 'API nicht erreichbar';
}

/* Kostenarten-Filter — er wirkt auf die beiden Diagramme, NICHT auf die
   Kennzahlen im Kopf.

   Warum diese Trennung: „Guthaben“ und „Umlagefähig“ sind Aussagen über das
   Abrechnungsjahr, und genau so werden sie gelesen — die Zahl geht am Ende an
   den Mieter. Eine nach einer einzelnen Kostenart gefilterte Zahl trüge
   dieselbe Überschrift und wäre doch etwas völlig anderes: ein „Guthaben“, das
   nur entsteht, weil die übrigen Kosten gerade ausgeblendet sind. Der Filter
   nur an der Kachel zu markieren, würde das nicht heilen — die Zahl bliebe
   falsch verstehbar. Also: Kopf immer ganzes Jahr, Filter nur fürs Einzelne.
   Wohin er wirkt, sagt die Zeile unter den Schaltern. */
const kategorienFeld = document.getElementById('kategorien');
const katstand = document.getElementById('katstand');
let alleKategorien = [];
const gewaehlt = new Set();

function kategorienZeichnen() {
  kategorienFeld.innerHTML = alleKategorien.map(k =>
    `<button data-kat="${esc(k)}" aria-pressed="${gewaehlt.has(k)}">${esc(k)}</button>`).join('');
  katstand.hidden = !gewaehlt.size;
  if (gewaehlt.size) {
    katstand.innerHTML = `Die Diagramme zeigen ${gewaehlt.size} von
      ${alleKategorien.length} Kostenarten — die Kennzahlen oben das ganze Jahr.
      <button type="button" id="katalle">Alle Kostenarten</button>`;
  }
}

function kpiFeld(label, wert, klasse = '') {
  return `<div class="k"><span class="kl">${esc(label)}</span>
          <span class="kv ${klasse}">${wert}</span></div>`;
}

/* Die Mietersicht in drei Zahlen: was gezahlt wurde, was umgelegt wird, und
   was am Ende zurückfließt oder nachzuzahlen ist.

   Solange nichts umgelegt ist, gibt es keine dritte Zahl: „Guthaben in Höhe
   aller Vorauszahlungen“ wäre ein falscher Schluss aus einem Jahr, dessen
   Belege noch gar nicht da sind. */
function kopfHtml(daten, jahr) {
  const vz = daten.gesamt.vorauszahlungen || 0;
  // mieter.summe ist die Summe des Jahres, ungefiltert — anders als
  // gesamt.ausgaben, das dem Kostenart-Filter folgt. Die drei Zahlen hier
  // gehören zum Abrechnungsjahr und dürfen sich mit den Schaltern darunter
  // nicht verändern (siehe Begründung am Filter).
  const umlage = daten.mieter.summe || 0;
  const grenze = `<p class="grenze">Kredit, Steuer und Versicherung trägt der
    Eigentümer — sie stehen unter
    <a href="wertentwicklung.html">Wert &amp; Cashflow</a>.</p>`;

  if (!umlage) {
    return `<p class="grenze">Für ${jahr} ist noch nichts umgelegt${
      vz ? ` — die Vorauszahlungen liegen bei ${eurKurz(vz)}` : ''}.</p>${grenze}`;
  }

  const diff = Math.round((vz - umlage) * 100) / 100;
  return `<div class="kpi">
      ${kpiFeld('Vorauszahlungen', eurKurz(vz))}
      ${kpiFeld('Umlagefähig', eurKurz(umlage), 'neg')}
      ${kpiFeld(diff >= 0 ? 'Guthaben' : 'Nachzahlung', eurKurz(Math.abs(diff)),
                diff >= 0 ? 'pos' : 'neg')}
    </div>${grenze}`;
}

kategorienFeld.addEventListener('click', e => {
  const knopf = e.target.closest('[data-kat]');
  if (!knopf) return;
  const kat = knopf.dataset.kat;
  gewaehlt.has(kat) ? gewaehlt.delete(kat) : gewaehlt.add(kat);
  kategorienZeichnen();
  zeichnen();
});

katstand.addEventListener('click', e => {
  if (!e.target.closest('#katalle')) return;
  gewaehlt.clear();
  kategorienZeichnen();
  zeichnen();
});

/* Stand der Abrechnung je Objekt. Der Status steht im Zeitraum, die Zahl der
   offenen Positionen und die Frist nur in der Objektliste — beides gilt dort
   für den Zeitraum „in Arbeit“. */
const STATUSKLASSE = { 'in Arbeit': 'amber', 'abgeschlossen': 'pos', 'versendet': 'teal' };

function standHtml(staende) {
  const gruppen = staende.filter(s => s.zeitraeume.length).map(s => {
    const zeilen = s.zeitraeume.map(z => {
      const frist = z.status === 'in Arbeit' ? fristText(z.frist_tage) : null;
      return `<a class="zr" href="zeitraum.html?z=${z.id}">
        <span class="zrl">${esc(z.label)}<em>${esc(z.typ)}</em></span>
        <span class="chip ${STATUSKLASSE[z.status] || ''}">${esc(z.status)}</span>
        ${frist ? `<span class="chip ${fristKlasse(z.frist_tage)}">${esc(frist)}</span>` : ''}
        <span class="zrpfeil" aria-hidden="true">›</span>
      </a>`;
    }).join('');

    const offen = s.offene_positionen;
    return `<div class="objgruppe">
      <div class="objkopf">
        <span class="objname">${esc(s.name)}</span>
        <span class="chip ${offen ? 'amber' : 'pos'}">${
          offen ? `${offen} Position${offen === 1 ? '' : 'en'} offen` : 'alles erfasst'}</span>
      </div>
      ${zeilen}
    </div>`;
  }).join('');

  return `<div class="karte">
    <h3>Stand der Abrechnung</h3>
    ${gruppen || '<div class="chartleer">Noch kein Abrechnungszeitraum angelegt.</div>'}
  </div>`;
}

async function zeichnen() {
  const jahr = jahrWahl.wert();
  const objekt = objektWahl.wert();
  // sicht=mieter: die API liefert nur die umlagefähigen Kosten, je Kostenart
  const frage = new URLSearchParams({ jahr, sicht: 'mieter' });
  if (objekt) frage.set('objekt', objekt);
  // leere Auswahl = alles, sonst wäre die Ansicht nach dem ersten Klick leer
  if (gewaehlt.size) frage.set('kategorien', [...gewaehlt].join(','));

  let daten, fluss;
  try {
    [daten, fluss] = await Promise.all([
      api('/auswertung?' + frage),
      api('/auswertung/sankey?' + frage),
    ]);
  } catch {
    kopf.innerHTML = '';
    inhalt.innerHTML = `<div class="empty"><div class="big">Keine Verbindung</div>
      <p>Die Nebenkosten konnten nicht geladen werden.</p></div>`;
    return;
  }

  // Schalter nur für die Kostenarten, die im Jahr tatsächlich vorkommen. Im
  // leeren Jahr bleibt die Reihe leer: der ganze Katalog wären siebzehn
  // Schalter, die auf dem iPhone ein Viertel der Seite füllen und nichts
  // filtern könnten. mieter.bloecke folgt dem Filter nicht — die Liste steht
  // also fest, egal was gerade gewählt ist.
  const arten = Object.keys(daten.mieter.bloecke || {})
    .sort((a, b) => a.localeCompare(b, 'de'));
  if (arten.join('|') !== alleKategorien.join('|')) {
    alleKategorien = arten;
    const vorher = gewaehlt.size;
    for (const k of [...gewaehlt]) if (!arten.includes(k)) gewaehlt.delete(k);
    kategorienZeichnen();
    // Nach einem Jahres- oder Objektwechsel kann eine gewählte Kostenart
    // wegfallen. Dann passt die eben geholte Antwort nicht mehr zu den
    // Schaltern und wird einmal neu geholt.
    if (gewaehlt.size !== vorher) return zeichnen();
  }

  // Die Zeiträume hängen an den einzelnen Objekten — nebenläufig holen,
  // sonst baut sich die Liste sichtbar Stück für Stück auf.
  const gefiltert = objekt ? objekte.filter(o => o.slug === objekt) : objekte;
  const staende = (await Promise.all(gefiltert.map(async o => {
    const detail = await api('/objekte/' + encodeURIComponent(o.slug)).catch(() => null);
    return detail && { name: o.name, offene_positionen: o.offene_positionen,
                       zeitraeume: detail.zeitraeume || [] };
  }))).filter(Boolean);

  sub.textContent = `${daten.objekte.length} ${daten.objekte.length === 1 ? 'Objekt' : 'Objekte'} · ${jahr}`;

  // Die Beschriftungsspalte der Balken ist schmal; „Niederschlagswasser“
  // liefe sonst unter den Balken.
  const kurz = n => n.length > 15 ? n.slice(0, 14) + '…' : n;
  const bloecke = Object.entries(daten.kostenbloecke)
    .map(([name, wert]) => ({ name: kurz(name), wert, text: eurKurz(wert) }))
    .sort((a, b) => b.wert - a.wert);

  // An der Überschrift steht, ob die Karte nur einen Ausschnitt zeigt — die
  // Diagramme sind weit genug von den Schaltern entfernt, dass man es sonst
  // vergisst.
  const merker = gewaehlt.size ? '<span class="kfilter">gefiltert</span>' : '';

  // Was im Kostenfluss übrig bleibt, ist nur ohne Filter das Guthaben. Mit
  // Filter stecken die ausgeblendeten Kostenarten mit darin — dann darf der
  // Knoten nicht so heißen wie die Kennzahl oben, sonst stünden zwei
  // verschiedene Zahlen unter demselben Wort.
  if (gewaehlt.size) {
    for (const k of fluss.knoten) if (k.name === 'Guthaben') k.name = 'Rest';
  }

  kopf.innerHTML = kopfHtml(daten, jahr);
  inhalt.innerHTML = `
    <div class="karte">
      <h3>Umlagefähige Kosten ${jahr}${merker}</h3>
      ${balken(bloecke)}
    </div>

    <div class="karte">
      <h3>Kostenfluss ${jahr}${objekt ? ' · je Einheit' : ' · je Objekt'}${merker}</h3>
      ${daten.gesamt.ausgaben
        ? sankey(fluss.knoten, fluss.fluss,
                 { format: eurKurz, breite: window.innerWidth < 520 ? 270 : 560 })
        : '<div class="chartleer">Ohne umlagefähige Kosten gibt es nichts zu '
          + 'verteilen.</div>'}
    </div>

    ${standHtml(staende)}`;
}

await zeichnen();
</script>
</body>
</html>
