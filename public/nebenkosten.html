<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nebenkostenabrechnung · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  /* ------------------------------------------------------------------
     Gemeinsame Regeln von wertentwicklung.html und nebenkosten.html.
     Sie stammen aus der frueheren statistik.html und stehen bewusst
     doppelt in beiden Seiten, weil immo.css hier nicht angefasst werden
     darf. GEHOERT SPAETER NACH immo.css: .filter, .kategorien, .karte,
     .chart, .chartleer, .legende und .applogo — alles davon ist
     seitenuebergreifend und nicht seitenspezifisch.
     ------------------------------------------------------------------ */
  /* Pillenform wie die Kategorie-Schalter darunter — sonst wirken die
     Auswahlfelder als einzige Elemente der Seite kantig. */
  .filter{display:flex;gap:8px;margin-bottom:12px}
  .filter > div{flex:1;min-width:0}
  .kategorien{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .kategorien button{border:none;background:var(--sheet);color:var(--soft);
    border-radius:999px;padding:9px 14px;font:600 12px var(--disp);cursor:pointer;
    min-height:38px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kategorien button[aria-pressed=true]{background:var(--teal-l);color:var(--teal-d)}
  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:14px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);letter-spacing:-.01em;margin:0 0 14px;color:var(--ink)}
  /* max-width: die SVGs haben eine viewBox und wuerden auf breiten Schirmen
     samt Schrift und Balken ins Riesenhafte skalieren. */
  .chart{width:100%;max-width:560px;height:auto;display:block;overflow:visible}
  .chartleer{font:400 13px var(--body);color:var(--soft);text-align:center;padding:22px 8px}
  .legende{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
  .legende .le{display:flex;align-items:center;gap:6px;font:500 11.5px var(--body);
               color:var(--soft)}
  .legende .le i{width:10px;height:10px;border-radius:3px;flex:none}

  /* App-Symbol in der Kopfzeile — kommt auf index.html und eingang.html
     gleich vor; gehoert eigentlich nach immo.css. */
  .applogo{width:34px;height:34px;border-radius:9px;flex:none;display:block}
  .applogo-link{display:block;border-radius:9px}
  .applogo-link:focus-visible{outline:2px solid var(--teal); outline-offset:2px}

  /* ---- nur diese Seite: Stand der Abrechnungszeitraeume ----------------
     Je Objekt eine Gruppe, darunter die Zeitraeume als Sprungziele nach
     zeitraum.html. Bewusst keine .row-Klasse: die traegt einen eigenen
     Kartenhintergrund, hier liegen die Zeilen aber schon in einer Karte. */
  .objgruppe{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .objgruppe:first-child{border-top:none;padding-top:0;margin-top:0}
  .objkopf{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px}
  .objname{font:600 14px var(--disp);letter-spacing:-.01em;color:var(--ink);
           min-width:0;overflow-wrap:anywhere}
  .zr{display:flex;flex-wrap:wrap;align-items:center;gap:8px;min-height:46px;
      padding:9px 12px;margin-top:7px;border-radius:12px;background:var(--paper);
      text-decoration:none;color:inherit}
  .zr:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .zrl{flex:1 1 150px;min-width:0;font:600 12.5px var(--body);letter-spacing:-.01em}
  /* Auf dem iPhone passen Zeitraum und zwei Chips nicht in eine Zeile — das
     Datum brach dann mitten im Bindestrich um. Lieber die Chips darunter. */
  @media(max-width:439px){
    .zr{padding:11px 12px}
    .zrl{flex-basis:100%;white-space:nowrap}
  }
  .zrl em{display:block;font:400 11px var(--body);font-style:normal;
          color:var(--soft);margin-top:3px}
  .zrpfeil{color:var(--soft);font:400 16px var(--body);flex:none}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <a href="index.html" aria-label="Zur Übersicht" class="applogo-link"><img src="icons/icon.svg" alt="" class="applogo"></a>
    <div class="barwrap">
      <h1>Nebenkostenabrechnung</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div class="filter">
      <div id="jahr"></div>
      <div id="objekt"></div>
    </div>
    <div class="kategorien" id="kategorien" role="group" aria-label="Kostenarten"></div>
    <div id="inhalt"></div>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html" aria-current="page"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
/* Nebenkostenabrechnung — die Zahlen, die auf die Mieter umgelegt werden:
   Kostenblöcke, Kostenfluss und der Stand der Abrechnungszeiträume.
   Vermögen, Cashflow und Mietverlauf stehen auf wertentwicklung.html. */
import { api, eurKurz, esc, fristKlasse, fristText } from './assets/immo.js';
import { balken, sankey } from './assets/charts.js';
import { auswahlfeld } from './assets/auswahl.js';

const inhalt = document.getElementById('inhalt');
const sub = document.getElementById('sub');

const jetzt = new Date().getFullYear();
const jahrWahl = auswahlfeld(document.getElementById('jahr'), {
  label: 'Jahr',
  optionen: Array.from({ length: 6 }, (_, i) => jetzt - i)
    .map(j => ({ wert: String(j), text: String(j) })),
  wert: String(jetzt),
  aenderung: () => zeichnen(),
});

const objektWahl = auswahlfeld(document.getElementById('objekt'), {
  label: 'Objekt',
  optionen: [{ wert: '', text: 'Alle Objekte' }],
  wert: '',
  aenderung: () => zeichnen(),
});

let objekte = [];
try {
  objekte = await api('/objekte');
  objektWahl.fuelle([{ wert: '', text: 'Alle Objekte' },
                     ...objekte.map(o => ({ wert: o.slug, text: o.name }))], '');
} catch {
  sub.textContent = 'API nicht erreichbar';
}

/* Kostenarten-Filter — wirkt auf Blöcke und Kostenfluss gleichermaßen */
const kategorienFeld = document.getElementById('kategorien');
let alleKategorien = [];
const gewaehlt = new Set();

function kategorienZeichnen() {
  kategorienFeld.innerHTML = alleKategorien.map(k =>
    `<button data-kat="${esc(k)}" aria-pressed="${gewaehlt.has(k)}">${esc(k)}</button>`).join('');
}

kategorienFeld.addEventListener('click', e => {
  const knopf = e.target.closest('[data-kat]');
  if (!knopf) return;
  const kat = knopf.dataset.kat;
  gewaehlt.has(kat) ? gewaehlt.delete(kat) : gewaehlt.add(kat);
  kategorienZeichnen();
  zeichnen();
});

/* Stand der Abrechnung je Objekt. Der Status steht im Zeitraum, die Zahl der
   offenen Positionen und die Frist nur in der Objektliste — beides gilt dort
   für den Zeitraum „in Arbeit“. */
const STATUSKLASSE = { 'in Arbeit': 'amber', 'abgeschlossen': 'pos', 'versendet': 'teal' };

function standHtml(staende) {
  const gruppen = staende.filter(s => s.zeitraeume.length).map(s => {
    const zeilen = s.zeitraeume.map(z => {
      const frist = z.status === 'in Arbeit' ? fristText(z.frist_tage) : null;
      return `<a class="zr" href="zeitraum.html?z=${z.id}">
        <span class="zrl">${esc(z.label)}<em>${esc(z.typ)}</em></span>
        <span class="chip ${STATUSKLASSE[z.status] || ''}">${esc(z.status)}</span>
        ${frist ? `<span class="chip ${fristKlasse(z.frist_tage)}">${esc(frist)}</span>` : ''}
        <span class="zrpfeil" aria-hidden="true">›</span>
      </a>`;
    }).join('');

    const offen = s.offene_positionen;
    return `<div class="objgruppe">
      <div class="objkopf">
        <span class="objname">${esc(s.name)}</span>
        <span class="chip ${offen ? 'amber' : 'pos'}">${
          offen ? `${offen} Position${offen === 1 ? '' : 'en'} offen` : 'alles erfasst'}</span>
      </div>
      ${zeilen}
    </div>`;
  }).join('');

  return `<div class="karte">
    <h3>Stand der Abrechnung</h3>
    ${gruppen || '<div class="chartleer">Noch kein Abrechnungszeitraum angelegt.</div>'}
  </div>`;
}

async function zeichnen() {
  const jahr = jahrWahl.wert();
  const objekt = objektWahl.wert();
  const frage = new URLSearchParams({ jahr });
  if (objekt) frage.set('objekt', objekt);
  // leere Auswahl = alles, sonst wäre die Ansicht nach dem ersten Klick leer
  if (gewaehlt.size) frage.set('kategorien', [...gewaehlt].join(','));

  let daten, fluss;
  try {
    [daten, fluss] = await Promise.all([
      api('/auswertung?' + frage),
      api('/auswertung/sankey?' + frage),
    ]);
  } catch {
    inhalt.innerHTML = `<div class="empty"><div class="big">Keine Verbindung</div>
      <p>Die Nebenkosten konnten nicht geladen werden.</p></div>`;
    return;
  }

  // Die Zeiträume hängen an den einzelnen Objekten — nebenläufig holen,
  // sonst baut sich die Liste sichtbar Stück für Stück auf.
  const gefiltert = objekt ? objekte.filter(o => o.slug === objekt) : objekte;
  const staende = (await Promise.all(gefiltert.map(async o => {
    const detail = await api('/objekte/' + encodeURIComponent(o.slug)).catch(() => null);
    return detail && { name: o.name, offene_positionen: o.offene_positionen,
                       zeitraeume: detail.zeitraeume || [] };
  }))).filter(Boolean);

  sub.textContent = `${daten.objekte.length} ${daten.objekte.length === 1 ? 'Objekt' : 'Objekte'} · ${jahr}`;

  if (!alleKategorien.length && daten.kategorien) {
    alleKategorien = daten.kategorien;
    kategorienZeichnen();
  }

  const bloecke = Object.entries(daten.kostenbloecke)
    .map(([name, wert]) => ({ name, wert, text: eurKurz(wert) }))
    .sort((a, b) => b.wert - a.wert);

  inhalt.innerHTML = `
    <div class="karte">
      <h3>Kostenblöcke ${jahr}</h3>
      ${balken(bloecke)}
    </div>

    <div class="karte">
      <h3>Kostenfluss ${jahr}${objekt ? ' · je Einheit' : ' · je Objekt'}</h3>
      ${sankey(fluss.knoten, fluss.fluss,
               { format: eurKurz, breite: window.innerWidth < 520 ? 270 : 560 })}
    </div>

    ${standHtml(staende)}`;
}

await zeichnen();
</script>
</body>
</html>
