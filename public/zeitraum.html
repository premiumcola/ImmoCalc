<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Abrechnung · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;
          font:600 12px var(--mono);margin-bottom:16px;line-height:1.4}
  .banner .d{width:8px;height:8px;border-radius:50%;flex:none}
  .banner .days{margin-left:auto;font-weight:700;white-space:nowrap}
  .banner.pos{background:var(--pos-bg);color:var(--pos)} .banner.pos .d{background:var(--pos)}
  .banner.amber{background:var(--amber-bg);color:var(--amber)} .banner.amber .d{background:var(--amber)}
  .banner.neg{background:var(--neg-bg);color:var(--neg)} .banner.neg .d{background:var(--neg)}
  .banner.fertig{background:#EEF2F1;color:var(--soft)} .banner.fertig .d{background:var(--soft)}

  .fortschritt{background:var(--sheet);border-radius:14px;padding:15px 16px;margin-bottom:16px;
               box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .fortschritt .kopf{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .fortschritt .gross{font:700 19px var(--disp);letter-spacing:-.02em}
  .fortschritt .klein{font:500 12px var(--body);color:var(--soft)}
  .fortschritt .bahn{height:8px;border-radius:99px;background:#E4EAEA;overflow:hidden}
  .fortschritt .bahn i{display:block;height:100%;border-radius:99px;background:var(--teal)}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:var(--sheet);color:var(--soft);border-radius:11px;
    padding:11px 8px;font:600 12.5px var(--disp);cursor:pointer;min-height:44px;
    box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .tabs button[aria-selected=true]{background:var(--teal-l);color:var(--teal-d)}

  .pruef{background:var(--sheet);border-radius:14px;margin-bottom:10px;overflow:hidden;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  /* Gefüllte Zeile sanft grün herausheben: man sieht auf einen Blick, wo schon
     ein Betrag steht — und in welcher Höhe. Kein greller Block, sondern ein
     weicher Verlauf von links plus ein schmaler Akzent an der Kante. */
  .pruef.gefuellt{background:linear-gradient(100deg,var(--pos-bg) 0%,var(--sheet) 58%);
         box-shadow:inset 3px 0 0 var(--pos),0 1px 3px rgba(22,38,44,.07)}
  .pruef.gefuellt .wert{color:var(--pos)}
  /* CCLXXVIII — vorläufige (orange) Position aus einem Beleg: dieselbe Sprache
     wie die grüne „gefüllt"-Zeile, nur in Amber. Der Nutzer sieht auf einen
     Blick, dass hier noch eine Entscheidung aussteht — dezent, nicht grell.
     Amber übersticht Grün: eine bestätigte Position wird grün, hier ist noch
     nichts bestätigt. */
  .pruef.entwurf{background:linear-gradient(100deg,var(--amber-bg) 0%,var(--sheet) 60%);
         box-shadow:inset 3px 0 0 var(--amber),0 1px 3px rgba(22,38,44,.07)}
  .pruef.entwurf .wert{color:var(--amber)}
  .pruef.entwurf .ikon.fertig,.pruef.entwurf .ikon.warte{
         background:var(--amber-bg);color:var(--amber)}
  .pruef.entwurf .haken{background:var(--amber-bg);color:var(--amber)}
  /* Das kleine „Entwurf aus Beleg"-Etikett unter dem Namen — eine eigene Zeile,
     so breit wie sein Text, damit es nicht am Titel klebt. */
  .entw-badge{display:block;width:fit-content;max-width:100%;margin-top:6px;
    font:600 9.5px var(--mono);letter-spacing:.06em;text-transform:uppercase;
    color:var(--amber);background:var(--amber-bg);border-radius:7px;padding:4px 8px}
  /* Der Entscheidungsblock im aufgeklappten Bereich: ein ruhiger Amber-Kasten
     mit zwei klaren Wegen — bestätigen (wird grün) oder zurück in den Prüfmodus. */
  .entwurf-box{background:var(--amber-bg);border-radius:12px;padding:13px 14px;
    margin-bottom:6px}
  .entwurf-box .ek{display:flex;align-items:center;gap:7px;
    font:600 10px var(--mono);letter-spacing:.06em;text-transform:uppercase;
    color:var(--amber);margin-bottom:7px}
  .entwurf-box p{font:400 12px var(--body);color:var(--ink);line-height:1.5;
    margin:0 0 12px}
  .entwurf-aktionen{display:flex;flex-wrap:wrap;gap:8px}
  .entwurf-aktionen button{flex:1;min-width:140px;border:none;border-radius:11px;
    padding:12px 14px;font:600 13px var(--disp);cursor:pointer;min-height:44px}
  .entwurf-ja{background:var(--pos);color:#fff}
  .entwurf-ja:hover{background:#276b44}
  .entwurf-nein{background:var(--sheet);color:var(--amber);
    box-shadow:inset 0 0 0 1.5px var(--amber-li)}
  .entwurf-nein:hover{background:#fff;box-shadow:inset 0 0 0 1.5px var(--amber)}
  .entwurf-aktionen button[disabled]{opacity:.65;cursor:default}
  /* Fußzeile: was am Zeitraum hängt, und der ruhige Hinweis auf das
     automatische Entfernen — kein Löschknopf. */
  .zr-fuss{margin-top:18px;padding:14px 16px;border-radius:14px;
           background:var(--sheet);box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .zr-fuss .zeilen{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .zr-fuss .chip{font:600 11.5px var(--mono);padding:5px 10px;border-radius:999px;
                 background:#EDF1F0;color:var(--soft)}
  .zr-fuss .chip.hat{background:var(--pos-bg);color:var(--pos)}
  .zr-fuss .hinweis{font:400 12px var(--body);color:var(--soft);line-height:1.5}
  .pruef .zeile{display:flex;gap:12px;align-items:center;padding:13px 15px;
                width:100%;border:none;background:none;text-align:left;cursor:pointer;
                font-family:var(--body);color:inherit;min-height:44px}
  .pruef .zeile + .auf{border-top:1px solid var(--line)}
  .haken{width:24px;height:24px;border-radius:50%;flex:none;display:flex;
         align-items:center;justify-content:center;font:600 12px var(--mono)}
  .haken.gruen{background:var(--pos-bg);color:var(--pos)}
  .haken.rot{background:var(--neg-bg);color:var(--neg)}
  .haken.grau{background:#EDF1F0;color:var(--soft)}
  /* overflow-wrap: lange Begriffe wie "Gebäudeversicherung" schieben sonst
     den Betrag an sich heran, bis beides zusammenklebt. */
  /* hyphens vor overflow-wrap: so wird aus "Gebäudeversicherung" ein
     getrenntes "Gebäude-versicherung" statt eines Bruchs mitten im Wort.
     overflow-wrap bleibt als Notnagel fuer Woerter ohne Trennstelle. */
  .pruef .name{flex:1;min-width:0;font:600 14px var(--disp);letter-spacing:-.01em;
               hyphens:auto;overflow-wrap:anywhere;padding-right:4px}
  .pruef .unter{display:block;font:400 11.5px var(--body);color:var(--soft);
                margin-top:3px;line-height:1.4;letter-spacing:0}
  .pruef .rechts{display:flex;align-items:center;gap:10px;flex:none}
  /* Einheitliches Kategorie-Symbol; die Farbe traegt den Zustand. */
  .ikon{width:34px;height:34px;border-radius:10px;flex:none;display:flex;
        align-items:center;justify-content:center}
  .ikon svg{width:21px;height:21px;display:block}
  .ikon.fertig{background:var(--pos-bg);color:var(--pos)}
  .ikon.warte{background:#EDF1F0;color:var(--soft)}
  .pruef .wert{font:600 13px var(--mono);white-space:nowrap}
  .pruef .wert.fehlt{color:var(--neg)}
  .pruef .auf{padding:0 15px 14px;border-top:1px solid var(--line)}
  .pruef .auf .zk{font:600 10px var(--mono);letter-spacing:.07em;text-transform:uppercase;
                  color:var(--soft);margin:12px 0 6px}
  .pruef .auf .rz{display:flex;justify-content:space-between;gap:10px;
                  font:500 12.5px var(--body);padding:4px 0}
  .pruef .auf .rz span:last-child{font-family:var(--mono);font-weight:600}
  /* Scan direkt in der Zeile: einladend, aber nicht grell — gedecktes Grün
     auf hellem Grund statt eines vollflächigen Knopfes. Steht neben dem
     Zeilenknopf, nicht darin: Knöpfe lassen sich nicht schachteln. */
  .pruef .kopf{display:flex;align-items:center;gap:8px;padding-right:15px}
  .pruef .kopf > .zeile{flex:1;min-width:0;padding-right:2px}
  .scanmini{display:flex;align-items:center;gap:7px;flex:none;
    border:1.5px solid #BFD9D1;background:var(--teal-l);color:var(--teal-d);
    border-radius:11px;padding:9px 11px;cursor:pointer;font-family:var(--body);
    min-height:44px}
  .scanmini:hover{background:#DCEDE7}
  .scanmini[disabled]{opacity:.65;cursor:default}
  .scanmini .si{font:400 15px var(--mono);line-height:1;flex:none}
  .scanmini .st{font:600 11.5px var(--disp);letter-spacing:-.005em;
                white-space:nowrap}
  /* Auf dem Handy wird es sonst zu eng — dort trägt das Symbol allein. */
  @media(max-width:409px){ .scanmini .st{display:none} }
  .nachtrag{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .nachtrag input{flex:1;min-width:130px;border:1.5px solid var(--line);
    border-radius:10px;padding:10px 12px;
    font:500 14px var(--body);min-height:44px;background:var(--sheet)}
  .nachtrag input:focus{outline:none;border-color:var(--teal)}
  .nachtrag button{border:none;border-radius:10px;padding:10px 16px;background:var(--teal);
    color:#fff;font:600 13px var(--disp);cursor:pointer;min-height:44px}
  /* Eine Kostenart aus dem Katalog, zu der es noch keine Position gibt:
     hier entsteht sie. Der Betrag ist freiwillig — wer den Beleg noch sucht,
     legt die Position leer an und trägt ihn später nach. */
  .neu .text{display:block;font:400 11.5px var(--body);color:var(--soft);
             line-height:1.45;margin:10px 0 0}
  /* Entfernen steht bewusst am Ende und leise: es ist die seltenste Handlung
     an einer Position und darf nicht neben „Übernehmen" um Klicks buhlen. */
  .entfernen{margin-top:12px;border:none;background:transparent;color:var(--soft);
    text-decoration:underline;text-underline-offset:3px;cursor:pointer;
    font:600 12px var(--disp);padding:10px 2px;min-height:44px}
  .entfernen:hover{color:var(--neg)}
  /* Verteilung: Schlüssel wählen, Gewichte lesen und überschreiben.
     Die Zahl allein („Büro 4.1398") sagt niemandem etwas — erst Maßeinheit
     und Prozentanteil machen sie lesbar. */
  .vt{margin-top:2px}
  .vt .wahl{margin:6px 0 4px}
  .vt .hinweis{font:400 11.5px var(--body);color:var(--soft);line-height:1.45;
               margin:8px 0 2px}
  .gw{display:flex;align-items:center;gap:8px;padding:5px 0}
  .gw .gn{flex:1;min-width:0;font:500 12.5px var(--body);
          hyphens:auto;overflow-wrap:anywhere}
  .gw input{width:92px;flex:none;border:1.5px solid var(--line);border-radius:10px;
    padding:9px 10px;font:600 12.5px var(--mono);min-height:44px;
    background:var(--sheet);text-align:right;color:inherit}
  .gw input:focus{outline:none;border-color:var(--teal)}
  /* Ein Leerstand heißt wie seine Einheit („EG") und sähe sonst aus wie ein
     Mieter. Die Beischrift sagt, wer ihn trägt. */
  .gw .gsub{display:block;font:400 11px var(--body);color:var(--soft);
            margin-top:2px;line-height:1.35}
  .gw .gv{width:92px;flex:none;text-align:right;font:600 12.5px var(--mono)}
  .gw .gp{width:48px;flex:none;text-align:right;
          font:600 11.5px var(--mono);color:var(--soft)}
  .vt .knopfzeile{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .vt .knopfzeile button{border:none;border-radius:10px;padding:10px 14px;
    font:600 12.5px var(--disp);cursor:pointer;min-height:44px}
  .vt .haupt{background:var(--teal);color:#fff}
  .vt .leise{background:#EDF1F0;color:var(--ink)}
  .vt .leise:hover{background:#E1E8E6}
  .warnung{display:flex;gap:9px;align-items:flex-start;background:var(--neg-bg);
    color:var(--neg);border-radius:11px;padding:11px 12px;margin:10px 0 2px;
    font:500 11.5px var(--body);line-height:1.45}
  .warnung b{font-weight:700}
  .pdflink{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    background:#F1F4F4;color:var(--ink);border-radius:10px;padding:9px 12px;
    font:600 11.5px var(--body);min-height:40px;margin-top:10px}
  .pdflink:hover{background:var(--teal-l);color:var(--teal-d)}
  .wiederauf{margin-top:12px;border:none;background:transparent;color:var(--soft);
    text-decoration:underline;text-underline-offset:3px;cursor:pointer;
    font:600 12px var(--disp);padding:10px 2px;min-height:44px}
  .wiederauf:hover{color:var(--ink)}
  .belege{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .belege a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;
    background:#F1F4F4;color:var(--ink);border-radius:9px;padding:8px 11px;
    font:500 11.5px var(--body);min-height:36px}
  .belege a:hover{background:var(--teal-l);color:var(--teal-d)}
  .belege .kein{font:400 12px var(--body);color:var(--soft);line-height:1.45}
  /* CCLV — kostenfreie Belege als kleiner Anhänger („Kleideranhänger") am
     Kostenart-Thema. Dezent und gedeckt-grau, klar ohne Betrag — nie mit den
     grün gefüllten Kostenzeilen zu verwechseln. Sitzt unter der Kopfzeile und
     erscheint auch bei „offen"/„fehlt", weil er am Thema hängt, nicht an der
     Position. */
  .anh{display:flex;flex-wrap:wrap;gap:6px;padding:0 15px 12px}
  .anh-chip{display:inline-flex;align-items:center;max-width:100%;
            background:#EDF1F0;border-radius:9px;overflow:hidden}
  .anh-chip a{display:inline-flex;align-items:center;gap:5px;min-width:0;
              text-decoration:none;color:var(--soft);padding:7px 6px 7px 10px;
              min-height:32px;font:600 11px var(--mono)}
  .anh-chip a:hover{color:var(--teal-d)}
  .anh-chip svg{width:13px;height:13px;flex:none}
  .anh-t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
  .anh-x{border:none;background:none;color:var(--soft);cursor:pointer;
         font:400 15px var(--body);line-height:1;padding:0 10px;
         align-self:stretch;min-width:34px}
  .anh-x:hover{color:var(--neg);background:rgba(178,66,41,.09)}
  /* Anhängen aus dem Bestand — leise und gestrichelt, im aufgeklappten Bereich. */
  .anh-verwalt{margin-top:14px}
  .anh-anbau{display:inline-flex;align-items:center;gap:7px;cursor:pointer;
             border:1.5px dashed var(--line);background:transparent;
             color:var(--soft);border-radius:11px;padding:10px 13px;
             font:600 12px var(--disp);min-height:44px}
  .anh-anbau:hover{border-color:var(--teal);color:var(--teal-d);background:var(--teal-l)}
  .anh-anbau svg{width:15px;height:15px;flex:none}
  .anh-hint{display:block;font:400 11px var(--body);color:var(--soft);
            line-height:1.45;margin-top:8px}
  /* Auswahl-Dialog der kostenfreien Belege aus dem Bestand. */
  .ahdlg .ahliste{max-height:min(50dvh,360px);overflow:auto;margin:6px 0 14px}
  .ahdlg .ahz{display:flex;align-items:center;gap:11px;width:100%;cursor:pointer;
              border:none;background:var(--sheet);border-radius:12px;
              padding:12px 13px;margin-bottom:8px;min-height:52px;text-align:left;
              font-family:var(--body);color:var(--ink);
              box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .ahdlg .ahz:hover{background:var(--teal-l)}
  .ahdlg .ahz svg{width:18px;height:18px;flex:none;color:var(--soft)}
  .ahdlg .ahn{flex:1;min-width:0;font:600 13px var(--body);overflow-wrap:anywhere}
  .ahdlg .ahsub{display:block;font:400 10.5px var(--mono);color:var(--soft);
                margin-top:2px}
  .ahdlg .ahleer{font:400 12.5px var(--body);color:var(--soft);line-height:1.55;
                 margin:4px 0 14px}
  /* Woraus die Summe entstanden ist (CLXXXII) — eine ruhige Zeile über den
     Belegen, damit vier Abschlagsrechnungen nicht als eine Zahl dastehen. */
  .zsumme{font:500 11.5px var(--mono);color:var(--teal-d);background:var(--teal-l);
          border-radius:9px;padding:8px 10px;margin-top:8px;line-height:1.5}
  /* ---- CXCIV: Sonderposten nur für eine Einheit ---- */
  .sonder .erklaer{display:block;font:400 11.5px var(--body);color:var(--soft);
    line-height:1.5;margin:0 0 12px}
  .sonder .starten{border:1.5px dashed var(--line);background:transparent;
    color:var(--teal-d);border-radius:12px;padding:12px 16px;width:100%;
    font:600 13px var(--disp);cursor:pointer;min-height:48px}
  .sonder .starten:hover{border-color:var(--teal);background:var(--teal-l)}
  .sonder .feldlabel{display:block;font:600 10px var(--mono);letter-spacing:.07em;
    text-transform:uppercase;color:var(--soft);margin:14px 0 8px}
  .sonder .einheiten{display:flex;flex-wrap:wrap;gap:8px}
  .ewahl{display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;
    min-height:44px;padding:8px 15px;border:none;border-radius:999px;
    background:var(--paper);color:inherit;cursor:pointer;text-align:left;
    box-shadow:inset 0 1px 2px rgba(22,38,44,.05)}
  .ewahl .ename{font:600 13px var(--body);line-height:1.2}
  .ewahl .epartei{font:500 10px var(--mono);color:var(--soft);white-space:nowrap}
  .ewahl.an{background:var(--teal);box-shadow:none}
  .ewahl.an .ename{color:#fff}
  .ewahl.an .epartei{color:rgba(255,255,255,.8)}
  .sonder .abbrechen{margin-top:10px;border:none;background:transparent;
    color:var(--soft);text-decoration:underline;text-underline-offset:3px;
    cursor:pointer;font:600 12px var(--disp);padding:10px 2px;min-height:44px}
  .sonder .abbrechen:hover{color:var(--ink)}

  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:12px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);margin:0 0 12px;
            display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .marke{font:600 9.5px var(--mono);letter-spacing:.07em;text-transform:uppercase;
         border-radius:7px;padding:4px 7px;background:#EDF1F0;color:var(--soft)}
  .marke.gut{background:var(--teal-l);color:var(--teal-d)}
  .marke.post{background:var(--amber-bg);color:var(--amber)}
  /* An wen die Abrechnung geht — mehrere Adressen stehen alle da, sonst
     bliebe offen, wer sie außer dem Vertragspartner noch bekommt. */
  .wemgeht{font:400 11.5px var(--body);color:var(--soft);line-height:1.45;
           margin:-6px 0 12px;overflow-wrap:anywhere}
  .wemgeht.fehlt{color:var(--amber)}
  .summe{display:flex;justify-content:space-between;gap:12px;padding:9px 0;
         font:500 13.5px var(--body);border-top:1px solid var(--line)}
  .summe:first-of-type{border-top:none}
  .summe b{font-family:var(--mono)}
  .summe.gesamt{font-weight:700;border-top:2px solid var(--line)}
  .summe .pos{color:var(--pos)} .summe .neg{color:var(--neg)}

  .sortleiste{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .sortleiste span{font:600 10px var(--mono);letter-spacing:.08em;
                   text-transform:uppercase;color:var(--soft);margin-right:2px}
  .sortleiste button{border:none;background:var(--sheet);color:var(--soft);
    border-radius:999px;padding:8px 13px;font:600 11.5px var(--disp);cursor:pointer;
    min-height:38px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .sortleiste button[aria-pressed=true]{background:var(--teal-l);color:var(--teal-d)}

  .abschluss{border-radius:16px;padding:18px;margin:16px 0 4px}
  .abschluss .at{font:700 16px var(--disp);letter-spacing:-.015em;margin-bottom:6px}
  .abschluss p{font:400 13px var(--body);margin:0 0 14px;line-height:1.5}
  .abschluss.bereit{background:var(--pos-bg);color:var(--pos)}
  .abschluss.offen{background:var(--sheet);color:var(--ink);
                   box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .abschluss.offen p{color:var(--soft)}
  .abschluss.fertig{background:#EEF2F1;color:var(--soft)}
  .abschluss.fertig p{color:var(--soft);margin-bottom:0}
  .uebergehen{display:flex;align-items:center;gap:10px;margin-bottom:14px;
              font:500 13px var(--body);color:var(--ink);cursor:pointer;min-height:44px}
  .uebergehen input{width:20px;height:20px;flex:none}
  .losbutton{width:100%;border:none;border-radius:12px;padding:15px;cursor:pointer;
    font:600 15px var(--disp);background:var(--pos);color:#fff;min-height:48px;
    box-shadow:0 6px 16px -8px rgba(46,125,79,.7)}
  .losbutton:hover{background:#276b44}
  .losbutton[disabled]{background:#C2CCCB;color:#fff;box-shadow:none;cursor:default}

  /* Versandplan vor dem Abschluss: eine Zeile je Partei, der Leerstand ruhig
     am Ende. Er ist kein Empfänger, sondern der Anteil des Eigentümers. */
  .vdlg .vliste{max-height:min(44dvh,330px);overflow:auto;margin:0 0 16px;
                background:var(--sheet);border-radius:12px}
  .vdlg .vz{display:flex;align-items:flex-start;gap:10px;padding:12px 13px}
  .vdlg .vz + .vz{border-top:1px solid var(--line)}
  .vdlg .vn{flex:1;min-width:0;font:600 13px var(--body);color:var(--ink);
            overflow-wrap:anywhere}
  .vdlg .vs{display:block;font:400 11px var(--body);color:var(--soft);
            margin-top:3px;line-height:1.45}
  .vdlg .vm{flex:none;margin-top:1px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button class="back" id="back">Zurück</button>
    <div class="barwrap">
      <h1 id="titel">Abrechnung</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll" id="inhalt"></div>
  <!-- Kamera fuer den Scan an einer offenen Position. capture=environment
       oeffnet auf iOS direkt die Ruecckamera. -->
  <input type="file" id="scanFeld" accept="image/*" capture="environment" multiple
         style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
         tabindex="-1" aria-hidden="true">

  <div data-nav></div>
</div>

<script type="module">
import { api, eur, eurKurz, esc, fristKlasse, melde, frage, belegAnsehen, installNav }
  from './assets/immo.js';
import { auswahlfeld } from './assets/auswahl.js';
import { sankey } from './assets/charts.js';
import { kostenIcon } from './assets/kostenicons.js';
import { scanZuPdf, lesbareGroesse } from './assets/scan.js';
installNav();

const zid = new URLSearchParams(location.search).get('z');
const inhalt = document.getElementById('inhalt');
const titel = document.getElementById('titel');
const sub = document.getElementById('sub');
let daten = null;
/* Welche Verteilungsschlüssel für dieses Objekt taugen und welche Gewichte
   sie ergäben — die Vorschau, bevor man sich festlegt. */
let schluessel = null;
/* CCLV — kostenfreie Themen-Anhänger: was am Zeitraum hängt (nach Kostenart
   gruppiert) und welche kostenfreien Belege sich noch anhängen ließen. */
let anhaenger = null;
/* Welche Zeilen der Verteilung kein Mieter sind, sondern unbelegte Zeit. Die
   Schlüssel-Vorschau nennt sie je Schlüssel; zusammen sind das die Leerstände
   des Zeitraums. Ohne diese Kennzeichnung liest sich der Anteil, den der
   Eigentümer selbst trägt, wie eine Partei namens „EG". */
let leerstaende = new Set();
let ansicht = 'pruef';
let sortierung = 'status';
const offen = new Set();
/* CXCIV — Sonderposten nur für eine Einheit: ob das Formular aufgeklappt ist
   und welche Einheit gerade gewählt wurde. */
let sonderOffen = false;
let sonderEinheit = '';

/* Welche Position gerade einen Beleg erwartet — gesetzt beim Klick auf den
   Scan-Knopf, gelesen, wenn die Kamera zurückkommt. */
let scanZiel = null;

const SORTIERUNG = {
  status: (a, b) => Number(a.erledigt) - Number(b.erledigt) ||
                    (b.betrag || 0) - (a.betrag || 0),
  betrag: (a, b) => (b.betrag || 0) - (a.betrag || 0),
  name: (a, b) => a.kostenart.localeCompare(b.kostenart, 'de'),
};

document.getElementById('back').addEventListener('click', () => history.length > 1
  ? history.back() : location.href = 'index.html');

const HAKEN = {
  erledigt: ['gruen', '✓'],
  offen: ['rot', '!'],
  fehlt: ['grau', '–'],
};

function bannerHtml() {
  if (daten.status !== 'in Arbeit') {
    return `<div class="banner fertig"><span class="d"></span>
      <span>Abgeschlossen · ${esc(daten.label)}</span></div>`;
  }
  const k = fristKlasse(daten.frist_tage);
  const tage = daten.frist_tage < 0
    ? `${Math.abs(daten.frist_tage)} Tage über` : `noch ${daten.frist_tage} Tage`;
  return `<div class="banner ${k}"><span class="d"></span>
    <span>Frist § 556 BGB</span><span class="days">${tage}</span></div>`;
}

/* Welche Belege zu einer Position gehören.

   CLXXXIII: die belastbare Auskunft steht seit dem Übernehmen an den Belegen
   selbst (`position_id`) und kommt als `k.belege` mit — sie überlebt eine
   umbenannte Kostenart und trägt den Betrag, mit dem der Beleg in der Summe
   steckt. Erst danach greifen die beiden alten Wege: die Gruppierung nach
   Dokumentart und, für Scans aus der Checkliste, der Dateiname. */
function belegeZu(k) {
  if (k.belege?.length) return k.belege;
  const gruppe = (daten.belege_je_art || {})[k.kostenart];
  if (gruppe?.length) return gruppe;
  const stamm = k.kostenart.toLowerCase().split(/[ /]/)[0];
  return (daten.dokumente || []).filter(d =>
    (d.dateiname || '').toLowerCase().includes(stamm));
}

/* `data-name` statt der Beschriftung: seit der Betrag mit im Text steht,
   hiesse der Beleg im Dialog sonst „…pdf · 1.284,50 €". */
const belegLinks = liste => `<div class="belege">${liste.map(d =>
  `<a href="#" data-beleg="${d.id}" data-name="${esc(d.dateiname)}"
      title="${esc(d.pfad)}">PDF · ${esc(d.dateiname)}${
    d.betrag ? ` · ${eur(d.betrag)}` : ''}</a>`
).join('')}</div>`;

/* Woraus der Betrag besteht. Vier Abschlagsrechnungen ergeben eine Position
   (CLXXXII) — ohne diesen Satz stünde dort nur eine Summe, die niemand mehr
   auf ihre Belege zurückführen kann. */
function zusammensetzungHtml(k) {
  if (!k.beleg_summe) return '';
  const anzahl = (k.belege || []).length;
  // „aus" verlangt den Dativ: aus einem Beleg, aus zwei Belegen.
  const teile = [`${anzahl} ${anzahl === 1 ? 'Beleg' : 'Belegen'} · ${eur(k.beleg_summe)}`];
  if (k.handanteil) teile.push(`${eur(k.handanteil)} von Hand`);
  return `<div class="zsumme">Summe aus ${teile.join(' · ')}</div>`;
}

function belegeHtml(k) {
  const alle = belegeZu(k);
  if (!alle.length) {
    return `<div class="belege"><span class="kein">Kein Beleg hinterlegt —
      im Eingang lässt sich einer übernehmen.</span></div>`;
  }
  return zusammensetzungHtml(k) + belegLinks(alle);
}

/* CCLV — der kleine Anhänger („Kleideranhänger"): ein flaches Etikett-Symbol
   im bestehenden Strichstil, kein Emoji. */
const ANH_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
  stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
  aria-hidden="true"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.4-7.4A2 2
  0 0 1 2.6 11.8V4.8a2 2 0 0 1 2-2h7a2 2 0 0 1 1.4.6l7.4 7.4a2 2 0 0 1 0
  2.8Z"/><circle cx="7.8" cy="7.8" r="1.4"/></svg>`;

/* Der Dateiname als kurze Chip-Beschriftung: Endung, führendes Datum und ein
   etwaiger Betrag hinten fallen weg — übrig bleibt die Sache selbst. */
const kurzBeleg = name => (name || '')
  .replace(/\.[^.]+$/, '')
  .replace(/^\d{4}(-\d{2})?[_-]/, '')
  .replace(/_-?\d[\d.,]*\s*€$/, '')
  .replace(/[_-]+/g, ' ')
  .trim() || (name || 'Beleg');

const anhaengerZu = kostenart => (anhaenger?.angehaengt || {})[kostenart] || [];

/* Die Chip-Leiste unter der Kopfzeile: je Anhänger ein gedeckter Chip
   (antippen → ansehen) und, solange der Zeitraum in Arbeit ist, ein leises ×
   zum Lösen. Sie erscheint unabhängig davon, ob es eine Kostenposition gibt. */
function anhaengerStrip(k) {
  const liste = anhaengerZu(k.kostenart);
  if (!liste.length) return '';
  const bearbeitbar = daten.status === 'in Arbeit';
  const chips = liste.map(d => `
    <span class="anh-chip">
      <a href="#" data-beleg="${d.id}" data-name="${esc(d.dateiname)}"
         title="${esc(d.pfad)} · Zusatzbeleg ohne Kostenanteil">${ANH_ICON}<span
         class="anh-t">${esc(kurzBeleg(d.dateiname))}</span></a>
      ${bearbeitbar ? `<button class="anh-x" data-anh-loesen="${d.id}"
        title="Anhänger lösen" aria-label="Anhänger von ${esc(k.kostenart)} lösen"
        >×</button>` : ''}
    </span>`).join('');
  return `<div class="anh">${chips}</div>`;
}

const schluesselMeta = wert =>
  (schluessel?.schluessel || []).find(s => s.wert === wert) || null;

const prozentText = (wert, summe) =>
  summe > 0 ? `${(Number(wert || 0) / summe * 100).toFixed(1)} %` : '—';

/* Warum eine Einheit zweimal in der Verteilung steht: war sie nur einen Teil
   des Zeitraums vermietet, trägt der Mieter seine Wohndauer und der Eigentümer
   die leere Zeit. Ohne diesen Satz sieht das nach einer doppelten Zeile aus. */
function doppelteEinheit(namen) {
  const einheit = new Map(
    (schluessel?.parteien || []).map(p => [p.partei, p.einheit]));
  const doppelt = namen.filter(n => leerstaende.has(n) && einheit.get(n)
    && namen.some(m => m !== n && einheit.get(m) === einheit.get(n)));
  if (!doppelt.length) return '';
  return `<div class="hinweis">${doppelt.map(esc).join(', ')} ${
    doppelt.length === 1 ? 'steht' : 'stehen'} zweimal in der Liste: einmal für
    die vermietete Zeit, einmal für den Leerstand.</div>`;
}

/* Verteilung einer Position: Schlüssel wählbar, Gewichte lesbar.
   Eine nackte Zahl („Büro 4.1398") sagt niemandem etwas — erst Maßeinheit und
   Prozentanteil machen sie lesbar, und erst das Eingabefeld korrigierbar. */
function verteilungHtml(k) {
  if (!k.position_id) return '';
  // CXCIV: ein Sonderposten wird nicht über einen Schlüssel verteilt — er geht
  // ganz auf seine Einheit. Schlüsselwahl und Gewichtszeilen entfielen hier
  // sonst sinnlos nebeneinander.
  if (k.nur_einheit) {
    const traeger = Object.keys(k.anteile || {});
    return `<div class="vt">
        <div class="zk">Verteilung · Sonderposten</div>
        <div class="zsumme">Zu 100 % auf ${esc(k.nur_einheit)}${
          traeger.length ? ` · ${traeger.map(esc).join(' · ')}` : ''}</div>
        ${!traeger.length ? `<div class="warnung"><span>▲</span>
          <span><b>Keine Partei für ${esc(k.nur_einheit)}.</b> Ist die Einheit
          im Zeitraum vermietet oder von der NK-Abrechnung ausgeschlossen?</span>
          </div>` : ''}
      </div>`;
  }
  const meta = schluesselMeta(k.schluessel);
  const eintraege = Object.entries(k.anteile || {});
  const summe = eintraege.reduce((s, [, w]) => s + Number(w || 0), 0);
  const bearbeitbar = daten.status === 'in Arbeit';
  const einheit = k.anteile_einheit || meta?.einheit || '';
  const abzuleiten = meta?.moeglich ? Object.entries(meta.gewichte) : [];
  const gleich = abzuleiten.length === eintraege.length &&
    abzuleiten.every(([p, w]) => Number(k.anteile?.[p] ?? NaN) === Number(w));
  /* Lässt sich der Schlüssel nicht aus den Stammdaten ableiten, bleiben die
     Gewichte leer — ohne Eingabefelder käme man aus dieser Lage nie heraus.
     Deshalb die Parteien des Objekts mit 0 anbieten und von Hand füllen. */
  const felder = eintraege.length || !bearbeitbar ? eintraege
    : (schluessel?.parteien || []).map(p => [p.partei, 0]);

  const zeilen = felder.map(([p, w]) => `
    <div class="gw">
      <span class="gn">${esc(p)}${leerstaende.has(p)
        ? '<span class="gsub">Leerstand · beim Eigentümer</span>' : ''}</span>
      ${bearbeitbar
        ? `<input type="number" step="0.0001" min="0" value="${Number(w)}"
                 data-gewicht="${esc(p)}"
                 aria-label="Gewicht ${esc(p)}${einheit ? ` in ${esc(einheit)}` : ''}">`
        : `<span class="gv">${Number(w).toLocaleString('de-DE')}</span>`}
      <span class="gp" data-anteil>${prozentText(w, summe)}</span>
    </div>`).join('');

  const knoepfe = bearbeitbar ? `<div class="knopfzeile">
      ${felder.length ? `<button class="haupt"
        data-gewichte="${k.position_id}">Verteilung übernehmen</button>` : ''}
      ${abzuleiten.length && !gleich ? `<button class="leise"
        data-ableiten="${k.position_id}"
        data-fuer="${esc(k.schluessel || '')}">${eintraege.length
          ? 'Neu aus Stammdaten' : 'Aus Stammdaten ableiten'}</button>` : ''}
    </div>` : '';

  return `<div class="vt">
      <div class="zk">Verteilung${bearbeitbar ? ''
        : ` · ${esc(meta?.titel || k.schluessel || '—')}`}${
        einheit ? ` · ${esc(einheit)}` : ''}</div>
      ${bearbeitbar ? `<div class="wahl" data-schluesselwahl="${k.position_id}"
           data-wert="${esc(k.schluessel || '')}"></div>` : ''}
      ${k.ohne_verteilung ? `<div class="warnung"><span>▲</span>
        <span><b>Ohne Gewichte wird nichts verteilt.</b> Die ${eur(k.betrag)}
        fließen mit 0,00 € in die Abrechnung ein.</span></div>` : ''}
      ${zeilen}
      ${doppelteEinheit(felder.map(([p]) => p))}
      ${!eintraege.length && meta ? `<div class="hinweis">${esc(meta.hinweis)}</div>`
        : ''}
      ${knoepfe}
    </div>`;
}

function zeileHtml(k, i) {
  const [farbe, zeichen] = HAKEN[k.zustand] || HAKEN.fehlt;
  const wert = eur(k.betrag);
  const aufgeklappt = offen.has(i);

  // Zweite Zeile: Schlüssel, Anteil an der Gesamtsumme, Quelle, §35a
  const summe = daten.fortschritt.summe || 0;
  const anteilProzent = k.erledigt && summe > 0
    ? Math.round((k.betrag / summe) * 100) : null;
  const infos = [
    // Ein erfasster Beleg ohne Betrag ist etwas anderes als gar nichts —
    // ohne den Hinweis waere das nur am Farbton des Hakens zu erkennen.
    k.zustand === 'offen' ? 'Betrag fehlt' : null,
    k.ohne_verteilung ? 'Verteilung fehlt' : null,
    // CXCIV: ein Sonderposten nennt seine Einheit statt eines Schlüssels.
    k.nur_einheit ? `Nur ${k.nur_einheit} · 100 %` : null,
    !k.nur_einheit && k.schluessel ? `Schlüssel ${schluesselMeta(k.schluessel)?.titel
                                || k.schluessel}` : null,
    anteilProzent != null ? `${anteilProzent} % der Kosten` : null,
    // Aus wie vielen Belegen die Summe entstand (CLXXXII) — sonst sieht eine
    // Position mit vier Abschlagsrechnungen aus wie eine einzelne Rechnung.
    (k.belege || []).length > 1 ? `${k.belege.length} Belege` : null,
    k.wertquelle && k.wertquelle !== 'manuell' ? k.wertquelle : null,
    k.s35 ? '§35a absetzbar' : null,
    !k.erledigt && k.beleg_monat ? `Beleg im ${MONATE[k.beleg_monat - 1]}` : null,
  ].filter(Boolean).join(' · ');

  return zeileInner(k, i, aufgeklappt, infos, wert, farbe, zeichen);
}

// Fußzeile des Zeitraums: was hängt dran — und der ruhige Hinweis, dass ein
// leerer Zeitraum von selbst verschwindet (statt eines Löschknopfs).
function zeitraumFussHtml() {
  const v = daten.verknuepft || {};
  const chips = [
    ['Positionen', v.positionen || 0],
    ['Belege', v.belege || 0],
    ['Vorauszahlungen', v.vorauszahlungen || 0],
  ];
  const leer = chips.every(([, n]) => n === 0);
  return `<div class="zr-fuss">
    <div class="zeilen">${chips.map(([l, n]) =>
      `<span class="chip${n > 0 ? ' hat' : ''}">${n}&nbsp;${l}</span>`).join('')}</div>
    <div class="hinweis">${leer
      ? 'An diesem Zeitraum hängt nichts mehr — beim nächsten Aufräumen verschwindet er automatisch.'
      : 'Nimmst du die letzte Position und den letzten Beleg heraus, wird der dann leere Zeitraum von selbst entfernt. Einen Löschknopf gibt es bewusst nicht.'}</div>
  </div>`;
}

/* CCLXXVIII — der Entscheidungsblock einer vorläufigen (orange) Position: sie
   entstand automatisch aus einem Beleg und wartet auf ein Ja. „Bestätigen"
   macht sie zur regulären (grünen) Position; „Zurück zum Prüfen" verwirft die
   Position wieder — der Beleg selbst bleibt und geht zurück in den Prüfmodus. */
function entwurfAktionHtml(k) {
  return `<div class="entwurf-box">
      <div class="ek"><span>▣</span><span>Entwurf aus Beleg</span></div>
      <p>Diese Position wurde automatisch aus einem Beleg angelegt. Prüfe Betrag
        und Kostenart — dann bestätige sie, oder gib den Beleg zurück in den
        Prüfmodus. Der Beleg selbst bleibt in beiden Fällen erhalten.</p>
      <div class="entwurf-aktionen">
        <button class="entwurf-ja" data-entwurf-ja="${k.position_id}"
          >✓ Bestätigen</button>
        <button class="entwurf-nein" data-entwurf-nein="${k.position_id}"
          data-art="${esc(k.kostenart)}">↩ Zurück zum Prüfen</button>
      </div>
    </div>`;
}

function zeileInner(k, i, aufgeklappt, infos, wert, farbe, zeichen) {
  const verteilung = verteilungHtml(k);
  // CCLXXVIII: eine vorläufige Position ist orange, nicht grün — auch wenn sie
  // schon einen Betrag trägt. Erst das Bestätigen macht sie grün.
  const zustandKlasse = k.vorlaeufig ? ' entwurf' : (k.erledigt ? ' gefuellt' : '');
  return `<div class="pruef${zustandKlasse}">
      <div class="kopf">
        <button class="zeile" data-auf="${i}" aria-expanded="${aufgeklappt}">
          <span class="ikon ${k.erledigt ? 'fertig' : 'warte'}">${
            kostenIcon(k.kostenart)}</span>
          <span class="name">${esc(k.kostenart)}${
            k.vorlaeufig ? '<span class="entw-badge">Entwurf aus Beleg</span>' : ''}
            ${infos ? `<span class="unter">${esc(infos)}</span>` : ''}</span>
          ${k.erledigt ? `<span class="rechts"><span class="wert">${wert}</span></span>` : ''}
        </button>
        ${k.erledigt ? '' : `<button class="scanmini" data-scan="${esc(k.kostenart)}"
            title="Beleg für ${esc(k.kostenart)} abfotografieren">
            <span class="si">▣</span><span class="st">Beleg erfassen</span>
          </button>`}
        <span class="haken ${farbe}">${zeichen}</span>
      </div>
      ${anhaengerStrip(k)}
      ${aufgeklappt ? `<div class="auf">
        ${k.vorlaeufig && k.position_id ? entwurfAktionHtml(k) : ''}
        ${verteilung}
        <div class="zk">Belege</div>
        ${belegeHtml(k)}
        ${daten.status === 'in Arbeit' ? `<div class="anh-verwalt">
          <button class="anh-anbau" data-anhaengen="${esc(k.kostenart)}">${
            ANH_ICON}＋ Kostenfreien Beleg anhängen</button>
          <span class="anh-hint">Zusatzbelege ohne Kostenanteil — Zählerstand,
            SEPA-Mandat. Sie hängen am Thema „${esc(k.kostenart)}“, nicht an der
            Position, und tragen keinen Betrag.</span>
        </div>` : ''}
        ${k.position_id ? `<div class="nachtrag">
          <input type="number" step="0.01" placeholder="Betrag eintragen"
                 value="${k.betrag || ''}" data-betrag="${k.position_id}"
                 aria-label="Betrag für ${esc(k.kostenart)}">
          <button data-speichern="${k.position_id}">Übernehmen</button>
        </div>
        ${daten.status === 'in Arbeit' ? `<button class="entfernen"
          data-entfernen="${k.position_id}"
          data-art="${esc(k.kostenart)}">Position entfernen</button>` : ''}`
        : `<div class="neu">
          <div class="zk">Position anlegen</div>
          <div class="nachtrag">
            <input type="number" step="0.01" placeholder="Betrag (optional)"
                   data-neubetrag="${i}"
                   aria-label="Betrag für ${esc(k.kostenart)}">
            <button data-anlegen="${esc(k.kostenart)}" data-index="${i}">Anlegen</button>
          </div>
          <span class="text">Für „${esc(k.kostenart)}“ ist in diesem Zeitraum
            noch nichts erfasst. Die Position entsteht mit den Gewichten aus
            den Stammdaten; Betrag und Verteilung lassen sich danach
            jederzeit ändern.</span>
        </div>`}
      </div>` : ''}
    </div>`;
}

/* An wen die Abrechnung dieser Partei geht. Beim Leerstand an niemanden — er
   ist kein Empfänger, sondern der Anteil des Eigentümers. */
function empfaengerHtml(p) {
  if (!p) return '';
  if (p.leerstand) {
    return '<div class="wemgeht">Bleibt beim Eigentümer — kein Versand.</div>';
  }
  if (p.adressen?.length) {
    return `<div class="wemgeht">Geht an ${p.adressen.map(esc).join(' · ')}</div>`;
  }
  return `<div class="wemgeht fehlt">Keine Mailadresse hinterlegt —
    ausdrucken und mit der Post schicken.</div>`;
}

async function ergebnisHtml() {
  // Der Versandplan sagt, welche Zeile ein Leerstand ist und wer die
  // Abrechnung bekommt; ohne ihn bleibt das Ergebnis trotzdem lesbar.
  const [rechnung, versand] = await Promise.allSettled([
    api(`/zeitraeume/${zid}/abrechnung`),
    api(`/zeitraeume/${zid}/versand`),
  ]);
  if (rechnung.status !== 'fulfilled') {
    return '<div class="empty"><div class="big">Ergebnis nicht verfügbar</div></div>';
  }
  const a = rechnung.value;
  const wer = new Map((versand.value?.parteien || []).map(p => [p.partei, p]));

  // Die Abrechnung je Partei als PDF — dieselbe Datei, die beim Versand
  // angehängt wird. Vor dem Verschicken einmal ansehen zu können, ist der
  // Sinn der Vorschau.
  const zeilen = Object.entries(a.parteien || {}).map(([partei, w]) => `
    <div class="karte">
      <h3>${esc(partei)}${wer.get(partei)?.leerstand || leerstaende.has(partei)
        ? '<span class="marke">Leerstand</span>' : ''}</h3>
      ${empfaengerHtml(wer.get(partei))}
      <div class="summe"><span>Umlagefähige Kosten</span><b>${eur(w.kosten)}</b></div>
      <div class="summe"><span>Vorauszahlungen</span><b>${eur(w.vorauszahlungen)}</b></div>
      ${w.s35 ? `<div class="summe"><span>davon § 35a</span><b>${eur(w.s35)}</b></div>`
        : ''}
      <div class="summe gesamt"><span>Saldo</span>
        <b class="${(w.saldo ?? 0) >= 0 ? 'pos' : 'neg'}">${eur(w.saldo)}</b></div>
      <a class="pdflink" target="_blank" rel="noopener"
         href="/api/zeitraeume/${zid}/abrechnung.pdf?partei=${
           encodeURIComponent(partei)}">▤ Abrechnung als PDF ansehen</a>
    </div>`).join('');

  const g = a.gesamt || {};
  return `<div class="karte">
      <h3>Gesamt</h3>
      <div class="summe"><span>Auslagen</span><b>${eur(g.auslagen)}</b></div>
      <div class="summe"><span>Abschläge</span><b>${eur(g.abschlaege)}</b></div>
      <div class="summe gesamt"><span>Saldo</span>
        <b class="${(g.saldo ?? 0) >= 0 ? 'pos' : 'neg'}">${eur(g.saldo)}</b></div>
    </div>${zeilen}
    ${a.offen?.length ? `<div class="karte"><h3>Noch offen</h3>
      ${a.ohne_betrag?.length ? `<div class="summe">
        <span>Ohne Betrag</span><b>${a.ohne_betrag.map(esc).join(', ')}</b></div>` : ''}
      ${a.ohne_verteilung?.length ? `<div class="summe">
        <span>Ohne Verteilung</span>
        <b class="neg">${a.ohne_verteilung.map(esc).join(', ')}</b></div>` : ''}
      </div>` : ''}`;
}

const MONATE = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli',
  'August', 'September', 'Oktober', 'November', 'Dezember'];

/* Abschluss: erst wenn nichts mehr offen ist — oder du die Reste bewusst
   übergehst — wird der Versand freigegeben. */
function abschlussHtml() {
  if (daten.status !== 'in Arbeit') {
    // Zurückhaltend, aber vorhanden: ein versehentlicher Abschluss war bisher
    // unumkehrbar — samt der Fristen und Erinnerungen, die daran hängen.
    return `<div class="abschluss fertig">
        <div class="at">Abgeschlossen</div>
        <p>Dieser Zeitraum ist abgerechnet und versendet.</p>
        <button class="wiederauf" data-oeffnen="1">Wieder öffnen</button>
      </div>`;
  }
  const f = daten.fortschritt;
  const rest = f.gesamt - f.fertig;
  // Eine erledigte Position ohne Gewichte sieht fertig aus, fließt aber mit
  // 0,00 € ein. Sie gehört deshalb zu dem, was den Abschluss aufhält.
  const ohne = daten.checkliste.filter(k => k.ohne_verteilung)
    .map(k => k.kostenart);

  if (rest === 0 && !ohne.length) {
    return `<div class="abschluss bereit">
        <div class="at">✓ Alles erfasst</div>
        <p>${f.gesamt} Positionen vollständig · ${eur(f.summe)} umlagefähig.
           Die Abrechnungen können erstellt und verschickt werden.</p>
        <button class="losbutton" data-abschluss="1">Abrechnungen erstellen und versenden</button>
      </div>`;
  }
  const teile = [
    rest ? `${rest} ${rest === 1 ? 'Position' : 'Positionen'} ohne Betrag` : null,
    ohne.length ? `${ohne.length} ohne Verteilung` : null,
  ].filter(Boolean).join(' · ');

  return `<div class="abschluss offen">
      <div class="at">Noch nicht vollständig</div>
      <p>${teile}. Trage die fehlenden Angaben ein — oder bestätige, dass die
         restlichen Posten für diesen Zeitraum nicht anfallen.</p>
      ${ohne.length ? `<div class="warnung"><span>▲</span>
        <span><b>${esc(ohne.join(', '))}</b> ${ohne.length === 1 ? 'hat' : 'haben'}
        einen Betrag, aber keine Verteilungsgewichte — ${ohne.length === 1
          ? 'er zählt' : 'sie zählen'} in der Abrechnung mit 0,00 €.</span>
        </div>` : ''}
      <label class="uebergehen">
        <input type="checkbox" id="uebergehen">
        <span>Restliche Positionen fallen nicht an</span>
      </label>
      <button class="losbutton" data-abschluss="1" disabled
              id="abschlussKnopf">Abrechnungen erstellen und versenden</button>
    </div>`;
}

/* Die Einheiten des Objekts samt der Partei, die einen Sonderposten dort
   tragen würde. Grundlage ist die Schlüssel-Vorschau: dort steht je Bezug
   Partei und Einheit — und ausgeschlossene Einheiten (CXCIII) fehlen bereits,
   für sie käme ohnehin keine Verteilung zustande. */
function sonderEinheiten() {
  const map = new Map();
  for (const p of (schluessel?.parteien || [])) {
    if (!p.einheit) continue;
    if (!map.has(p.einheit)) map.set(p.einheit, new Set());
    map.get(p.einheit).add(p.partei);
  }
  return [...map.entries()].map(([einheit, parteien]) =>
    ({ einheit, parteien: [...parteien] }));
}

/* CXCIV — der Sonderweg neben der Katalog-Checkliste: eine Position, die zu
   100 % auf eine einzige Einheit geht (Reparatur nur in Wohnung 2, eigener
   Warmwasserboiler). Der Schlüssel spielt dabei keine Rolle. */
function sonderpostenHtml() {
  if (daten.status !== 'in Arbeit') return '';
  const einheiten = sonderEinheiten();
  if (!einheiten.length) return '';

  if (!sonderOffen) {
    return `<div class="karte sonder">
        <h3>Sonderposten</h3>
        <span class="erklaer">Eine Kostenart trifft nur eine Einheit — eine
          Reparatur in einer Wohnung, ein eigener Boiler. Sie wird dann zu
          100 % auf diese Einheit verrechnet, nicht über einen Schlüssel
          verteilt.</span>
        <button class="starten" data-sonder-auf="1">＋ Sonderposten für eine
          Einheit anlegen</button>
      </div>`;
  }

  const gewaehlt = einheiten.some(e => e.einheit === sonderEinheit)
    ? sonderEinheit : '';
  const blasen = einheiten.map(e => `
    <button type="button" class="ewahl${e.einheit === gewaehlt ? ' an' : ''}"
            data-sonder-einheit="${esc(e.einheit)}"
            aria-pressed="${e.einheit === gewaehlt}">
      <span class="ename">${esc(e.einheit)}</span>
      ${e.parteien.length
        ? `<span class="epartei">${esc(e.parteien.join(' · '))}</span>` : ''}
    </button>`).join('');

  return `<div class="karte sonder">
      <h3>Sonderposten anlegen</h3>
      <span class="erklaer">Der Betrag geht zu 100 % auf die gewählte Einheit —
        ihre Partei trägt ihn allein.</span>
      <span class="feldlabel">Bezeichnung</span>
      <div class="nachtrag">
        <input type="text" id="sonderName" placeholder="z. B. Reparatur Bad"
               aria-label="Bezeichnung des Sonderpostens">
      </div>
      <span class="feldlabel">Einheit — trägt zu 100 %</span>
      <div class="einheiten">${blasen}</div>
      <div class="nachtrag">
        <input type="number" step="0.01" id="sonderBetrag"
               placeholder="Betrag (optional)"
               aria-label="Betrag des Sonderpostens">
        <button data-sonder-anlegen="1">Anlegen</button>
      </div>
      <button class="abbrechen" data-sonder-zu="1">Abbrechen</button>
    </div>`;
}

/* ---- CCVIII: Mieter-Direkteintrag für ein WEG-Objekt --------------------
   Ist die Wohnung Teil einer Wohnungseigentümergemeinschaft, verteilt die
   Hausverwaltung die Nebenkosten. ImmoCalc verteilt dann nicht selbst: der
   Nutzer trägt je Mieter die umlagefähige NK-Summe vom Zettel direkt ein. Das
   läuft über die vorhandene 100-%-je-Einheit-Mechanik (`nur_einheit`) — die
   Summe geht ganz auf die Partei der Einheit, ohne Verteilungsschlüssel, und
   die bestehende Abrechnungs-/Versandmaschinerie rechnet sie gegen die
   Vorauszahlung. */
const WEG_ART = einheit => `Nebenkosten (WEG) · ${einheit}`;

function wegDirektHtml() {
  if (!daten.weg) return '';
  const einheiten = sonderEinheiten();
  const bereit = daten.status === 'in Arbeit';
  const bestehende = new Map((daten.checkliste || []).map(k => [k.kostenart, k]));

  const zeilen = einheiten.map(e => {
    const vorhanden = bestehende.get(WEG_ART(e.einheit));
    const betrag = vorhanden && vorhanden.betrag != null ? vorhanden.betrag : '';
    return `<div class="gw">
        <span class="gn">${esc(e.einheit)}${e.parteien.length
          ? `<span class="gsub">${esc(e.parteien.join(' · '))}</span>` : ''}</span>
        ${bereit
          ? `<input type="number" step="0.01" min="0" value="${betrag}"
                   data-weg-betrag="${esc(e.einheit)}" placeholder="NK-Summe"
                   aria-label="Umlagefähige NK-Summe ${esc(e.einheit)}">`
          : `<span class="gv">${betrag !== '' ? eur(betrag) : '—'}</span>`}
      </div>`;
  }).join('');

  const koerper = einheiten.length
    ? zeilen + (bereit ? `<div class="nachtrag" style="margin-top:12px">
        <button data-weg-speichern="1">Werte je Mieter übernehmen</button>
      </div>` : '')
    : `<div class="belege"><span class="kein">Noch keine vermietete Einheit —
        lege auf der Objektseite Einheiten und Mieter an, dann steht hier je
        Mieter ein Feld für die NK-Summe.</span></div>`;

  return `<div class="karte sonder">
      <h3>Nebenkosten laut Hausverwaltung <span class="marke post">WEG</span></h3>
      <span class="erklaer">Diese Wohnung gehört zu einer WEG — die
        Hausverwaltung verteilt die Nebenkosten. Trage je Mieter die
        umlagefähige NK-Summe vom Abrechnungszettel direkt ein. ImmoCalc
        verteilt nichts, sondern rechnet sie gegen die Vorauszahlung und erstellt
        Saldo, PDF und Versand wie gewohnt.</span>
      ${koerper}</div>`;
}

async function zeichnen() {
  const f = daten.fortschritt;
  const anteil = f.gesamt ? Math.round((f.fertig / f.gesamt) * 100) : 0;

  const kopf = `${bannerHtml()}
    <div class="fortschritt">
      <div class="kopf">
        <span class="gross">${f.fertig} von ${f.gesamt}</span>
        <span class="klein">Positionen vollständig</span>
      </div>
      <div class="bahn"><i style="width:${anteil}%"></i></div>
    </div>
    <div class="tabs" role="tablist">
      <button data-tab="pruef" aria-selected="${ansicht === 'pruef'}">Checkliste</button>
      <button data-tab="ergebnis" aria-selected="${ansicht === 'ergebnis'}">Ergebnis</button>
      <button data-tab="belege" aria-selected="${ansicht === 'belege'}">Belege</button>
    </div>`;

  let rumpf = '';
  if (ansicht === 'pruef') {
    const fluss = daten.sankey || { knoten: [], fluss: [] };
    const flussKarte = fluss.fluss.length
      ? `<div class="karte"><h3>Kostenfluss · erfasste Positionen</h3>
          ${sankey(fluss.knoten, fluss.fluss,
                   { format: eurKurz, breite: window.innerWidth < 520 ? 260 : 540 })}
         </div>`
      : '';

    const sortWahl = `<div class="sortleiste">
        <span>Sortieren</span>
        ${Object.entries({ status: 'Offene zuerst', betrag: 'Größe', name: 'Name' })
          .map(([k, l]) => `<button data-sort="${k}"
            aria-pressed="${sortierung === k}">${l}</button>`).join('')}
      </div>`;

    const sortiert = daten.checkliste
      .map((k, i) => ({ k, i }))
      .sort((a, b) => SORTIERUNG[sortierung](a.k, b.k));

    rumpf = wegDirektHtml() + flussKarte + sortWahl +
      sortiert.map(({ k, i }) => zeileHtml(k, i)).join('')
      + sonderpostenHtml() + abschlussHtml() + zeitraumFussHtml();
  } else if (ansicht === 'ergebnis') {
    rumpf = '<div class="karte"><h3>Wird gerechnet …</h3></div>';
  } else {
    // Nach Dokumentart gruppiert — so, wie die API sie liefert.
    const gruppen = Object.entries(daten.belege_je_art || {})
      .filter(([, liste]) => liste.length)
      .sort(([a], [b]) => a.localeCompare(b, 'de'));
    rumpf = daten.dokumente.length
      ? gruppen.map(([art, liste]) => `<div class="karte">
          <h3>${esc(art || 'Ohne Art')} · ${liste.length}</h3>
          ${belegLinks(liste)}</div>`).join('')
      : `<div class="empty"><div class="big">Noch keine Belege</div>
          <p>Fotografiere in der Checkliste einen Beleg zu einer Position ab —
             er wird in der Cloud abgelegt und erscheint dann hier.</p></div>`;
  }

  inhalt.innerHTML = kopf + rumpf;

  if (ansicht === 'ergebnis') {
    inhalt.innerHTML = kopf + await ergebnisHtml();
  } else if (ansicht === 'pruef') {
    montiereSchluessel();
  }
}

/* Die Auswahlfelder werden nach dem Zeichnen gesetzt: sie bestehen aus
   Knopf und Liste und lassen sich nicht als Zeichenkette einfügen. */
function montiereSchluessel() {
  if (!schluessel) return;
  const optionen = schluessel.schluessel.map(s => ({
    wert: s.wert,
    text: `${s.titel} · ${s.moeglich ? 'abgeleitet' : 'von Hand'}`,
  }));
  inhalt.querySelectorAll('[data-schluesselwahl]').forEach(ziel => {
    const pid = ziel.dataset.schluesselwahl;
    auswahlfeld(ziel, {
      optionen, wert: ziel.dataset.wert, label: 'Verteilungsschlüssel',
      aenderung: async neu => {
        try {
          // Der Server leitet die Gewichte beim Wechsel neu ab — alte
          // Flächenwerte unter „Personen" wären still falsch.
          await api(`/positionen/${pid}`,
                    { method: 'PATCH', body: { schluessel: neu } });
          await laden();
        } catch (fehler) {
          melde(String(fehler.message || fehler), 'neg');
        }
      },
    });
  });
}

/* Die Schlüsselliste ist mit sieben Einträgen hoch. Steht das Feld weit unten,
   reicht der Platz darunter zwar für die Liste, nicht aber für die
   Menüleiste — die letzten Einträge lägen dahinter und wären nicht anklickbar.
   Deshalb vorher nach oben rollen, im Capture-Lauf: das Auswahlfeld misst den
   Platz erst danach. */
inhalt.addEventListener('click', e => {
  const knopf = e.target.closest('.vt .auswahl-knopf');
  if (!knopf || knopf.getAttribute('aria-expanded') === 'true') return;
  const noetig = (schluessel?.schluessel.length || 7) * 44 + 120;
  if (window.innerHeight - knopf.getBoundingClientRect().bottom < noetig) {
    // Nicht scrollIntoView: das schöbe das Feld unter die Kopfzeile. 150 px
    // von oben lassen die Kopfzeile stehen und die Liste ganz sichtbar werden.
    rolleUnterDieKopfzeile(knopf, 150);
  }
}, true);

/** Rollt `el` auf `oben` px unter den oberen Rand — im richtigen Rollbereich:
    auf dem Handy scrollt die Seite, am Schreibtisch die Spalte `.scroll`. */
function rolleUnterDieKopfzeile(el, oben) {
  const delta = el.getBoundingClientRect().top - oben;
  let bereich = el.parentElement;
  while (bereich && bereich !== document.body) {
    const stil = getComputedStyle(bereich);
    if (/(auto|scroll)/.test(stil.overflowY) &&
        bereich.scrollHeight > bereich.clientHeight) break;
    bereich = bereich.parentElement;
  }
  if (bereich && bereich !== document.body) bereich.scrollTop += delta;
  else window.scrollBy(0, delta);
}

async function verteilungSpeichern(knopf) {
  const anteile = {};
  knopf.closest('.vt').querySelectorAll('[data-gewicht]').forEach(feld => {
    anteile[feld.dataset.gewicht] = Number(feld.value) || 0;
  });
  if (!Object.values(anteile).some(w => w > 0)) {
    return melde('Mindestens ein Gewicht muss größer als null sein', 'neg');
  }
  knopf.disabled = true;
  knopf.textContent = 'Speichere …';
  try {
    await api(`/positionen/${knopf.dataset.gewichte}`,
              { method: 'PATCH', body: { anteile } });
    melde('Verteilung übernommen', 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Verteilung übernehmen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

async function verteilungAbleiten(knopf) {
  const meta = schluesselMeta(knopf.dataset.fuer);
  if (!meta?.moeglich) return;
  knopf.disabled = true;
  try {
    await api(`/positionen/${knopf.dataset.ableiten}`,
              { method: 'PATCH', body: { anteile: meta.gewichte } });
    melde(`Gewichte aus den Stammdaten übernommen · ${meta.titel}`, 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Eine Kostenart des Katalogs, zu der es noch keine Position gibt, wird hier
   zu einer. Erst danach gibt es einen Betrag, eine Verteilung und damit
   überhaupt eine Zeile in der Abrechnung. Die Gewichte leitet der Server aus
   den Stammdaten ab — mitgegeben wird nur, was der Nutzer eingetippt hat. */
async function positionAnlegen(knopf) {
  const kostenart = knopf.dataset.anlegen;
  const i = Number(knopf.dataset.index);
  const feld = inhalt.querySelector(`[data-neubetrag="${i}"]`);
  const betrag = Number(feld?.value) || 0;
  knopf.disabled = true;
  knopf.textContent = 'Lege an …';
  try {
    await api(`/zeitraeume/${zid}/positionen`,
              { method: 'POST', body: { kostenart, betrag } });
    melde(betrag ? `„${kostenart}“ erfasst · ${eur(betrag)}`
                 : `„${kostenart}“ angelegt — jetzt den Betrag eintragen`, 'pos');
    offen.add(i);
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Anlegen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* CXCIV — der Sonderposten geht mit `nur_einheit` an den Server; die Engine
   setzt die Gewichte auf 100 % für die Partei dieser Einheit. Der Schlüssel
   spielt keine Rolle. */
async function sonderpostenAnlegen(knopf) {
  const kostenart = inhalt.querySelector('#sonderName')?.value.trim();
  const betrag = Number(inhalt.querySelector('#sonderBetrag')?.value) || 0;
  if (!kostenart) return melde('Der Sonderposten braucht eine Bezeichnung', 'neg');
  if (!sonderEinheit) return melde('Wähle die Einheit, die ihn trägt', 'neg');
  knopf.disabled = true;
  knopf.textContent = 'Lege an …';
  try {
    await api(`/zeitraeume/${zid}/positionen`, {
      method: 'POST',
      body: { kostenart, betrag, nur_einheit: sonderEinheit },
    });
    melde(`„${kostenart}“ · zu 100 % auf ${sonderEinheit}`, 'pos');
    sonderOffen = false;
    sonderEinheit = '';
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Anlegen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* CCVIII — die abgetippten NK-Summen je Mieter übernehmen. Je Einheit eine
   Position mit `nur_einheit`: bestehende werden aktualisiert, neue angelegt —
   so lässt sich der Zettel der Hausverwaltung mehrfach nachtragen, ohne dass
   sich Positionen doppeln. */
async function wegDirektSpeichern(knopf) {
  const eingaben = [...inhalt.querySelectorAll('[data-weg-betrag]')]
    .map(f => ({ einheit: f.dataset.wegBetrag, betrag: Number(f.value) }))
    .filter(x => x.betrag > 0);
  if (!eingaben.length) {
    return melde('Trage mindestens eine NK-Summe ein', 'neg');
  }
  knopf.disabled = true;
  knopf.textContent = 'Übernehme …';
  const bestehende = new Map((daten.checkliste || []).map(k => [k.kostenart, k]));
  try {
    for (const { einheit, betrag } of eingaben) {
      const art = WEG_ART(einheit);
      const vorhanden = bestehende.get(art);
      if (vorhanden && vorhanden.position_id) {
        await api(`/positionen/${vorhanden.position_id}`,
                  { method: 'PATCH', body: { betrag } });
      } else {
        await api(`/zeitraeume/${zid}/positionen`, {
          method: 'POST',
          body: { kostenart: art, betrag, nur_einheit: einheit },
        });
      }
    }
    melde(`NK-Summe je Mieter übernommen · ${eingaben.length} ${
      eingaben.length === 1 ? 'Mieter' : 'Mieter'}`, 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Werte je Mieter übernehmen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Entfernen mit Rückfrage: die Kostenart bleibt im Katalog, die Zeile taucht
   danach wieder als „noch nicht erfasst" auf. Verloren geht nur der Betrag. */
async function positionEntfernen(knopf) {
  const art = knopf.dataset.art;
  const ja = await frage(`„${art}“ entfernen?`,
    'Betrag und Verteilung dieser Position werden gelöscht. Die Kostenart '
    + 'bleibt im Katalog der Immobilie stehen und lässt sich jederzeit neu '
    + 'erfassen. Hinterlegte Belege bleiben unangetastet.',
    { knopf: 'Entfernen', gefahr: true });
  if (!ja) return;
  knopf.disabled = true;
  try {
    await api(`/positionen/${knopf.dataset.entfernen}`, { method: 'DELETE' });
    melde(`„${art}“ entfernt`, '');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* CCLXXVIII — eine vorläufige (orange) Position bestätigen: sie wird zur
   regulären Position und die Zeile danach grün. Nur `vorlaeufig=False`, sonst
   bleibt alles, wie der Beleg es ergab. */
async function entwurfBestaetigen(pid, knopf) {
  knopf.disabled = true;
  knopf.textContent = 'Bestätige …';
  try {
    await api(`/entwuerfe/kostenposition/${pid}/bestaetigen`, { method: 'POST' });
    melde('Position bestätigt', 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = '✓ Bestätigen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* CCLXXVIII — die vorläufige Position verwerfen: sie verschwindet, der Beleg
   bleibt und steht wieder im Prüfmodus. Die Zeile fällt danach auf „offen/fehlt"
   zurück, sofern es keine bestätigte Position zur selben Kostenart gibt. */
async function entwurfVerwerfen(pid, art, knopf) {
  knopf.disabled = true;
  knopf.textContent = 'Setze zurück …';
  try {
    await api(`/entwuerfe/kostenposition/${pid}/verwerfen`, { method: 'POST' });
    melde(`„${art}“ zurück im Prüfmodus — der Beleg bleibt erhalten`, '');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = '↩ Zurück zum Prüfen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* CCLV — den kostenfreien Beleg aus dem Bestand wählen. Eigener Dialog wie der
   Versandplan: eine Zeile je Kandidat. Liefert die Dokument-Id oder null. */
function anhaengerWaehlen(kostenart) {
  const kandidaten = anhaenger?.kandidaten || [];
  const liste = kandidaten.length
    ? kandidaten.map(d => `
        <button class="ahz" data-pick="${d.id}">
          ${ANH_ICON}
          <span class="ahn">${esc(kurzBeleg(d.dateiname))}
            <span class="ahsub">${esc(d.kategorie || 'Ohne Art')}${
              d.jahr ? ` · ${d.jahr}` : ''}</span></span>
        </button>`).join('')
    : `<div class="ahleer">Kein kostenfreier Beleg im Bestand dieser Immobilie.
       Ein Beleg wird kostenfrei, wenn er im Eingang ohne Kostenposition bleibt —
       etwa ein Zählerstand oder ein SEPA-Mandat.</div>`;

  return new Promise(fertig => {
    const dlg = document.createElement('dialog');
    dlg.className = 'immo-dlg ahdlg';
    dlg.innerHTML = `
      <div class="dt">Beleg an „${esc(kostenart)}“ hängen</div>
      <p>Ein Zusatzbeleg ohne Kostenanteil — er erscheint als kleiner Anhänger
        am Thema, ohne Betrag.</p>
      <div class="ahliste">${liste}</div>
      <button class="btn leise" data-nein>Abbrechen</button>`;
    document.body.appendChild(dlg);
    dlg.addEventListener('close', () => dlg.remove());
    dlg.addEventListener('cancel', () => fertig(null));
    dlg.addEventListener('click', e => {
      const pick = e.target.closest('[data-pick]');
      if (pick) { fertig(Number(pick.dataset.pick)); dlg.close(); }
      else if (e.target.closest('[data-nein]')) { fertig(null); dlg.close(); }
    });
    dlg.showModal();
  });
}

async function anhaengen(kostenart) {
  const id = await anhaengerWaehlen(kostenart);
  if (!id) return;
  try {
    await api(`/dokumente/${id}/anhaenger`,
      { method: 'POST', body: { zeitraum_id: Number(zid), kostenart } });
    melde(`Anhänger an „${kostenart}“ gesetzt`, 'pos');
    await laden();
  } catch (fehler) {
    melde(String(fehler.message || fehler), 'neg');
  }
}

async function anhaengerLoesen(id) {
  try {
    await api(`/dokumente/${id}/anhaenger`, { method: 'DELETE' });
    melde('Anhänger gelöst', '');
    await laden();
  } catch (fehler) {
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Wieder öffnen — bewusst mit Rückfrage, aber ohne Drama: es geht nichts
   verloren, und niemand bekommt dadurch eine zweite Mail. */
async function wiederOeffnen(knopf) {
  const ja = await frage('Zeitraum wieder öffnen?',
    'Der Zeitraum wird wieder bearbeitbar und taucht in Fristen und '
    + 'Erinnerungen erneut auf. Wer die Abrechnung schon bekommen hat, '
    + 'bekommt sie dadurch nicht noch einmal.', { knopf: 'Wieder öffnen' });
  if (!ja) return;
  knopf.disabled = true;
  try {
    const antwort = await api(`/zeitraeume/${zid}/oeffnen`, { method: 'POST' });
    const schon = antwort.bereits_versendet.length;
    melde(schon
      ? `Wieder geöffnet · ${schon} Partei(en) haben ihre Abrechnung bereits`
      : 'Wieder geöffnet', 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Der Versandplan als Dialog: eine Zeile je Partei, damit vor dem Abschluss
   klar ist, wer die Abrechnung bekommt — und über welche Adressen. Der
   Leerstand steht ruhig am Ende: er ist kein vergessener Mieter, sondern der
   Anteil, den der Eigentümer selbst trägt. Liefert 'senden', 'nur' oder null.

   Eigener Dialog statt `wahl`: dort ginge alles in einem Fließtext auf, und
   genau die Unterscheidung, um die es hier geht, wäre wieder verwischt. */
function versandWahl(plan) {
  const zeile = (p, marke, klasse, unter) => `
    <div class="vz">
      <span class="vn">${esc(p.partei)}
        <span class="vs">${esc(unter)}</span></span>
      <span class="marke vm ${klasse}">${marke}</span>
    </div>`;

  const bereit = plan.parteien.filter(p => p.versandbereit);
  const ohne = plan.parteien.filter(p => !p.versandbereit && !p.leerstand);
  const leer = plan.parteien.filter(p => p.leerstand);
  const mieter = bereit.length + ohne.length;

  const liste = [
    ...bereit.map(p => zeile(p, 'Mail', 'gut', p.adressen.join(' · '))),
    ...ohne.map(p => zeile(p, 'Post', 'post',
      'Keine Mailadresse — ausdrucken und schicken')),
    ...leer.map(p => zeile(p, 'Leerstand', '', 'Bleibt beim Eigentümer')),
  ].join('');

  const satz = mieter
    ? `${bereit.length} von ${mieter} ${mieter === 1 ? 'Mietpartei bekommt'
        : 'Mietparteien bekommen'} die Abrechnung als PDF per Mail.`
    : 'Es gibt keine Mietpartei zu beliefern — der Zeitraum lässt sich '
      + 'trotzdem abschließen.';

  return new Promise(fertig => {
    const dlg = document.createElement('dialog');
    dlg.className = 'immo-dlg vdlg';
    dlg.innerHTML = `
      <div class="dt">Abrechnung abschließen</div>
      <p>${esc(plan.zeitraum)} · ${esc(satz)}</p>
      <div class="vliste">${liste}</div>
      ${bereit.length ? `<button class="btn"
        data-wahl="senden">Abschließen und verschicken</button>` : ''}
      <button class="btn leise" data-wahl="nur">Nur abschließen, nicht
        verschicken</button>
      <button class="btn leise" data-nein>Abbrechen</button>`;
    document.body.appendChild(dlg);
    dlg.addEventListener('close', () => dlg.remove());
    dlg.addEventListener('cancel', () => fertig(null));
    dlg.addEventListener('click', e => {
      const knopf = e.target.closest('[data-wahl]');
      if (knopf) { fertig(knopf.dataset.wahl); dlg.close(); }
      else if (e.target.closest('[data-nein]')) { fertig(null); dlg.close(); }
    });
    dlg.showModal();
  });
}

/* Vor dem Versand zeigen, wer was bekommt — und wem die Mailadresse fehlt. */
async function abschliessen(knopf) {
  const uebergehen = document.getElementById('uebergehen')?.checked || false;
  knopf.disabled = true;
  knopf.textContent = 'Prüfe Empfänger …';

  let plan;
  try {
    plan = await api(`/zeitraeume/${zid}/versand`);
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    melde(String(fehler.message || fehler), 'neg');
    return;
  }

  // Nicht jeder verschickt per Mail — wer die Abrechnung ausdruckt und mit
  // der Post schickt, muss den Zeitraum trotzdem abschliessen koennen.
  const weg = await versandWahl(plan);

  if (!weg) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    return;
  }

  knopf.textContent = weg === 'senden' ? 'Verschicke …' : 'Schließe ab …';
  try {
    const antwort = await api(`/zeitraeume/${zid}/abschliessen`, {
      method: 'POST', body: { versenden: weg === 'senden',
                              offene_uebergehen: uebergehen },
    });
    melde(antwort.versendet.length
      ? `${antwort.versendet.length} Abrechnung(en) verschickt an ${antwort.versendet.join(', ')}`
      : 'Zeitraum abgeschlossen — versendet wurde nichts.',
      antwort.versendet.length ? 'pos' : '');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    melde(String(fehler.message || fehler), 'neg');
  }
}

async function laden() {
  if (!zid) {
    inhalt.innerHTML = '<div class="empty"><div class="big">Kein Zeitraum gewählt</div></div>';
    return;
  }
  try {
    daten = await api(`/zeitraeume/${zid}`);
  } catch {
    inhalt.innerHTML = `<div class="empty"><div class="big">Zeitraum nicht gefunden</div></div>`;
    return;
  }
  // Die Schlüssel-Vorschau ist Beiwerk: fehlt sie, bleibt die Checkliste
  // bedienbar, nur ohne Auswahlfeld und ohne Ableitung.
  try {
    schluessel = await api(`/zeitraeume/${zid}/schluessel`);
  } catch {
    schluessel = null;
  }
  leerstaende = new Set(
    (schluessel?.schluessel || []).flatMap(s => s.leerstand || []));
  // CCLV — die kostenfreien Themen-Anhänger. Beiwerk: fehlt der Endpunkt (noch
  // nicht deployt), bleibt die Checkliste ohne Anhänger bedienbar.
  try {
    anhaenger = await api(`/dokumente/anhaenger/${zid}`);
  } catch {
    anhaenger = null;
  }
  titel.textContent = daten.label;
  sub.textContent = `${daten.objekt_name} · ${daten.typ}`;
  await zeichnen();
}

/* Prozentanteile beim Tippen mitrechnen — sonst sieht man erst nach dem
   Speichern, was man da eigentlich verteilt hat. */
inhalt.addEventListener('input', e => {
  if (!e.target.matches('[data-gewicht]')) return;
  const felder = [...e.target.closest('.vt').querySelectorAll('[data-gewicht]')];
  const summe = felder.reduce((s, f) => s + (Number(f.value) || 0), 0);
  felder.forEach(f => {
    const ziel = f.parentElement.querySelector('[data-anteil]');
    if (ziel) ziel.textContent = prozentText(f.value, summe);
  });
});

inhalt.addEventListener('change', e => {
  // Der Versand bleibt gesperrt, bis die Restposten bewusst abgehakt sind.
  if (e.target.id === 'uebergehen') {
    const knopf = document.getElementById('abschlussKnopf');
    if (knopf) knopf.disabled = !e.target.checked;
  }
});

inhalt.addEventListener('click', async e => {
  const tab = e.target.closest('[data-tab]');
  if (tab) { ansicht = tab.dataset.tab; return zeichnen(); }

  const sort = e.target.closest('[data-sort]');
  if (sort) { sortierung = sort.dataset.sort; return zeichnen(); }

  const abschluss = e.target.closest('[data-abschluss]');
  if (abschluss) return abschliessen(abschluss);

  const oeffnen = e.target.closest('[data-oeffnen]');
  if (oeffnen) return wiederOeffnen(oeffnen);

  const gewichte = e.target.closest('[data-gewichte]');
  if (gewichte) return verteilungSpeichern(gewichte);

  const ableiten = e.target.closest('[data-ableiten]');
  if (ableiten) return verteilungAbleiten(ableiten);

  const anlegen = e.target.closest('[data-anlegen]');
  if (anlegen) return positionAnlegen(anlegen);

  // CXCIV — Sonderposten für eine Einheit
  if (e.target.closest('[data-sonder-auf]')) {
    sonderOffen = true; return zeichnen();
  }
  if (e.target.closest('[data-sonder-zu]')) {
    sonderOffen = false; sonderEinheit = ''; return zeichnen();
  }
  const sonderEinh = e.target.closest('[data-sonder-einheit]');
  if (sonderEinh) {
    sonderEinheit = sonderEinh.dataset.sonderEinheit;
    // Nur die Blasen umschalten, damit die eingetippte Bezeichnung stehen
    // bleibt — ein voller Neuaufbau würde die Eingabefelder leeren.
    for (const knopf of inhalt.querySelectorAll('[data-sonder-einheit]')) {
      const an = knopf === sonderEinh;
      knopf.classList.toggle('an', an);
      knopf.setAttribute('aria-pressed', String(an));
    }
    return;
  }
  const sonderNeu = e.target.closest('[data-sonder-anlegen]');
  if (sonderNeu) return sonderpostenAnlegen(sonderNeu);

  const wegSpeichern = e.target.closest('[data-weg-speichern]');
  if (wegSpeichern) return wegDirektSpeichern(wegSpeichern);

  const entwJa = e.target.closest('[data-entwurf-ja]');
  if (entwJa) return entwurfBestaetigen(entwJa.dataset.entwurfJa, entwJa);

  const entwNein = e.target.closest('[data-entwurf-nein]');
  if (entwNein) return entwurfVerwerfen(entwNein.dataset.entwurfNein,
                                        entwNein.dataset.art, entwNein);

  const entfernen = e.target.closest('[data-entfernen]');
  if (entfernen) return positionEntfernen(entfernen);

  const auf = e.target.closest('[data-auf]');
  if (auf) {
    const i = Number(auf.dataset.auf);
    offen.has(i) ? offen.delete(i) : offen.add(i);
    return zeichnen();
  }

  const anhaengenKnopf = e.target.closest('[data-anhaengen]');
  if (anhaengenKnopf) return anhaengen(anhaengenKnopf.dataset.anhaengen);

  const anhLoesen = e.target.closest('[data-anh-loesen]');
  if (anhLoesen) return anhaengerLoesen(Number(anhLoesen.dataset.anhLoesen));

  const beleg = e.target.closest('[data-beleg]');
  if (beleg) {
    e.preventDefault();
    // Der Beleg wird durch die API gereicht — Nextcloud verlangt sonst eine
    // eigene Anmeldung. Angezeigt wird er im Dialog, nicht in einem neuen
    // Fenster: aus dem kommt man auf dem Telefon nicht mehr zurueck.
    belegAnsehen(`/api/dokumente/${beleg.dataset.beleg}/inhalt`,
                 beleg.dataset.name
                 || beleg.textContent.replace(/^PDF · /, '').trim());
    return;
  }

  const scan = e.target.closest('[data-scan]');
  if (scan) {
    scanZiel = { kostenart: scan.dataset.scan, knopf: scan };
    document.getElementById('scanFeld').click();
    return;
  }

  const speichern = e.target.closest('[data-speichern]');
  if (speichern) {
    const pid = speichern.dataset.speichern;
    const feld = inhalt.querySelector(`[data-betrag="${pid}"]`);
    const betrag = Number(feld.value);
    if (!betrag) return;
    speichern.disabled = true;
    speichern.textContent = '…';
    try {
      await api(`/positionen/${pid}`, { method: 'PATCH', body: { betrag } });
      await laden();
    } catch (fehler) {
      speichern.disabled = false;
      speichern.textContent = 'Übernehmen';
      melde(String(fehler.message || fehler), 'neg');
    }
  }
});

/* ---- Beleg direkt an einer offenen Position ------------------------------
   Die Aufnahmen werden im Browser zu einem PDF gebaut und mit Kostenart, Jahr
   und Objekt hochgeladen — der Umweg über den Eingang entfällt. Parallel geht
   die erste Aufnahme durch die Texterkennung; findet sie einen Betrag, wird er
   nur vorgeschlagen, nie ohne Rückfrage gespeichert. */
document.getElementById('scanFeld').addEventListener('change', async e => {
  const feld = e.target;
  const dateien = [...feld.files];
  feld.value = '';
  const ziel = scanZiel;
  scanZiel = null;
  if (!dateien.length || !ziel) return;

  const knopf = ziel.knopf;
  const beschriftung = knopf.querySelector('.st');
  knopf.disabled = true;
  if (beschriftung) beschriftung.textContent = 'Verarbeite …';

  try {
    const { pdf, seiten } = await scanZuPdf(dateien);
    const jahr = Number((daten.ende || '').slice(0, 4)) || new Date().getFullYear();

    const paket = new FormData();
    paket.append('objekt', daten.objekt);
    paket.append('kategorie', 'Nebenkosten');
    paket.append('jahr', String(jahr));
    paket.append('beschreibung', ziel.kostenart);
    // Ohne den Zeitraum hinge der Beleg nur am Objekt — der Reiter „Belege"
    // bliebe leer und die Zuordnung müsste man von Hand nachholen.
    paket.append('zeitraum_id', String(daten.id));
    paket.append('datei', pdf, 'scan.pdf');

    const [antwort, vorschlag] = await Promise.all([
      fetch('/api/dokumente/scannen', { method: 'POST', body: paket }),
      erkennen(dateien[0]),
    ]);
    if (!antwort.ok) {
      const grund = await antwort.json().then(k => k.detail).catch(() => null);
      throw new Error(grund || `Fehler ${antwort.status}`);
    }
    const ergebnis = await antwort.json();
    if (beschriftung) {
      beschriftung.textContent = ergebnis.abgelegt
        ? `✓ ${seiten} Seite${seiten > 1 ? 'n' : ''} · ${lesbareGroesse(pdf.size)}`
        : '✓ Im Eingang';
    }

    await betragVorschlagen(ziel.kostenart, vorschlag);
    await laden();
  } catch (fehler) {
    if (beschriftung) beschriftung.textContent = 'Fehlgeschlagen';
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
});

/** Texterkennung — schlägt fehl sie, gibt es eben keinen Vorschlag. */
async function erkennen(bild) {
  try {
    const paket = new FormData();
    paket.append('datei', bild, 'seite.jpg');
    const antwort = await fetch('/api/dokumente/erkennen',
                                { method: 'POST', body: paket });
    return antwort.ok ? await antwort.json() : null;
  } catch {
    return null;
  }
}

async function betragVorschlagen(kostenart, vorschlag) {
  if (!vorschlag?.betrag) return;
  const zeile = daten.checkliste.find(k => k.kostenart === kostenart);
  if (!zeile) return;
  const ja = await frage('Betrag aus dem Beleg übernehmen?',
    `Erkannt wurden ${eur(vorschlag.betrag)}`
    + (vorschlag.datum
      ? ` vom ${new Date(vorschlag.datum).toLocaleDateString('de-DE')}`
      : '')
    + `. Als Betrag für „${kostenart}“ eintragen?`,
    { knopf: 'Übernehmen' });
  if (!ja) return;
  // Gibt es die Position noch nicht, entsteht sie hier — sonst versickerte
  // der erkannte Betrag an genau den Zeilen, die noch nichts haben.
  if (zeile.position_id) {
    await api(`/positionen/${zeile.position_id}`,
              { method: 'PATCH', body: { betrag: vorschlag.betrag,
                                         wertquelle: 'Scan' } });
  } else {
    await api(`/zeitraeume/${zid}/positionen`,
              { method: 'POST', body: { kostenart, betrag: vorschlag.betrag,
                                        wertquelle: 'Scan' } });
  }
}

await laden();
</script>
