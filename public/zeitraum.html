<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Abrechnung · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;
          font:600 12px var(--mono);margin-bottom:16px;line-height:1.4}
  .banner .d{width:8px;height:8px;border-radius:50%;flex:none}
  .banner .days{margin-left:auto;font-weight:700;white-space:nowrap}
  .banner.pos{background:var(--pos-bg);color:var(--pos)} .banner.pos .d{background:var(--pos)}
  .banner.amber{background:var(--amber-bg);color:var(--amber)} .banner.amber .d{background:var(--amber)}
  .banner.neg{background:var(--neg-bg);color:var(--neg)} .banner.neg .d{background:var(--neg)}
  .banner.fertig{background:#EEF2F1;color:var(--soft)} .banner.fertig .d{background:var(--soft)}

  .fortschritt{background:var(--sheet);border-radius:14px;padding:15px 16px;margin-bottom:16px;
               box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .fortschritt .kopf{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .fortschritt .gross{font:700 19px var(--disp);letter-spacing:-.02em}
  .fortschritt .klein{font:500 12px var(--body);color:var(--soft)}
  .fortschritt .bahn{height:8px;border-radius:99px;background:#E4EAEA;overflow:hidden}
  .fortschritt .bahn i{display:block;height:100%;border-radius:99px;background:var(--teal)}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:var(--sheet);color:var(--soft);border-radius:11px;
    padding:11px 8px;font:600 12.5px var(--disp);cursor:pointer;min-height:44px;
    box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .tabs button[aria-selected=true]{background:var(--teal-l);color:var(--teal-d)}

  .pruef{background:var(--sheet);border-radius:14px;margin-bottom:10px;overflow:hidden;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .pruef .zeile{display:flex;gap:12px;align-items:center;padding:13px 15px;
                width:100%;border:none;background:none;text-align:left;cursor:pointer;
                font-family:var(--body);color:inherit;min-height:44px}
  .pruef .zeile + .auf{border-top:1px solid var(--line)}
  .haken{width:24px;height:24px;border-radius:50%;flex:none;display:flex;
         align-items:center;justify-content:center;font:600 12px var(--mono)}
  .haken.gruen{background:var(--pos-bg);color:var(--pos)}
  .haken.rot{background:var(--neg-bg);color:var(--neg)}
  .haken.grau{background:#EDF1F0;color:var(--soft)}
  /* overflow-wrap: lange Begriffe wie "Gebäudeversicherung" schieben sonst
     den Betrag an sich heran, bis beides zusammenklebt. */
  /* hyphens vor overflow-wrap: so wird aus "Gebäudeversicherung" ein
     getrenntes "Gebäude-versicherung" statt eines Bruchs mitten im Wort.
     overflow-wrap bleibt als Notnagel fuer Woerter ohne Trennstelle. */
  .pruef .name{flex:1;min-width:0;font:600 14px var(--disp);letter-spacing:-.01em;
               hyphens:auto;overflow-wrap:anywhere;padding-right:4px}
  .pruef .unter{display:block;font:400 11.5px var(--body);color:var(--soft);
                margin-top:3px;line-height:1.4;letter-spacing:0}
  .pruef .rechts{display:flex;align-items:center;gap:10px;flex:none}
  /* Einheitliches Kategorie-Symbol; die Farbe traegt den Zustand. */
  .ikon{width:34px;height:34px;border-radius:10px;flex:none;display:flex;
        align-items:center;justify-content:center}
  .ikon svg{width:21px;height:21px;display:block}
  .ikon.fertig{background:var(--pos-bg);color:var(--pos)}
  .ikon.warte{background:#EDF1F0;color:var(--soft)}
  .pruef .wert{font:600 13px var(--mono);white-space:nowrap}
  .pruef .wert.fehlt{color:var(--neg)}
  .pruef .auf{padding:0 15px 14px;border-top:1px solid var(--line)}
  .pruef .auf .zk{font:600 10px var(--mono);letter-spacing:.07em;text-transform:uppercase;
                  color:var(--soft);margin:12px 0 6px}
  .pruef .auf .rz{display:flex;justify-content:space-between;gap:10px;
                  font:500 12.5px var(--body);padding:4px 0}
  .pruef .auf .rz span:last-child{font-family:var(--mono);font-weight:600}
  /* Scan direkt in der Zeile: einladend, aber nicht grell — gedecktes Grün
     auf hellem Grund statt eines vollflächigen Knopfes. Steht neben dem
     Zeilenknopf, nicht darin: Knöpfe lassen sich nicht schachteln. */
  .pruef .kopf{display:flex;align-items:center;gap:8px;padding-right:15px}
  .pruef .kopf > .zeile{flex:1;min-width:0;padding-right:2px}
  .scanmini{display:flex;align-items:center;gap:7px;flex:none;
    border:1.5px solid #BFD9D1;background:var(--teal-l);color:var(--teal-d);
    border-radius:11px;padding:9px 11px;cursor:pointer;font-family:var(--body);
    min-height:44px}
  .scanmini:hover{background:#DCEDE7}
  .scanmini[disabled]{opacity:.65;cursor:default}
  .scanmini .si{font:400 15px var(--mono);line-height:1;flex:none}
  .scanmini .st{font:600 11.5px var(--disp);letter-spacing:-.005em;
                white-space:nowrap}
  /* Auf dem Handy wird es sonst zu eng — dort trägt das Symbol allein. */
  @media(max-width:409px){ .scanmini .st{display:none} }
  .nachtrag{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .nachtrag input{flex:1;min-width:130px;border:1.5px solid var(--line);
    border-radius:10px;padding:10px 12px;
    font:500 14px var(--body);min-height:44px;background:var(--sheet)}
  .nachtrag input:focus{outline:none;border-color:var(--teal)}
  .nachtrag button{border:none;border-radius:10px;padding:10px 16px;background:var(--teal);
    color:#fff;font:600 13px var(--disp);cursor:pointer;min-height:44px}
  /* Eine Kostenart aus dem Katalog, zu der es noch keine Position gibt:
     hier entsteht sie. Der Betrag ist freiwillig — wer den Beleg noch sucht,
     legt die Position leer an und trägt ihn später nach. */
  .neu .text{display:block;font:400 11.5px var(--body);color:var(--soft);
             line-height:1.45;margin:10px 0 0}
  /* Entfernen steht bewusst am Ende und leise: es ist die seltenste Handlung
     an einer Position und darf nicht neben „Übernehmen" um Klicks buhlen. */
  .entfernen{margin-top:12px;border:none;background:transparent;color:var(--soft);
    text-decoration:underline;text-underline-offset:3px;cursor:pointer;
    font:600 12px var(--disp);padding:10px 2px;min-height:44px}
  .entfernen:hover{color:var(--neg)}
  /* Verteilung: Schlüssel wählen, Gewichte lesen und überschreiben.
     Die Zahl allein („Büro 4.1398") sagt niemandem etwas — erst Maßeinheit
     und Prozentanteil machen sie lesbar. */
  .vt{margin-top:2px}
  .vt .wahl{margin:6px 0 4px}
  .vt .hinweis{font:400 11.5px var(--body);color:var(--soft);line-height:1.45;
               margin:8px 0 2px}
  .gw{display:flex;align-items:center;gap:8px;padding:5px 0}
  .gw .gn{flex:1;min-width:0;font:500 12.5px var(--body);
          hyphens:auto;overflow-wrap:anywhere}
  .gw input{width:92px;flex:none;border:1.5px solid var(--line);border-radius:10px;
    padding:9px 10px;font:600 12.5px var(--mono);min-height:44px;
    background:var(--sheet);text-align:right;color:inherit}
  .gw input:focus{outline:none;border-color:var(--teal)}
  .gw .gv{width:92px;flex:none;text-align:right;font:600 12.5px var(--mono)}
  .gw .gp{width:48px;flex:none;text-align:right;
          font:600 11.5px var(--mono);color:var(--soft)}
  .vt .knopfzeile{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .vt .knopfzeile button{border:none;border-radius:10px;padding:10px 14px;
    font:600 12.5px var(--disp);cursor:pointer;min-height:44px}
  .vt .haupt{background:var(--teal);color:#fff}
  .vt .leise{background:#EDF1F0;color:var(--ink)}
  .vt .leise:hover{background:#E1E8E6}
  .warnung{display:flex;gap:9px;align-items:flex-start;background:var(--neg-bg);
    color:var(--neg);border-radius:11px;padding:11px 12px;margin:10px 0 2px;
    font:500 11.5px var(--body);line-height:1.45}
  .warnung b{font-weight:700}
  .pdflink{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    background:#F1F4F4;color:var(--ink);border-radius:10px;padding:9px 12px;
    font:600 11.5px var(--body);min-height:40px;margin-top:10px}
  .pdflink:hover{background:var(--teal-l);color:var(--teal-d)}
  .wiederauf{margin-top:12px;border:none;background:transparent;color:var(--soft);
    text-decoration:underline;text-underline-offset:3px;cursor:pointer;
    font:600 12px var(--disp);padding:10px 2px;min-height:44px}
  .wiederauf:hover{color:var(--ink)}
  .belege{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .belege a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;
    background:#F1F4F4;color:var(--ink);border-radius:9px;padding:8px 11px;
    font:500 11.5px var(--body);min-height:36px}
  .belege a:hover{background:var(--teal-l);color:var(--teal-d)}
  .belege .kein{font:400 12px var(--body);color:var(--soft)}

  .karte{background:var(--sheet);border-radius:16px;padding:16px;margin-bottom:12px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .karte h3{font:600 13px var(--disp);margin:0 0 12px}
  .summe{display:flex;justify-content:space-between;gap:12px;padding:9px 0;
         font:500 13.5px var(--body);border-top:1px solid var(--line)}
  .summe:first-of-type{border-top:none}
  .summe b{font-family:var(--mono)}
  .summe.gesamt{font-weight:700;border-top:2px solid var(--line)}
  .summe .pos{color:var(--pos)} .summe .neg{color:var(--neg)}

  .sortleiste{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .sortleiste span{font:600 10px var(--mono);letter-spacing:.08em;
                   text-transform:uppercase;color:var(--soft);margin-right:2px}
  .sortleiste button{border:none;background:var(--sheet);color:var(--soft);
    border-radius:999px;padding:8px 13px;font:600 11.5px var(--disp);cursor:pointer;
    min-height:38px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .sortleiste button[aria-pressed=true]{background:var(--teal-l);color:var(--teal-d)}

  .abschluss{border-radius:16px;padding:18px;margin:16px 0 4px}
  .abschluss .at{font:700 16px var(--disp);letter-spacing:-.015em;margin-bottom:6px}
  .abschluss p{font:400 13px var(--body);margin:0 0 14px;line-height:1.5}
  .abschluss.bereit{background:var(--pos-bg);color:var(--pos)}
  .abschluss.offen{background:var(--sheet);color:var(--ink);
                   box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .abschluss.offen p{color:var(--soft)}
  .abschluss.fertig{background:#EEF2F1;color:var(--soft)}
  .abschluss.fertig p{color:var(--soft);margin-bottom:0}
  .uebergehen{display:flex;align-items:center;gap:10px;margin-bottom:14px;
              font:500 13px var(--body);color:var(--ink);cursor:pointer;min-height:44px}
  .uebergehen input{width:20px;height:20px;flex:none}
  .losbutton{width:100%;border:none;border-radius:12px;padding:15px;cursor:pointer;
    font:600 15px var(--disp);background:var(--pos);color:#fff;min-height:48px;
    box-shadow:0 6px 16px -8px rgba(46,125,79,.7)}
  .losbutton:hover{background:#276b44}
  .losbutton[disabled]{background:#C2CCCB;color:#fff;box-shadow:none;cursor:default}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button class="back" id="back">Zurück</button>
    <div class="barwrap">
      <h1 id="titel">Abrechnung</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll" id="inhalt"></div>
  <!-- Kamera fuer den Scan an einer offenen Position. capture=environment
       oeffnet auf iOS direkt die Ruecckamera. -->
  <input type="file" id="scanFeld" accept="image/*" capture="environment" multiple
         style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
         tabindex="-1" aria-hidden="true">

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html" aria-current="page"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
import { api, eur, eurKurz, esc, fristKlasse, melde, frage, wahl }
  from './assets/immo.js';
import { auswahlfeld } from './assets/auswahl.js';
import { sankey } from './assets/charts.js';
import { kostenIcon } from './assets/kostenicons.js';
import { scanZuPdf, lesbareGroesse } from './assets/scan.js';

const zid = new URLSearchParams(location.search).get('z');
const inhalt = document.getElementById('inhalt');
const titel = document.getElementById('titel');
const sub = document.getElementById('sub');
let daten = null;
/* Welche Verteilungsschlüssel für dieses Objekt taugen und welche Gewichte
   sie ergäben — die Vorschau, bevor man sich festlegt. */
let schluessel = null;
let ansicht = 'pruef';
let sortierung = 'status';
const offen = new Set();

/* Welche Position gerade einen Beleg erwartet — gesetzt beim Klick auf den
   Scan-Knopf, gelesen, wenn die Kamera zurückkommt. */
let scanZiel = null;

const SORTIERUNG = {
  status: (a, b) => Number(a.erledigt) - Number(b.erledigt) ||
                    (b.betrag || 0) - (a.betrag || 0),
  betrag: (a, b) => (b.betrag || 0) - (a.betrag || 0),
  name: (a, b) => a.kostenart.localeCompare(b.kostenart, 'de'),
};

document.getElementById('back').addEventListener('click', () => history.length > 1
  ? history.back() : location.href = 'index.html');

const HAKEN = {
  erledigt: ['gruen', '✓'],
  offen: ['rot', '!'],
  fehlt: ['grau', '–'],
};

function bannerHtml() {
  if (daten.status !== 'in Arbeit') {
    return `<div class="banner fertig"><span class="d"></span>
      <span>Abgeschlossen · ${esc(daten.label)}</span></div>`;
  }
  const k = fristKlasse(daten.frist_tage);
  const tage = daten.frist_tage < 0
    ? `${Math.abs(daten.frist_tage)} Tage über` : `noch ${daten.frist_tage} Tage`;
  return `<div class="banner ${k}"><span class="d"></span>
    <span>Frist § 556 BGB</span><span class="days">${tage}</span></div>`;
}

/* Welche Belege zu einer Kostenart gehören. Die API gruppiert die Dokumente
   des Zeitraums bereits nach Art (`belege_je_art`) — das ist die verlässliche
   Quelle. Scans aus der Checkliste laufen allerdings unter der Dokumentart
   „Nebenkosten"; für sie greift der Dateiname, der nach Jahr und Art mit der
   Kostenart beginnt. */
function belegeZu(kostenart) {
  const gruppe = (daten.belege_je_art || {})[kostenart];
  if (gruppe?.length) return gruppe;
  const stamm = kostenart.toLowerCase().split(/[ /]/)[0];
  return (daten.dokumente || []).filter(d =>
    (d.dateiname || '').toLowerCase().includes(stamm));
}

const belegLinks = liste => `<div class="belege">${liste.map(d =>
  `<a href="#" data-beleg="${d.id}" title="${esc(d.pfad)}">PDF · ${esc(d.dateiname)}</a>`
).join('')}</div>`;

function belegeHtml(kostenart) {
  const alle = belegeZu(kostenart);
  if (!alle.length) return '<div class="belege"><span class="kein">Kein Beleg hinterlegt</span></div>';
  return belegLinks(alle);
}

const schluesselMeta = wert =>
  (schluessel?.schluessel || []).find(s => s.wert === wert) || null;

const prozentText = (wert, summe) =>
  summe > 0 ? `${(Number(wert || 0) / summe * 100).toFixed(1)} %` : '—';

/* Verteilung einer Position: Schlüssel wählbar, Gewichte lesbar.
   Eine nackte Zahl („Büro 4.1398") sagt niemandem etwas — erst Maßeinheit und
   Prozentanteil machen sie lesbar, und erst das Eingabefeld korrigierbar. */
function verteilungHtml(k) {
  if (!k.position_id) return '';
  const meta = schluesselMeta(k.schluessel);
  const eintraege = Object.entries(k.anteile || {});
  const summe = eintraege.reduce((s, [, w]) => s + Number(w || 0), 0);
  const bearbeitbar = daten.status === 'in Arbeit';
  const einheit = k.anteile_einheit || meta?.einheit || '';
  const abzuleiten = meta?.moeglich ? Object.entries(meta.gewichte) : [];
  const gleich = abzuleiten.length === eintraege.length &&
    abzuleiten.every(([p, w]) => Number(k.anteile?.[p] ?? NaN) === Number(w));
  /* Lässt sich der Schlüssel nicht aus den Stammdaten ableiten, bleiben die
     Gewichte leer — ohne Eingabefelder käme man aus dieser Lage nie heraus.
     Deshalb die Parteien des Objekts mit 0 anbieten und von Hand füllen. */
  const felder = eintraege.length || !bearbeitbar ? eintraege
    : (schluessel?.parteien || []).map(p => [p.partei, 0]);

  const zeilen = felder.map(([p, w]) => `
    <div class="gw">
      <span class="gn">${esc(p)}</span>
      ${bearbeitbar
        ? `<input type="number" step="0.0001" min="0" value="${Number(w)}"
                 data-gewicht="${esc(p)}"
                 aria-label="Gewicht ${esc(p)}${einheit ? ` in ${esc(einheit)}` : ''}">`
        : `<span class="gv">${Number(w).toLocaleString('de-DE')}</span>`}
      <span class="gp" data-anteil>${prozentText(w, summe)}</span>
    </div>`).join('');

  const knoepfe = bearbeitbar ? `<div class="knopfzeile">
      ${felder.length ? `<button class="haupt"
        data-gewichte="${k.position_id}">Verteilung übernehmen</button>` : ''}
      ${abzuleiten.length && !gleich ? `<button class="leise"
        data-ableiten="${k.position_id}"
        data-fuer="${esc(k.schluessel || '')}">${eintraege.length
          ? 'Neu aus Stammdaten' : 'Aus Stammdaten ableiten'}</button>` : ''}
    </div>` : '';

  return `<div class="vt">
      <div class="zk">Verteilung${bearbeitbar ? ''
        : ` · ${esc(meta?.titel || k.schluessel || '—')}`}${
        einheit ? ` · ${esc(einheit)}` : ''}</div>
      ${bearbeitbar ? `<div class="wahl" data-schluesselwahl="${k.position_id}"
           data-wert="${esc(k.schluessel || '')}"></div>` : ''}
      ${k.ohne_verteilung ? `<div class="warnung"><span>▲</span>
        <span><b>Ohne Gewichte wird nichts verteilt.</b> Die ${eur(k.betrag)}
        fließen mit 0,00 € in die Abrechnung ein.</span></div>` : ''}
      ${zeilen}
      ${!eintraege.length && meta ? `<div class="hinweis">${esc(meta.hinweis)}</div>`
        : ''}
      ${knoepfe}
    </div>`;
}

function zeileHtml(k, i) {
  const [farbe, zeichen] = HAKEN[k.zustand] || HAKEN.fehlt;
  const wert = eur(k.betrag);
  const aufgeklappt = offen.has(i);

  // Zweite Zeile: Schlüssel, Anteil an der Gesamtsumme, Quelle, §35a
  const summe = daten.fortschritt.summe || 0;
  const anteilProzent = k.erledigt && summe > 0
    ? Math.round((k.betrag / summe) * 100) : null;
  const infos = [
    // Ein erfasster Beleg ohne Betrag ist etwas anderes als gar nichts —
    // ohne den Hinweis waere das nur am Farbton des Hakens zu erkennen.
    k.zustand === 'offen' ? 'Betrag fehlt' : null,
    k.ohne_verteilung ? 'Verteilung fehlt' : null,
    k.schluessel ? `Schlüssel ${schluesselMeta(k.schluessel)?.titel
                                || k.schluessel}` : null,
    anteilProzent != null ? `${anteilProzent} % der Kosten` : null,
    k.wertquelle && k.wertquelle !== 'manuell' ? k.wertquelle : null,
    k.s35 ? '§35a absetzbar' : null,
    !k.erledigt && k.beleg_monat ? `Beleg im ${MONATE[k.beleg_monat - 1]}` : null,
  ].filter(Boolean).join(' · ');

  const verteilung = verteilungHtml(k);

  // Der Scan-Knopf steht in der Zeile selbst, nicht erst im aufgeklappten
  // Bereich: einen Beleg nachzureichen ist die haeufigste Handlung hier und
  // soll keinen Umweg ueber einen zweiten Klick brauchen.
  return `<div class="pruef">
      <div class="kopf">

            jederzeit ändern.</span>

async function ergebnisHtml() {
  let a;

    a = await api(`/zeitraeume/${zid}/abrechnung`);
  } catch {
    return '<div class="empty"><div class="big">Ergebnis nicht verfügbar</div></div>';
  }
  // Die Abrechnung je Partei als PDF — dieselbe Datei, die beim Versand
  // angehängt wird. Vor dem Verschicken einmal ansehen zu können, ist der
  // Sinn der Vorschau.
  const zeilen = Object.entries(a.parteien || {}).map(([partei, w]) => `
    <div class="karte">
      <h3>${esc(partei)}</h3>
      <div class="summe"><span>Umlagefähige Kosten</span><b>${eur(w.kosten)}</b></div>
      <div class="summe"><span>Vorauszahlungen</span><b>${eur(w.vorauszahlungen)}</b></div>
      ${w.s35 ? `<div class="summe"><span>davon § 35a</span><b>${eur(w.s35)}</b></div>`
        : ''}
      <div class="summe gesamt"><span>Saldo</span>
        <b class="${(w.saldo ?? 0) >= 0 ? 'pos' : 'neg'}">${eur(w.saldo)}</b></div>
      <a class="pdflink" target="_blank" rel="noopener"
         href="/api/zeitraeume/${zid}/abrechnung.pdf?partei=${
           encodeURIComponent(partei)}">▤ Abrechnung als PDF ansehen</a>

  const g = a.gesamt || {};

      <div class="summe gesamt"><span>Saldo</span>

    </div>${zeilen}
    ${a.offen?.length ? `<div class="karte"><h3>Noch offen</h3>
      ${a.ohne_betrag?.length ? `<div class="summe">
        <span>Ohne Betrag</span><b>${a.ohne_betrag.map(esc).join(', ')}</b></div>` : ''}
      ${a.ohne_verteilung?.length ? `<div class="summe">

}

const MONATE = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli',
  'August', 'September', 'Oktober', 'November', 'Dezember'];

/* Abschluss: erst wenn nichts mehr offen ist — oder du die Reste bewusst
   übergehst — wird der Versand freigegeben. */
function abschlussHtml() {
  if (daten.status !== 'in Arbeit') {
    // Zurückhaltend, aber vorhanden: ein versehentlicher Abschluss war bisher
    // unumkehrbar — samt der Fristen und Erinnerungen, die daran hängen.
    return `<div class="abschluss fertig">
        <div class="at">Abgeschlossen</div>
        <p>Dieser Zeitraum ist abgerechnet und versendet.</p>
        <button class="wiederauf" data-oeffnen="1">Wieder öffnen</button>
      </div>`;
  }
  const f = daten.fortschritt;
  const rest = f.gesamt - f.fertig;
  // Eine erledigte Position ohne Gewichte sieht fertig aus, fließt aber mit
  // 0,00 € ein. Sie gehört deshalb zu dem, was den Abschluss aufhält.
  const ohne = daten.checkliste.filter(k => k.ohne_verteilung)
    .map(k => k.kostenart);

  if (rest === 0 && !ohne.length) {
    return `<div class="abschluss bereit">
        <div class="at">✓ Alles erfasst</div>
        <p>${f.gesamt} Positionen vollständig · ${eur(f.summe)} umlagefähig.
           Die Abrechnungen können erstellt und verschickt werden.</p>
        <button class="losbutton" data-abschluss="1">Abrechnungen erstellen und versenden</button>
      </div>`;
  }
  const teile = [
    rest ? `${rest} ${rest === 1 ? 'Position' : 'Positionen'} ohne Betrag` : null,
    ohne.length ? `${ohne.length} ohne Verteilung` : null,
  ].filter(Boolean).join(' · ');

  return `<div class="abschluss offen">
      <div class="at">Noch nicht vollständig</div>
      <p>${teile}. Trage die fehlenden Angaben ein — oder bestätige, dass die
         restlichen Posten für diesen Zeitraum nicht anfallen.</p>
      ${ohne.length ? `<div class="warnung"><span>▲</span>
        <span><b>${esc(ohne.join(', '))}</b> ${ohne.length === 1 ? 'hat' : 'haben'}
        einen Betrag, aber keine Verteilungsgewichte — ${ohne.length === 1
          ? 'er zählt' : 'sie zählen'} in der Abrechnung mit 0,00 €.</span>
        </div>` : ''}
      <label class="uebergehen">
        <input type="checkbox" id="uebergehen">
        <span>Restliche Positionen fallen nicht an</span>
      </label>
      <button class="losbutton" data-abschluss="1" disabled
              id="abschlussKnopf">Abrechnungen erstellen und versenden</button>
    </div>`;
}

async function zeichnen() {
  const f = daten.fortschritt;
  const anteil = f.gesamt ? Math.round((f.fertig / f.gesamt) * 100) : 0;

  const kopf = `${bannerHtml()}
    <div class="fortschritt">
      <div class="kopf">
        <span class="gross">${f.fertig} von ${f.gesamt}</span>
        <span class="klein">Positionen vollständig</span>
      </div>
      <div class="bahn"><i style="width:${anteil}%"></i></div>
    </div>
    <div class="tabs" role="tablist">
      <button data-tab="pruef" aria-selected="${ansicht === 'pruef'}">Checkliste</button>
      <button data-tab="ergebnis" aria-selected="${ansicht === 'ergebnis'}">Ergebnis</button>
      <button data-tab="belege" aria-selected="${ansicht === 'belege'}">Belege</button>
    </div>`;

  let rumpf = '';
  if (ansicht === 'pruef') {
    const fluss = daten.sankey || { knoten: [], fluss: [] };
    const flussKarte = fluss.fluss.length
      ? `<div class="karte"><h3>Kostenfluss · erfasste Positionen</h3>
          ${sankey(fluss.knoten, fluss.fluss,
                   { format: eurKurz, breite: window.innerWidth < 520 ? 260 : 540 })}
         </div>`
      : '';

    const sortWahl = `<div class="sortleiste">
        <span>Sortieren</span>
        ${Object.entries({ status: 'Offene zuerst', betrag: 'Größe', name: 'Name' })
          .map(([k, l]) => `<button data-sort="${k}"
            aria-pressed="${sortierung === k}">${l}</button>`).join('')}
      </div>`;

    const sortiert = daten.checkliste
      .map((k, i) => ({ k, i }))
      .sort((a, b) => SORTIERUNG[sortierung](a.k, b.k));

    rumpf = flussKarte + sortWahl +
      sortiert.map(({ k, i }) => zeileHtml(k, i)).join('') + abschlussHtml();
  } else if (ansicht === 'ergebnis') {
    rumpf = '<div class="karte"><h3>Wird gerechnet …</h3></div>';
  } else {
    // Nach Dokumentart gruppiert — so, wie die API sie liefert.
    const gruppen = Object.entries(daten.belege_je_art || {})
      .filter(([, liste]) => liste.length)
      .sort(([a], [b]) => a.localeCompare(b, 'de'));
    rumpf = daten.dokumente.length
      ? gruppen.map(([art, liste]) => `<div class="karte">
          <h3>${esc(art || 'Ohne Art')} · ${liste.length}</h3>
          ${belegLinks(liste)}</div>`).join('')
      : `<div class="empty"><div class="big">Noch keine Belege</div>
          <p>Fotografiere in der Checkliste einen Beleg zu einer Position ab —
             er wird in der Cloud abgelegt und erscheint dann hier.</p></div>`;
  }

  inhalt.innerHTML = kopf + rumpf;

  if (ansicht === 'ergebnis') {
    inhalt.innerHTML = kopf + await ergebnisHtml();
  } else if (ansicht === 'pruef') {
    montiereSchluessel();
  }
}

/* Die Auswahlfelder werden nach dem Zeichnen gesetzt: sie bestehen aus
   Knopf und Liste und lassen sich nicht als Zeichenkette einfügen. */
function montiereSchluessel() {
  if (!schluessel) return;
  const optionen = schluessel.schluessel.map(s => ({
    wert: s.wert,
    text: `${s.titel} · ${s.moeglich ? 'abgeleitet' : 'von Hand'}`,
  }));
  inhalt.querySelectorAll('[data-schluesselwahl]').forEach(ziel => {
    const pid = ziel.dataset.schluesselwahl;
    auswahlfeld(ziel, {
      optionen, wert: ziel.dataset.wert, label: 'Verteilungsschlüssel',
      aenderung: async neu => {
        try {
          // Der Server leitet die Gewichte beim Wechsel neu ab — alte
          // Flächenwerte unter „Personen" wären still falsch.
          await api(`/positionen/${pid}`,
                    { method: 'PATCH', body: { schluessel: neu } });
          await laden();
        } catch (fehler) {
          melde(String(fehler.message || fehler), 'neg');
        }
      },
    });
  });
}

/* Die Schlüsselliste ist mit sieben Einträgen hoch. Steht das Feld weit unten,
   reicht der Platz darunter zwar für die Liste, nicht aber für die
   Menüleiste — die letzten Einträge lägen dahinter und wären nicht anklickbar.
   Deshalb vorher nach oben rollen, im Capture-Lauf: das Auswahlfeld misst den
   Platz erst danach. */
inhalt.addEventListener('click', e => {
  const knopf = e.target.closest('.vt .auswahl-knopf');
  if (!knopf || knopf.getAttribute('aria-expanded') === 'true') return;
  const noetig = (schluessel?.schluessel.length || 7) * 44 + 120;
  if (window.innerHeight - knopf.getBoundingClientRect().bottom < noetig) {
    // Nicht scrollIntoView: das schöbe das Feld unter die Kopfzeile. 150 px
    // von oben lassen die Kopfzeile stehen und die Liste ganz sichtbar werden.
    rolleUnterDieKopfzeile(knopf, 150);
  }
}, true);

/** Rollt `el` auf `oben` px unter den oberen Rand — im richtigen Rollbereich:
    auf dem Handy scrollt die Seite, am Schreibtisch die Spalte `.scroll`. */
function rolleUnterDieKopfzeile(el, oben) {
  const delta = el.getBoundingClientRect().top - oben;
  let bereich = el.parentElement;
  while (bereich && bereich !== document.body) {
    const stil = getComputedStyle(bereich);
    if (/(auto|scroll)/.test(stil.overflowY) &&
        bereich.scrollHeight > bereich.clientHeight) break;
    bereich = bereich.parentElement;
  }
  if (bereich && bereich !== document.body) bereich.scrollTop += delta;
  else window.scrollBy(0, delta);
}

async function verteilungSpeichern(knopf) {
  const anteile = {};
  knopf.closest('.vt').querySelectorAll('[data-gewicht]').forEach(feld => {
    anteile[feld.dataset.gewicht] = Number(feld.value) || 0;
  });
  if (!Object.values(anteile).some(w => w > 0)) {
    return melde('Mindestens ein Gewicht muss größer als null sein', 'neg');
  }
  knopf.disabled = true;
  knopf.textContent = 'Speichere …';
  try {
    await api(`/positionen/${knopf.dataset.gewichte}`,
              { method: 'PATCH', body: { anteile } });
    melde('Verteilung übernommen', 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Verteilung übernehmen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

async function verteilungAbleiten(knopf) {
  const meta = schluesselMeta(knopf.dataset.fuer);
  if (!meta?.moeglich) return;
  knopf.disabled = true;
  try {
    await api(`/positionen/${knopf.dataset.ableiten}`,
              { method: 'PATCH', body: { anteile: meta.gewichte } });
    melde(`Gewichte aus den Stammdaten übernommen · ${meta.titel}`, 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Eine Kostenart des Katalogs, zu der es noch keine Position gibt, wird hier
   zu einer. Erst danach gibt es einen Betrag, eine Verteilung und damit
   überhaupt eine Zeile in der Abrechnung. Die Gewichte leitet der Server aus
   den Stammdaten ab — mitgegeben wird nur, was der Nutzer eingetippt hat. */
async function positionAnlegen(knopf) {
  const kostenart = knopf.dataset.anlegen;
  const i = Number(knopf.dataset.index);
  const feld = inhalt.querySelector(`[data-neubetrag="${i}"]`);
  const betrag = Number(feld?.value) || 0;
  knopf.disabled = true;
  knopf.textContent = 'Lege an …';
  try {
    await api(`/zeitraeume/${zid}/positionen`,
              { method: 'POST', body: { kostenart, betrag } });
    melde(betrag ? `„${kostenart}“ erfasst · ${eur(betrag)}`
                 : `„${kostenart}“ angelegt — jetzt den Betrag eintragen`, 'pos');
    offen.add(i);
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Anlegen';
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Entfernen mit Rückfrage: die Kostenart bleibt im Katalog, die Zeile taucht
   danach wieder als „noch nicht erfasst" auf. Verloren geht nur der Betrag. */
async function positionEntfernen(knopf) {
  const art = knopf.dataset.art;
  const ja = await frage(`„${art}“ entfernen?`,
    'Betrag und Verteilung dieser Position werden gelöscht. Die Kostenart '
    + 'bleibt im Katalog der Immobilie stehen und lässt sich jederzeit neu '
    + 'erfassen. Hinterlegte Belege bleiben unangetastet.',
    { knopf: 'Entfernen', gefahr: true });
  if (!ja) return;
  knopf.disabled = true;
  try {
    await api(`/positionen/${knopf.dataset.entfernen}`, { method: 'DELETE' });
    melde(`„${art}“ entfernt`, '');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Wieder öffnen — bewusst mit Rückfrage, aber ohne Drama: es geht nichts
   verloren, und niemand bekommt dadurch eine zweite Mail. */
async function wiederOeffnen(knopf) {
  const ja = await frage('Zeitraum wieder öffnen?',
    'Der Zeitraum wird wieder bearbeitbar und taucht in Fristen und '
    + 'Erinnerungen erneut auf. Wer die Abrechnung schon bekommen hat, '
    + 'bekommt sie dadurch nicht noch einmal.', { knopf: 'Wieder öffnen' });
  if (!ja) return;
  knopf.disabled = true;
  try {
    const antwort = await api(`/zeitraeume/${zid}/oeffnen`, { method: 'POST' });
    const schon = antwort.bereits_versendet.length;
    melde(schon
      ? `Wieder geöffnet · ${schon} Partei(en) haben ihre Abrechnung bereits`
      : 'Wieder geöffnet', 'pos');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
}

/* Vor dem Versand zeigen, wer was bekommt — und wem die Mailadresse fehlt. */
async function abschliessen(knopf) {
  const uebergehen = document.getElementById('uebergehen')?.checked || false;
  knopf.disabled = true;
  knopf.textContent = 'Prüfe Empfänger …';

  let plan;
  try {
    plan = await api(`/zeitraeume/${zid}/versand`);
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    melde(String(fehler.message || fehler), 'neg');
    return;
  }

  const bereit = plan.parteien.filter(p => p.versandbereit);
  const warnung = plan.ohne_mail.length
    ? ` Ohne Mailadresse und daher nicht versendbar: ${plan.ohne_mail.join(', ')}.`
    : '';

  // Nicht jeder verschickt per Mail — wer die Abrechnung ausdruckt und mit
  // der Post schickt, muss den Zeitraum trotzdem abschliessen koennen.
  const weg = await wahl(`Abrechnung für ${plan.zeitraum} abschließen`,
    bereit.length
      ? `${bereit.length} von ${plan.parteien.length} Parteien haben eine `
        + `Mailadresse und bekommen die Abrechnung als PDF.${warnung}`
      : `Keine der ${plan.parteien.length} Parteien hat eine Mailadresse `
        + `hinterlegt. Der Zeitraum lässt sich trotzdem abschließen.`,
    [...(bereit.length ? [{ wert: 'senden', text: 'Abschließen und verschicken' }] : []),
     { wert: 'nur', text: 'Nur abschließen, nicht verschicken' }]);

  if (!weg) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    return;
  }

  knopf.textContent = weg === 'senden' ? 'Verschicke …' : 'Schließe ab …';
  try {
    const antwort = await api(`/zeitraeume/${zid}/abschliessen`, {
      method: 'POST', body: { versenden: weg === 'senden',
                              offene_uebergehen: uebergehen },
    });
    melde(antwort.versendet.length
      ? `${antwort.versendet.length} Abrechnung(en) verschickt an ${antwort.versendet.join(', ')}`
      : 'Zeitraum abgeschlossen — versendet wurde nichts.',
      antwort.versendet.length ? 'pos' : '');
    await laden();
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Abrechnungen erstellen und versenden';
    melde(String(fehler.message || fehler), 'neg');
  }
}

async function laden() {
  if (!zid) {
    inhalt.innerHTML = '<div class="empty"><div class="big">Kein Zeitraum gewählt</div></div>';
    return;
  }
  try {
    daten = await api(`/zeitraeume/${zid}`);
  } catch {
    inhalt.innerHTML = `<div class="empty"><div class="big">Zeitraum nicht gefunden</div></div>`;
    return;
  }
  // Die Schlüssel-Vorschau ist Beiwerk: fehlt sie, bleibt die Checkliste
  // bedienbar, nur ohne Auswahlfeld und ohne Ableitung.
  try {
    schluessel = await api(`/zeitraeume/${zid}/schluessel`);
  } catch {
    schluessel = null;
  }
  titel.textContent = daten.label;
  sub.textContent = `${daten.objekt_name} · ${daten.typ}`;
  await zeichnen();
}

/* Prozentanteile beim Tippen mitrechnen — sonst sieht man erst nach dem
   Speichern, was man da eigentlich verteilt hat. */
inhalt.addEventListener('input', e => {
  if (!e.target.matches('[data-gewicht]')) return;
  const felder = [...e.target.closest('.vt').querySelectorAll('[data-gewicht]')];
  const summe = felder.reduce((s, f) => s + (Number(f.value) || 0), 0);
  felder.forEach(f => {
    const ziel = f.parentElement.querySelector('[data-anteil]');
    if (ziel) ziel.textContent = prozentText(f.value, summe);
  });
});

inhalt.addEventListener('change', e => {
  // Der Versand bleibt gesperrt, bis die Restposten bewusst abgehakt sind.
  if (e.target.id === 'uebergehen') {
    const knopf = document.getElementById('abschlussKnopf');
    if (knopf) knopf.disabled = !e.target.checked;
  }
});

inhalt.addEventListener('click', async e => {
  const tab = e.target.closest('[data-tab]');
  if (tab) { ansicht = tab.dataset.tab; return zeichnen(); }

  const sort = e.target.closest('[data-sort]');
  if (sort) { sortierung = sort.dataset.sort; return zeichnen(); }

  const abschluss = e.target.closest('[data-abschluss]');
  if (abschluss) return abschliessen(abschluss);

  const oeffnen = e.target.closest('[data-oeffnen]');
  if (oeffnen) return wiederOeffnen(oeffnen);

  const gewichte = e.target.closest('[data-gewichte]');
  if (gewichte) return verteilungSpeichern(gewichte);

  const ableiten = e.target.closest('[data-ableiten]');
  if (ableiten) return verteilungAbleiten(ableiten);

  const anlegen = e.target.closest('[data-anlegen]');
  if (anlegen) return positionAnlegen(anlegen);

  const entfernen = e.target.closest('[data-entfernen]');
  if (entfernen) return positionEntfernen(entfernen);

  const auf = e.target.closest('[data-auf]');
  if (auf) {
    const i = Number(auf.dataset.auf);
    offen.has(i) ? offen.delete(i) : offen.add(i);
    return zeichnen();
  }

  const beleg = e.target.closest('[data-beleg]');
  if (beleg) {
    e.preventDefault();
    // Der Beleg wird durch die API gereicht und im neuen Tab angezeigt —
    // Nextcloud verlangt sonst eine eigene Anmeldung.
    window.open(`/api/dokumente/${beleg.dataset.beleg}/inhalt`, '_blank',
                'noopener');
    return;
  }

  const scan = e.target.closest('[data-scan]');
  if (scan) {
    scanZiel = { kostenart: scan.dataset.scan, knopf: scan };
    document.getElementById('scanFeld').click();
    return;
  }

  const speichern = e.target.closest('[data-speichern]');
  if (speichern) {
    const pid = speichern.dataset.speichern;
    const feld = inhalt.querySelector(`[data-betrag="${pid}"]`);
    const betrag = Number(feld.value);
    if (!betrag) return;
    speichern.disabled = true;
    speichern.textContent = '…';
    try {
      await api(`/positionen/${pid}`, { method: 'PATCH', body: { betrag } });
      await laden();
    } catch (fehler) {
      speichern.disabled = false;
      speichern.textContent = 'Übernehmen';
      melde(String(fehler.message || fehler), 'neg');
    }
  }
});

/* ---- Beleg direkt an einer offenen Position ------------------------------
   Die Aufnahmen werden im Browser zu einem PDF gebaut und mit Kostenart, Jahr
   und Objekt hochgeladen — der Umweg über den Eingang entfällt. Parallel geht
   die erste Aufnahme durch die Texterkennung; findet sie einen Betrag, wird er
   nur vorgeschlagen, nie ohne Rückfrage gespeichert. */
document.getElementById('scanFeld').addEventListener('change', async e => {
  const feld = e.target;
  const dateien = [...feld.files];
  feld.value = '';
  const ziel = scanZiel;
  scanZiel = null;
  if (!dateien.length || !ziel) return;

  const knopf = ziel.knopf;
  const beschriftung = knopf.querySelector('.st');
  knopf.disabled = true;
  if (beschriftung) beschriftung.textContent = 'Verarbeite …';

  try {
    const { pdf, seiten } = await scanZuPdf(dateien);
    const jahr = Number((daten.ende || '').slice(0, 4)) || new Date().getFullYear();

    const paket = new FormData();
    paket.append('objekt', daten.objekt);
    paket.append('kategorie', 'Nebenkosten');
    paket.append('jahr', String(jahr));
    paket.append('beschreibung', ziel.kostenart);
    // Ohne den Zeitraum hinge der Beleg nur am Objekt — der Reiter „Belege"
    // bliebe leer und die Zuordnung müsste man von Hand nachholen.
    paket.append('zeitraum_id', String(daten.id));
    paket.append('datei', pdf, 'scan.pdf');

    const [antwort, vorschlag] = await Promise.all([
      fetch('/api/dokumente/scannen', { method: 'POST', body: paket }),
      erkennen(dateien[0]),
    ]);
    if (!antwort.ok) {
      const grund = await antwort.json().then(k => k.detail).catch(() => null);
      throw new Error(grund || `Fehler ${antwort.status}`);
    }
    const ergebnis = await antwort.json();
    if (beschriftung) {
      beschriftung.textContent = ergebnis.abgelegt
        ? `✓ ${seiten} Seite${seiten > 1 ? 'n' : ''} · ${lesbareGroesse(pdf.size)}`
        : '✓ Im Eingang';
    }

    await betragVorschlagen(ziel.kostenart, vorschlag);
    await laden();
  } catch (fehler) {
    if (beschriftung) beschriftung.textContent = 'Fehlgeschlagen';
    knopf.disabled = false;
    melde(String(fehler.message || fehler), 'neg');
  }
});

/** Texterkennung — schlägt fehl sie, gibt es eben keinen Vorschlag. */
async function erkennen(bild) {
  try {
    const paket = new FormData();
    paket.append('datei', bild, 'seite.jpg');
    const antwort = await fetch('/api/dokumente/erkennen',
                                { method: 'POST', body: paket });
    return antwort.ok ? await antwort.json() : null;
  } catch {
    return null;
  }
}

async function betragVorschlagen(kostenart, vorschlag) {
  if (!vorschlag?.betrag) return;
  const zeile = daten.checkliste.find(k => k.kostenart === kostenart);
  if (!zeile) return;
  const betrag = vorschlag.betrag.toLocaleString('de-DE',
    { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const ja = await frage('Betrag aus dem Beleg übernehmen?',
    `Erkannt wurden ${betrag} €`
    + (vorschlag.datum
      ? ` vom ${new Date(vorschlag.datum).toLocaleDateString('de-DE')}`
      : '')
    + `. Als Betrag für „${kostenart}“ eintragen?`,
    { knopf: 'Übernehmen' });
  if (!ja) return;
  // Gibt es die Position noch nicht, entsteht sie hier — sonst versickerte
  // der erkannte Betrag an genau den Zeilen, die noch nichts haben.
  if (zeile.position_id) {
    await api(`/positionen/${zeile.position_id}`,
              { method: 'PATCH', body: { betrag: vorschlag.betrag,
                                         wertquelle: 'Scan' } });
  } else {
    await api(`/zeitraeume/${zid}/positionen`,
              { method: 'POST', body: { kostenart, betrag: vorschlag.betrag,
                                        wertquelle: 'Scan' } });
  }
}

await laden();
</script>
