<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  /* App-Symbol in der Kopfzeile — kommt auf index.html, eingang.html und
     statistik.html gleich vor; gehoert eigentlich nach immo.css. */
  .applogo{width:34px;height:34px;border-radius:9px;flex:none;display:block}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <img src="icons/icon.svg" alt="" class="applogo">
    <div class="barwrap">
      <h1>Immobilien</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div id="objekte"></div>

    <h2 class="sec">Verwalten</h2>
    <a class="row ghost" href="onboarding.html">
      <span class="ic">＋</span>
      <span class="txt">
        <span class="t">Immobilie einrichten</span>
        <span class="d">Grunddaten, Turnus, Kostenarten, Einheiten</span>
      </span>
      <span class="arr">›</span>
    </a>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html" aria-current="page"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html"><span class="ni">▼</span>Eingang</a>
    <a href="statistik.html"><span class="ni">◔</span>Auswertung</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
import { installLogos, logoSvg, api, esc, fristKlasse, fristText } from './assets/immo.js';

installLogos();

const ziel = document.getElementById('objekte');
const sub = document.getElementById('sub');

function kachel(o) {
  const chips = [];
  const frist = fristText(o.frist_tage);
  if (frist) chips.push(`<span class="chip ${fristKlasse(o.frist_tage)}">${frist}</span>`);
  if (o.offene_positionen > 0)
    chips.push(`<span class="chip amber">${o.offene_positionen} Beleg${o.offene_positionen > 1 ? 'e' : ''} offen</span>`);
  if (!chips.length) chips.push('<span class="chip pos">alles erledigt</span>');

  return `<button class="tile" data-slug="${esc(o.slug)}">
      <span class="ico">${logoSvg(o.typ)}</span>
      <span>
        <span class="name">${esc(o.name)}</span>
        <span class="ort">${esc(
          [o.ort, o.strasse].filter(Boolean).join(' · ') || o.anzeigename || '')}</span>
      </span>
      <span class="foot">${chips.join('')}</span>
    </button>`;
}

/* Einheiten derselben Adresse gehoeren zusammen. Gruppiert wird nur, wo es
   wirklich mehrere sind — bei lauter Einzelobjekten waere jede Ueberschrift
   nur eine Zeile Rauschen ueber einer einzigen Kachel. */
function gruppieren(objekte) {
  const schluessel = o => [o.plz, o.ort, o.strasse]
    .map(t => String(t || '').trim().toLowerCase()).filter(Boolean).join(' ');

  const eimer = new Map();
  for (const o of objekte) {
    const k = schluessel(o);
    if (!k) { eimer.set(`einzeln:${o.slug}`, { titel: '', objekte: [o] }); continue; }
    if (!eimer.has(k)) eimer.set(k, {
      titel: [o.strasse, o.ort].filter(Boolean).join(' · '), objekte: [],
    });
    eimer.get(k).objekte.push(o);
  }

  const gruppen = [...eimer.values()].filter(g => g.objekte.length > 1);
  const einzeln = [...eimer.values()].filter(g => g.objekte.length === 1)
    .flatMap(g => g.objekte);
  return { gruppen, einzeln };
}

try {
  const objekte = (await api('/objekte')).filter(o => o.aktiv !== false);

  if (!objekte.length) {
    sub.textContent = 'noch keine Immobilie';
    ziel.innerHTML = `<div class="empty">
        <div class="big">Noch keine Immobilie</div>
        <p>Lege deine erste Immobilie an — danach erscheinen hier
           Fristen und offene Belege auf einen Blick.</p>
      </div>`;
  } else {
    const n = objekte.length;
    sub.textContent = `${n} ${n === 1 ? 'Objekt' : 'Objekte'} · ImmoCalc`;
    const { gruppen, einzeln } = gruppieren(objekte);
    ziel.innerHTML = gruppen.map(g => `
        <div class="gruppe">${esc(g.titel)}
          <span class="anzahl">${g.objekte.length} Einheiten</span></div>
        <div class="grid">${g.objekte.map(kachel).join('')}</div>`).join('')
      + (einzeln.length
        ? (gruppen.length ? '<div class="gruppe">Weitere</div>' : '')
          + `<div class="grid">${einzeln.map(kachel).join('')}</div>`
        : '');
  }
} catch (e) {
  sub.textContent = 'API nicht erreichbar';
  ziel.innerHTML = `<div class="empty">
      <div class="big">Keine Verbindung zur API</div>
      <p>Die Objektliste konnte nicht geladen werden. Prüfe, ob der
         Container <code>immocalc-api</code> läuft.</p>
    </div>`;
}

ziel.addEventListener('click', e => {
  const t = e.target.closest('[data-slug]');
  if (t) location.href = `objekt.html?o=${encodeURIComponent(t.dataset.slug)}`;
});
</script>
</body>
</html>
