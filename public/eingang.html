<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eingang · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .kopfzeile{display:flex;gap:10px;align-items:center;margin-bottom:16px}
  .kopfzeile .zahl{font:700 15px var(--disp);color:var(--ink)}
  .kopfzeile .scan{margin-left:auto;border:none;background:var(--sheet);
    color:var(--teal-d);border-radius:11px;padding:11px 15px;font:600 13px var(--disp);
    cursor:pointer;min-height:44px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kopfzeile .scan:hover{background:var(--teal-l)}
  .kopfzeile .scan[disabled]{opacity:.55;cursor:default}

  .kamera{display:flex;gap:14px;align-items:center;width:100%;border:none;cursor:pointer;
    background:var(--teal);color:#fff;border-radius:16px;padding:16px;margin-bottom:16px;
    text-align:left;font-family:var(--body);min-height:44px;
    box-shadow:0 8px 20px -10px rgba(15,110,92,.8)}
  .kamera:hover{background:var(--teal-d)}
  .kamera[disabled]{opacity:.7;cursor:default}
  .kamera .ks{width:44px;height:44px;border-radius:12px;flex:none;display:flex;
    align-items:center;justify-content:center;background:rgba(255,255,255,.18);
    font:600 19px var(--mono)}
  .kamera .k1{display:block;font:600 15px var(--disp);letter-spacing:-.01em}
  .kamera .k2{display:block;font:400 12px var(--body);opacity:.85;margin-top:3px;
              line-height:1.4}
  dialog{border:none;border-radius:18px;padding:0;max-width:400px;
         width:calc(100% - 32px);background:var(--paper);
         box-shadow:0 30px 70px -20px rgba(22,38,44,.5)}
  dialog::backdrop{background:rgba(22,38,44,.45)}
  .dh{display:flex;align-items:center;gap:12px;padding:18px 18px 6px}
  .dh h2{flex:1;font:700 17px var(--disp);letter-spacing:-.02em;margin:0}
  .close{border:none;background:#F1F4F4;color:var(--soft);border-radius:12px;
         width:44px;height:44px;font:400 20px var(--body);cursor:pointer;flex:none;
         display:flex;align-items:center;justify-content:center;line-height:1}
  .dbody{padding:8px 18px 18px}
  .zinfo{font:600 12px var(--mono);color:var(--teal-d);background:var(--teal-l);
         border-radius:10px;padding:10px 12px;margin:0 0 14px}
  .wachdienst{font:500 11.5px var(--mono);color:var(--soft);margin:-6px 0 14px}
  .wachdienst.warn{color:var(--amber)}
  .beleg{background:var(--sheet);border-radius:16px;padding:15px;margin-bottom:12px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .beleg .kopf{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
  .beleg .sym{width:42px;height:42px;border-radius:11px;background:var(--amber-bg);
    color:var(--amber);flex:none;display:flex;align-items:center;justify-content:center;
    font:600 15px var(--mono)}
  .beleg .wer{flex:1;min-width:0}
  .beleg .dn{display:block;font:600 14px var(--disp);letter-spacing:-.01em;
    line-height:1.3;word-break:break-word}
  .beleg .meta{display:block;font:400 11.5px var(--body);color:var(--soft);margin-top:4px}
  .beleg .felder{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .beleg .felder select,.beleg .felder input{flex:1;min-width:126px;border:1.5px solid var(--line);
    border-radius:10px;padding:10px 11px;font:500 13.5px var(--body);background:var(--sheet);
    min-height:44px;color:var(--ink)}
  .beleg .felder select:focus,.beleg .felder input:focus{outline:none;border-color:var(--teal)}
  .beleg .tat{display:flex;gap:8px}
  .beleg .tat button{flex:1;border:none;border-radius:11px;padding:12px;cursor:pointer;
    font:600 13.5px var(--disp);min-height:44px;background:var(--teal);color:#fff}
  .beleg .tat button:hover{background:var(--teal-d)}
  .beleg .tat .spaeter{flex:0 0 auto;padding:12px 16px;background:transparent;
    color:var(--soft);box-shadow:inset 0 0 0 1.5px var(--line)}
  .vorschlag{font:500 11px var(--mono);color:var(--teal-d);background:var(--teal-l);
    border-radius:8px;padding:6px 10px;margin-bottom:10px;display:inline-block}
  .ziel{font:500 11.5px var(--mono);color:var(--soft);margin-top:9px;word-break:break-all}
  .hinweisbox{background:var(--sheet);border-radius:16px;padding:22px;text-align:center;
    box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .hinweisbox .big{font:700 16px var(--disp);letter-spacing:-.015em;margin-bottom:6px}
  .hinweisbox p{font:400 13px var(--body);color:var(--soft);margin:0 0 14px;line-height:1.5}
  .hinweisbox a{display:inline-block;text-decoration:none;background:var(--teal);color:#fff;
    border-radius:11px;padding:12px 18px;font:600 13.5px var(--disp);min-height:44px}

  /* App-Symbol in der Kopfzeile — kommt auf index.html, eingang.html und
     statistik.html gleich vor; gehoert eigentlich nach immo.css. */
  .applogo{width:34px;height:34px;border-radius:9px;flex:none;display:block}
  .applogo-link{display:block;border-radius:9px}
  .applogo-link:focus-visible{outline:2px solid var(--teal); outline-offset:2px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <a href="index.html" aria-label="Zur Übersicht" class="applogo-link"><img src="icons/icon.svg" alt="" class="applogo"></a>
    <div class="barwrap">
      <h1>Eingang</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <button class="kamera" id="kamera">
      <span class="ks">▣</span>
      <span class="kt">
        <span class="k1">Beleg abfotografieren</span>
        <span class="k2">Mehrere Seiten möglich · wird als PDF abgelegt</span>
      </span>
    </button>
    <input type="file" id="kameraFeld" accept="image/*" capture="environment"
           multiple hidden>

    <div class="kopfzeile">
      <span class="zahl" id="zahl"></span>
      <button class="scan" id="scan">Ordner prüfen</button>
    </div>
    <div class="wachdienst" id="wachdienst"></div>
    <div id="liste"></div>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html">ImmoCalc</a>
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html" aria-current="page"><span class="ni">▣</span>Dokumente</a>
    <a href="wertentwicklung.html"><span class="ni">◔</span>Wert</a>
    <a href="nebenkosten.html"><span class="ni">≡</span>Nebenkosten</a>
    <a href="eigentuemer.html"><span class="ni">☗</span>Eigentümer</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<dialog id="zielDlg">
  <div class="dh">
    <h2>Wohin gehört der Beleg?</h2>
    <button class="close" onclick="this.closest('dialog').close()"
            aria-label="Abbrechen">×</button>
  </div>
  <div class="dbody">
    <p class="zinfo" id="zielInfo"></p>
    <div class="field"><label for="zielObjekt">Immobilie</label>
      <select class="inp" id="zielObjekt"></select></div>
    <div class="field"><label for="zielArt">Art</label>
      <select class="inp" id="zielArt"></select></div>
    <div class="field"><label for="zielJahr">Jahr</label>
      <select class="inp" id="zielJahr"></select></div>
    <div class="field"><label for="zielText">Kurzbeschreibung</label>
      <input class="inp" id="zielText" placeholder="optional"></div>
    <button class="btn" id="zielOk">Ablegen</button>
  </div>
</dialog>

<script type="module">
import { api, esc } from './assets/immo.js';
import { scanZuPdf, lesbareGroesse } from './assets/scan.js';

const liste = document.getElementById('liste');
const sub = document.getElementById('sub');
const zahl = document.getElementById('zahl');
const scanKnopf = document.getElementById('scan');

let objekte = [];
const jetzt = new Date().getFullYear();

const groesse = b => !b ? '' :
  b > 1048576 ? (b / 1048576).toFixed(1) + ' MB' : Math.round(b / 1024) + ' KB';

function karte(d) {
  const v = d.vorschlag || {};
  const artOptionen = arten.map(a =>
    `<option ${v.kategorie === a ? 'selected' : ''}>${esc(a)}</option>`).join('');
  const objektOptionen = objekte.map(o =>
    `<option value="${esc(o.slug)}" ${d.objekt === o.slug ? 'selected' : ''}>${
      esc(o.name)}</option>`).join('');
  const jahre = Array.from({ length: 8 }, (_, i) => jetzt - i)
    .map(j => `<option ${(v.jahr || jetzt) === j ? 'selected' : ''}>${j}</option>`).join('');

  const erkannt = [d.objekt_name, groesse(d.groesse), d.erkannt_am]
    .filter(Boolean).join(' · ');

  return `<div class="beleg" data-id="${d.id}">
      <div class="kopf">
        <span class="sym">PDF</span>
        <span class="wer">
          <span class="dn">${esc(d.dateiname)}</span>
          <span class="meta">${esc(erkannt)}</span>
        </span>
      </div>
      ${v.kategorie ? `<div class="vorschlag">Vermutung: ${esc(v.kategorie)}${
        v.jahr ? ' · ' + v.jahr : ''}</div>` : ''}
      <div class="felder">
        <select data-feld="objekt" aria-label="Immobilie">${objektOptionen}</select>
        <select data-feld="kategorie" aria-label="Art">${artOptionen}</select>
        <select data-feld="jahr" aria-label="Jahr">${jahre}</select>
        <input data-feld="beschreibung" placeholder="Kurzbeschreibung (optional)"
               aria-label="Beschreibung">
      </div>
      <div class="tat">
        <button data-tat="zuordnen">Zuordnen und einsortieren</button>
        <button class="spaeter" data-tat="spaeter">Später</button>
      </div>
      <div class="ziel" data-ziel></div>
    </div>`;
}

let arten = [];

async function wachdienstZeigen() {
  const feld = document.getElementById('wachdienst');
  try {
    const w = await api('/dokumente/wachdienst');
    const wann = w.letzter_lauf
      ? new Date(w.letzter_lauf).toLocaleTimeString('de-DE',
          { hour: '2-digit', minute: '2-digit' })
      : null;
    feld.textContent = w.letzter_fehler
      ? `Automatische Prüfung alle ${w.takt_minuten} min · zuletzt fehlgeschlagen`
      : wann
      ? `Automatisch geprüft alle ${w.takt_minuten} min · zuletzt ${wann} Uhr`
      : `Automatische Prüfung alle ${w.takt_minuten} min · erster Lauf steht aus`;
    feld.classList.toggle('warn', Boolean(w.letzter_fehler));
  } catch {
    feld.textContent = '';
  }
}

async function laden() {
  try {
    const [objekteListe, eingang] = await Promise.all([
      api('/objekte'), api('/dokumente/inbox'),
    ]);
    objekte = objekteListe;
    arten = eingang.arten;
    const { anzahl, dokumente } = eingang;
    wachdienstZeigen();
    zahl.textContent = anzahl
      ? `${anzahl} ${anzahl === 1 ? 'Dokument wartet' : 'Dokumente warten'}`
      : 'Nichts offen';
    sub.textContent = anzahl ? 'bitte zuordnen' : 'alles einsortiert';

    if (!dokumente.length) {
      liste.innerHTML = `<div class="hinweisbox">
          <div class="big">Keine offenen Dokumente</div>
          <p>Neu eingescannte Dateien im Hauptordner einer Immobilie erscheinen
             hier automatisch zur Zuordnung.</p>
        </div>`;
      return;
    }
    liste.innerHTML = dokumente.map(karte).join('');
  } catch (fehler) {
    sub.textContent = 'nicht erreichbar';
    liste.innerHTML = `<div class="hinweisbox">
        <div class="big">Eingang nicht verfügbar</div>
        <p>${esc(String(fehler.message || fehler))}</p>
      </div>`;
  }
}

scanKnopf.addEventListener('click', async () => {
  scanKnopf.disabled = true;
  scanKnopf.textContent = 'Prüfe …';
  try {
    const { neu } = await api('/dokumente/scan', { method: 'POST' });
    scanKnopf.textContent = neu ? `${neu} neu gefunden` : 'Nichts Neues';
    await laden();
  } catch (fehler) {
    scanKnopf.textContent = 'Nextcloud fehlt';
    liste.insertAdjacentHTML('afterbegin', `<div class="hinweisbox">
        <div class="big">Nextcloud ist nicht verbunden</div>
        <p>${esc(String(fehler.message || fehler))}</p>
        <a href="settings.html">Zu den Einstellungen</a>
      </div>`);
  } finally {
    setTimeout(() => {
      scanKnopf.disabled = false;
      scanKnopf.textContent = 'Ordner prüfen';
    }, 2200);
  }
});

liste.addEventListener('click', async e => {
  const knopf = e.target.closest('[data-tat]');
  if (!knopf) return;
  const karte = knopf.closest('[data-id]');

  if (knopf.dataset.tat === 'spaeter') {
    karte.style.display = 'none';
    return;
  }

  const wert = feld => karte.querySelector(`[data-feld="${feld}"]`).value;
  knopf.disabled = true;
  knopf.textContent = 'Wird einsortiert …';
  try {
    const antwort = await api(`/dokumente/${karte.dataset.id}/zuordnen`, {
      method: 'POST',
      body: {
        objekt: wert('objekt'), kategorie: wert('kategorie'),
        jahr: Number(wert('jahr')), beschreibung: wert('beschreibung'),
      },
    });
    karte.querySelector('[data-ziel]').textContent = '✓ ' + antwort.pfad;
    knopf.textContent = 'Einsortiert';
    setTimeout(laden, 1400);
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Zuordnen und einsortieren';
    karte.querySelector('[data-ziel]').textContent =
      '⚠ ' + String(fehler.message || fehler);
  }
});

/* ---- Beleg abfotografieren ----------------------------------------------
   <input capture> öffnet auf iOS direkt die Kamera. Die Aufnahmen werden im
   Browser verkleinert und zu einem PDF zusammengesetzt; hochgeladen wird nur
   das fertige PDF. */
const kameraKnopf = document.getElementById('kamera');
const kameraFeld = document.getElementById('kameraFeld');

kameraKnopf.addEventListener('click', () => kameraFeld.click());

kameraFeld.addEventListener('change', async () => {
  const dateien = [...kameraFeld.files];
  kameraFeld.value = '';
  if (!dateien.length) return;

  const beschriftung = kameraKnopf.querySelector('.k1');
  const unterzeile = kameraKnopf.querySelector('.k2');
  kameraKnopf.disabled = true;
  beschriftung.textContent = 'Verarbeite …';
  unterzeile.textContent = `${dateien.length} Aufnahme${dateien.length > 1 ? 'n' : ''}`;

  try {
    const { pdf, seiten } = await scanZuPdf(dateien);
    const auswahl = await zielAbfragen(seiten, pdf.size);
    if (!auswahl) throw new Error('abgebrochen');

    const paket = new FormData();
    paket.append('objekt', auswahl.objekt);
    paket.append('kategorie', auswahl.kategorie);
    paket.append('jahr', String(auswahl.jahr));
    paket.append('beschreibung', auswahl.beschreibung);
    paket.append('datei', pdf, 'scan.pdf');

    const antwort = await fetch('/api/dokumente/scannen',
      { method: 'POST', body: paket });
    if (!antwort.ok) {
      const grund = await antwort.json().then(k => k.detail).catch(() => null);
      throw new Error(grund || `Fehler ${antwort.status}`);
    }
    const ergebnis = await antwort.json();
    beschriftung.textContent = ergebnis.abgelegt ? '✓ Abgelegt' : '✓ Im Eingang';
    unterzeile.textContent = ergebnis.abgelegt
      ? `${ergebnis.dateiname} · ${lesbareGroesse(pdf.size)}`
      : ergebnis.hinweis;
    await laden();
  } catch (fehler) {
    const text = String(fehler.message || fehler);
    beschriftung.textContent = text === 'abgebrochen' ? 'Abgebrochen' : 'Fehlgeschlagen';
    unterzeile.textContent = text === 'abgebrochen' ? 'Nichts hochgeladen' : text;
  } finally {
    setTimeout(() => {
      kameraKnopf.disabled = false;
      beschriftung.textContent = 'Beleg abfotografieren';
      unterzeile.textContent = 'Mehrere Seiten möglich · wird als PDF abgelegt';
    }, 3200);
  }
});

/** Kleiner Dialog: wohin gehört der Scan? */
function zielAbfragen(seiten, groesse) {
  return new Promise(fertig => {
    const dlg = document.getElementById('zielDlg');
    document.getElementById('zielInfo').textContent =
      `${seiten} Seite${seiten > 1 ? 'n' : ''} · ${lesbareGroesse(groesse)}`;

    const objektWahl = document.getElementById('zielObjekt');
    objektWahl.innerHTML = objekte.map(o =>
      `<option value="${esc(o.slug)}">${esc(o.name)}</option>`).join('');
    const artWahl = document.getElementById('zielArt');
    artWahl.innerHTML = arten.map(a => `<option>${esc(a)}</option>`).join('');
    const jahrWahl = document.getElementById('zielJahr');
    const jetzt = new Date().getFullYear();
    jahrWahl.innerHTML = Array.from({ length: 8 }, (_, i) => jetzt - i)
      .map(j => `<option>${j}</option>`).join('');

    let entschieden = false;
    const abbruch = () => { if (!entschieden) fertig(null); };
    dlg.addEventListener('close', abbruch, { once: true });
    document.getElementById('zielOk').onclick = () => {
      entschieden = true;
      dlg.close();
      fertig({
        objekt: objektWahl.value,
        kategorie: artWahl.value,
        jahr: Number(jahrWahl.value),
        beschreibung: document.getElementById('zielText').value.trim(),
      });
    };
    dlg.showModal();
  });
}

await laden();
</script>
</body>
</html>
