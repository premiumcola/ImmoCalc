<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eingang · ImmoCalc</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/immo.css">
<style>
  .kopfzeile{display:flex;gap:10px;align-items:center;margin-bottom:16px}
  .kopfzeile .zahl{font:700 15px var(--disp);color:var(--ink)}
  .kopfzeile .scan{margin-left:auto;border:none;background:var(--sheet);
    color:var(--teal-d);border-radius:11px;padding:11px 15px;font:600 13px var(--disp);
    cursor:pointer;min-height:44px;box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .kopfzeile .scan:hover{background:var(--teal-l)}
  .kopfzeile .scan[disabled]{opacity:.55;cursor:default}

  .wachdienst{font:500 11.5px var(--mono);color:var(--soft);margin:-6px 0 14px}
  .wachdienst.warn{color:var(--amber)}
  .beleg{background:var(--sheet);border-radius:16px;padding:15px;margin-bottom:12px;
         box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .beleg .kopf{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
  .beleg .sym{width:42px;height:42px;border-radius:11px;background:var(--amber-bg);
    color:var(--amber);flex:none;display:flex;align-items:center;justify-content:center;
    font:600 15px var(--mono)}
  .beleg .wer{flex:1;min-width:0}
  .beleg .dn{display:block;font:600 14px var(--disp);letter-spacing:-.01em;
    line-height:1.3;word-break:break-word}
  .beleg .meta{display:block;font:400 11.5px var(--body);color:var(--soft);margin-top:4px}
  .beleg .felder{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .beleg .felder select,.beleg .felder input{flex:1;min-width:126px;border:1.5px solid var(--line);
    border-radius:10px;padding:10px 11px;font:500 13.5px var(--body);background:var(--sheet);
    min-height:44px;color:var(--ink)}
  .beleg .felder select:focus,.beleg .felder input:focus{outline:none;border-color:var(--teal)}
  .beleg .tat{display:flex;gap:8px}
  .beleg .tat button{flex:1;border:none;border-radius:11px;padding:12px;cursor:pointer;
    font:600 13.5px var(--disp);min-height:44px;background:var(--teal);color:#fff}
  .beleg .tat button:hover{background:var(--teal-d)}
  .beleg .tat .spaeter{flex:0 0 auto;padding:12px 16px;background:transparent;
    color:var(--soft);box-shadow:inset 0 0 0 1.5px var(--line)}
  .vorschlag{font:500 11px var(--mono);color:var(--teal-d);background:var(--teal-l);
    border-radius:8px;padding:6px 10px;margin-bottom:10px;display:inline-block}
  .ziel{font:500 11.5px var(--mono);color:var(--soft);margin-top:9px;word-break:break-all}
  .hinweisbox{background:var(--sheet);border-radius:16px;padding:22px;text-align:center;
    box-shadow:0 1px 2px rgba(22,38,44,.05)}
  .hinweisbox .big{font:700 16px var(--disp);letter-spacing:-.015em;margin-bottom:6px}
  .hinweisbox p{font:400 13px var(--body);color:var(--soft);margin:0 0 14px;line-height:1.5}
  .hinweisbox a{display:inline-block;text-decoration:none;background:var(--teal);color:#fff;
    border-radius:11px;padding:12px 18px;font:600 13.5px var(--disp);min-height:44px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="barwrap">
      <h1>Eingang</h1>
      <div class="sub" id="sub">wird geladen …</div>
    </div>
  </div>

  <div class="scroll">
    <div class="kopfzeile">
      <span class="zahl" id="zahl"></span>
      <button class="scan" id="scan">Ordner prüfen</button>
    </div>
    <div class="wachdienst" id="wachdienst"></div>
    <div id="liste"></div>
  </div>

  <nav class="nav">
    <a href="index.html"><span class="ni">▤</span>Objekte</a>
    <a href="eingang.html" aria-current="page"><span class="ni">▼</span>Eingang</a>
    <a href="statistik.html"><span class="ni">◔</span>Auswertung</a>
    <a href="settings.html"><span class="ni">⚙</span>Einstellungen</a>
  </nav>
</div>

<script type="module">
import { api, esc } from './assets/immo.js';

const liste = document.getElementById('liste');
const sub = document.getElementById('sub');
const zahl = document.getElementById('zahl');
const scanKnopf = document.getElementById('scan');

let objekte = [];
const jetzt = new Date().getFullYear();

const groesse = b => !b ? '' :
  b > 1048576 ? (b / 1048576).toFixed(1) + ' MB' : Math.round(b / 1024) + ' KB';

function karte(d) {
  const v = d.vorschlag || {};
  const artOptionen = arten.map(a =>
    `<option ${v.kategorie === a ? 'selected' : ''}>${esc(a)}</option>`).join('');
  const objektOptionen = objekte.map(o =>
    `<option value="${esc(o.slug)}" ${d.objekt === o.slug ? 'selected' : ''}>${
      esc(o.name)}</option>`).join('');
  const jahre = Array.from({ length: 8 }, (_, i) => jetzt - i)
    .map(j => `<option ${(v.jahr || jetzt) === j ? 'selected' : ''}>${j}</option>`).join('');

  const erkannt = [d.objekt_name, groesse(d.groesse), d.erkannt_am]
    .filter(Boolean).join(' · ');

  return `<div class="beleg" data-id="${d.id}">
      <div class="kopf">
        <span class="sym">PDF</span>
        <span class="wer">
          <span class="dn">${esc(d.dateiname)}</span>
          <span class="meta">${esc(erkannt)}</span>
        </span>
      </div>
      ${v.kategorie ? `<div class="vorschlag">Vermutung: ${esc(v.kategorie)}${
        v.jahr ? ' · ' + v.jahr : ''}</div>` : ''}
      <div class="felder">
        <select data-feld="objekt" aria-label="Immobilie">${objektOptionen}</select>
        <select data-feld="kategorie" aria-label="Art">${artOptionen}</select>
        <select data-feld="jahr" aria-label="Jahr">${jahre}</select>
        <input data-feld="beschreibung" placeholder="Kurzbeschreibung (optional)"
               aria-label="Beschreibung">
      </div>
      <div class="tat">
        <button data-tat="zuordnen">Zuordnen und einsortieren</button>
        <button class="spaeter" data-tat="spaeter">Später</button>
      </div>
      <div class="ziel" data-ziel></div>
    </div>`;
}

let arten = [];

async function wachdienstZeigen() {
  const feld = document.getElementById('wachdienst');
  try {
    const w = await api('/dokumente/wachdienst');
    const wann = w.letzter_lauf
      ? new Date(w.letzter_lauf).toLocaleTimeString('de-DE',
          { hour: '2-digit', minute: '2-digit' })
      : null;
    feld.textContent = w.letzter_fehler
      ? `Automatische Prüfung alle ${w.takt_minuten} min · zuletzt fehlgeschlagen`
      : wann
      ? `Automatisch geprüft alle ${w.takt_minuten} min · zuletzt ${wann} Uhr`
      : `Automatische Prüfung alle ${w.takt_minuten} min · erster Lauf steht aus`;
    feld.classList.toggle('warn', Boolean(w.letzter_fehler));
  } catch {
    feld.textContent = '';
  }
}

async function laden() {
  try {
    const [objekteListe, eingang] = await Promise.all([
      api('/objekte'), api('/dokumente/inbox'),
    ]);
    objekte = objekteListe;
    arten = eingang.arten;
    const { anzahl, dokumente } = eingang;
    wachdienstZeigen();
    zahl.textContent = anzahl
      ? `${anzahl} ${anzahl === 1 ? 'Dokument wartet' : 'Dokumente warten'}`
      : 'Nichts offen';
    sub.textContent = anzahl ? 'bitte zuordnen' : 'alles einsortiert';

    if (!dokumente.length) {
      liste.innerHTML = `<div class="hinweisbox">
          <div class="big">Keine offenen Dokumente</div>
          <p>Neu eingescannte Dateien im Hauptordner einer Immobilie erscheinen
             hier automatisch zur Zuordnung.</p>
        </div>`;
      return;
    }
    liste.innerHTML = dokumente.map(karte).join('');
  } catch (fehler) {
    sub.textContent = 'nicht erreichbar';
    liste.innerHTML = `<div class="hinweisbox">
        <div class="big">Eingang nicht verfügbar</div>
        <p>${esc(String(fehler.message || fehler))}</p>
      </div>`;
  }
}

scanKnopf.addEventListener('click', async () => {
  scanKnopf.disabled = true;
  scanKnopf.textContent = 'Prüfe …';
  try {
    const { neu } = await api('/dokumente/scan', { method: 'POST' });
    scanKnopf.textContent = neu ? `${neu} neu gefunden` : 'Nichts Neues';
    await laden();
  } catch (fehler) {
    scanKnopf.textContent = 'Nextcloud fehlt';
    liste.insertAdjacentHTML('afterbegin', `<div class="hinweisbox">
        <div class="big">Nextcloud ist nicht verbunden</div>
        <p>${esc(String(fehler.message || fehler))}</p>
        <a href="settings.html">Zu den Einstellungen</a>
      </div>`);
  } finally {
    setTimeout(() => {
      scanKnopf.disabled = false;
      scanKnopf.textContent = 'Ordner prüfen';
    }, 2200);
  }
});

liste.addEventListener('click', async e => {
  const knopf = e.target.closest('[data-tat]');
  if (!knopf) return;
  const karte = knopf.closest('[data-id]');

  if (knopf.dataset.tat === 'spaeter') {
    karte.style.display = 'none';
    return;
  }

  const wert = feld => karte.querySelector(`[data-feld="${feld}"]`).value;
  knopf.disabled = true;
  knopf.textContent = 'Wird einsortiert …';
  try {
    const antwort = await api(`/dokumente/${karte.dataset.id}/zuordnen`, {
      method: 'POST',
      body: {
        objekt: wert('objekt'), kategorie: wert('kategorie'),
        jahr: Number(wert('jahr')), beschreibung: wert('beschreibung'),
      },
    });
    karte.querySelector('[data-ziel]').textContent = '✓ ' + antwort.pfad;
    knopf.textContent = 'Einsortiert';
    setTimeout(laden, 1400);
  } catch (fehler) {
    knopf.disabled = false;
    knopf.textContent = 'Zuordnen und einsortieren';
    karte.querySelector('[data-ziel]').textContent =
      '⚠ ' + String(fehler.message || fehler);
  }
});

await laden();
</script>
</body>
</html>
