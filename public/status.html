<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ImmoCalc — Live-Daten (API)</title>
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ImmoCalc">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#E8ECEC;--sheet:#FFF;--ink:#16262C;--soft:#5C6B70;--line:#D6DCDD;--teal:#0F6E5C;--teal-d:#0B5548;--pos:#2E7D4F;--neg:#B24229;--amber:#916212;
    --disp:"Space Grotesk",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"IBM Plex Mono",monospace;}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
  .wrap{width:100%;max-width:480px;min-height:100vh;padding:26px 18px 50px}
  .eyebrow{font:600 11px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
  h1{font:700 24px var(--disp);letter-spacing:-.02em;margin:8px 0 3px}
  .lead{font:400 13.5px var(--body);color:var(--soft);margin:0 0 20px}
  .status{display:inline-flex;align-items:center;gap:8px;font:600 12px var(--mono);padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--sheet);margin-bottom:18px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--soft)} .dot.ok{background:var(--pos)} .dot.err{background:var(--neg)}
  .card{background:var(--sheet);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px}
  .card .t{font:600 16px var(--disp);letter-spacing:-.01em;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .card .a{font:500 12px var(--mono);color:var(--soft);margin-top:2px}
  .chips{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .chip{font:600 11px var(--mono);padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--soft);background:#F4F6F6}
  .chip.neg{color:var(--neg);border-color:#E4C1B4;background:#F7E9E3}
  .chip.amber{color:var(--amber);border-color:#E4CF9E;background:#F7EFD9}
  .bal{margin-top:12px;padding-top:11px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
  .bal .l{font:600 11px var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--soft)}
  .bal .v{font:700 18px var(--mono);font-variant-numeric:tabular-nums} .v.pos{color:var(--pos)} .v.neg{color:var(--neg)}
  .note{background:#F7EFD9;border:1px solid #E4CF9E;color:var(--amber);border-radius:12px;padding:13px 15px;font:500 13px var(--body);line-height:1.5}
  code{font:600 12px var(--mono);background:#EDF1F0;padding:1px 6px;border-radius:5px}
  a.back{display:inline-block;margin-top:18px;font:600 13px var(--disp);color:var(--teal-d);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Backend · FastAPI + SQLite</div>
  <h1>Live-Daten aus der API</h1>
  <p class="lead">Diese Seite lädt echte Daten über <code>/api</code> — kein Mock. Rechnet über die ImmoCalc-Engine.</p>
  <div class="status" id="status"><span class="dot"></span><span id="statustext">API wird geprüft…</span></div>
  <div id="content"></div>
  <a class="back" href="index.html">‹ zurück</a>
</div>
<script>
const eur=n=>n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
async function api(p){const r=await fetch('/api'+p);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}

async function run(){
  const st=document.getElementById('status'),stx=document.getElementById('statustext'),c=document.getElementById('content');
  try{
    const h=await api('/health');
    st.querySelector('.dot').className='dot ok'; stx.textContent='API online · '+h.service;
    const objekte=await api('/objekte');
    for(const o of objekte){
      const det=await api('/objekte/'+o.slug);
      const z=det.zeitraeume[0];
      let balHtml='';
      if(z){
        const ab=await api('/zeitraeume/'+z.id+'/abrechnung');
        const g=ab.gesamt, pos=g.saldo>=0;
        const offen=ab.offen&&ab.offen.length?`<span class="chip neg">${ab.offen.length} offen: ${ab.offen.join(', ')}</span>`:'';
        balHtml=`<div class="chips">
            <span class="chip">Auslagen ${eur(g.auslagen)}</span>
            <span class="chip">Abschläge ${eur(g.abschlaege)}</span>${offen}
          </div>
          <div class="bal"><span class="l">Saldo gesamt (${z.label})</span>
            <span class="v ${pos?'pos':'neg'}">${pos?'+ ':'− '}${eur(Math.abs(g.saldo))}</span></div>`;
      }
      const frist=o.frist_tage!=null?`<span class="chip ${o.frist_tage<=90?'amber':''}">Frist in ${o.frist_tage} T</span>`:'';
      const offenChip=o.offene_positionen?`<span class="chip neg">${o.offene_positionen} Belege offen</span>`:'';
      c.insertAdjacentHTML('beforeend',
        `<div class="card"><div class="t">${o.name}</div><div class="a">${o.ort}</div>
          <div class="chips">${frist}${offenChip}</div>${balHtml}</div>`);
    }
    if(!objekte.length) c.innerHTML='<div class="note">Keine Objekte in der DB.</div>';
  }catch(e){
    st.querySelector('.dot').className='dot err'; stx.textContent='API nicht erreichbar';
    c.innerHTML='<div class="note">Kein <code>/api</code> erreichbar. Diese Seite braucht den laufenden Stack (nginx proxyt <code>/api</code> an <code>immocalc-api</code>). Beim reinen <code>http.server</code>-Test gibt es kein Backend — nutze <code>./deploy.sh</code>.</div>';
  }
}
run();
</script>
</body>
</html>
