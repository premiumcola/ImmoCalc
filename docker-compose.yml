# =============================================================================
# ImmoCalc — orchestration (aufgehängt wie jFlow) · LIVE + DEV
#
#   Immobilie ──> Zeitraum ──> Positionen (Scan→OCR→PDF) ──> Verteilung
#             ──> Ergebnis je Partei ──> Abrechnungs-PDF
#
# Services je Environment:
#   dashboard-*  nginx-Frontend (Mockups + UI), proxyt /api/ an api-*
#   api-*        FastAPI + SQLite (Rechen-Engine, Seed der echten Objekte)
#
# LIVE Ports 8091 (UI) · DEV Ports 8092 (UI). API läuft intern (nicht published).
# Konfiguration wie jFlow über persistierte workflow.json (Frontend) + SQLite (API).
# =============================================================================

x-api-base: &api-base
  build: { context: ., dockerfile: api/Dockerfile, args: { GIT_SHA: "${GIT_SHA:-local}" } }
  restart: unless-stopped

x-web-base: &web-base
  build: { context: ., dockerfile: dashboard/Dockerfile, args: { GIT_SHA: "${GIT_SHA:-local}" } }
  restart: unless-stopped

x-env-base: &env-base
  TZ: ${TZ:-Europe/Berlin}
  PUID: ${PUID:-99}
  PGID: ${PGID:-100}

services:

  # ------------------------------- LIVE --------------------------------------
  api-live:
    <<: *api-base
    container_name: immocalc-api
    environment:
      <<: *env-base
      DB_PATH: /data/immocalc.db
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/immocalc-live/data}:/data

  dashboard-live:
    <<: *web-base
    container_name: immocalc-dashboard
    depends_on: [api-live]
    environment:
      <<: *env-base
      APP_ENV: live
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_UPSTREAM: api-live:8000
    labels:
      net.unraid.docker.icon: "http://192.168.178.10:${DASHBOARD_PORT:-8091}/icons/icon-512.png"
      net.unraid.docker.webui: "http://192.168.178.10:${DASHBOARD_PORT:-8091}"
    ports:
      - "${DASHBOARD_PORT:-8091}:80"

  # -------------------------------- DEV --------------------------------------
  api-dev:
    <<: *api-base
    container_name: immocalc-api-dev
    environment:
      <<: *env-base
      DB_PATH: /data/immocalc.db
    volumes:
      - ${DATA_DIR_DEV:-/mnt/user/appdata/immocalc-dev/data}:/data

  dashboard-dev:
    <<: *web-base
    container_name: immocalc-dashboard-dev
    depends_on: [api-dev]
    environment:
      <<: *env-base
      APP_ENV: dev
      LOG_LEVEL: ${LOG_LEVEL_DEV:-DEBUG}
      API_UPSTREAM: api-dev:8000
    labels:
      net.unraid.docker.icon: "http://192.168.178.10:${DASHBOARD_PORT_DEV:-8092}/icons/icon-512.png"
      net.unraid.docker.webui: "http://192.168.178.10:${DASHBOARD_PORT_DEV:-8092}"
    ports:
      - "${DASHBOARD_PORT_DEV:-8092}:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro     # live editieren, kein Rebuild

volumes: {}
