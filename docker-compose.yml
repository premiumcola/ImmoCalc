# =============================================================================
# ImmoCalc — orchestration (aufgehängt wie jFlow)
#
#   Immobilie ──> Zeitraum ──> Positionen (Scan→OCR→PDF) ──> Verteilung
#             ──> Ergebnis je Partei ──> Abrechnungs-PDF
#
# EINE Umgebung. Kein DEV-Stack — public/ ist gemountet, Frontend-Änderungen
# sind ohne Rebuild sofort wirksam. Nur API-Änderungen brauchen ./deploy.sh.
#
#   dashboard  nginx-Frontend, proxyt /api/ an api
#   api        FastAPI + SQLite (Rechen-Engine, Seed der echten Objekte)
#
# UI auf Port 8091. API läuft intern (nicht published).
# =============================================================================

services:

  api:
    build: { context: ., dockerfile: api/Dockerfile, args: { GIT_SHA: "${GIT_SHA:-local}" } }
    container_name: immocalc-api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Berlin}
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      DB_PATH: /data/immocalc.db
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/immocalc-live/data}:/data

  dashboard:
    build: { context: ., dockerfile: dashboard/Dockerfile, args: { GIT_SHA: "${GIT_SHA:-local}" } }
    container_name: immocalc-dashboard
    restart: unless-stopped
    depends_on: [api]
    environment:
      TZ: ${TZ:-Europe/Berlin}
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_UPSTREAM: api:8000
    labels:
      net.unraid.docker.icon: "http://192.168.178.10:${DASHBOARD_PORT:-8091}/icons/icon-512.png"
      net.unraid.docker.webui: "http://192.168.178.10:${DASHBOARD_PORT:-8091}"
    ports:
      - "${DASHBOARD_PORT:-8091}:80"
    volumes:
      # Frontend live aus dem Repo — Änderung an public/ = sofort auf der Seite.
      - ./public:/usr/share/nginx/html:ro

volumes: {}
